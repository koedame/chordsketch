version: 2
updates:
  # Dependabot opens one PR per dependency for every update type
  # (patch, minor, AND major). The `/dependabot-review` slash command
  # processes the resulting backlog: it audits each PR for advisories
  # and behavioural deltas, applies any required code changes, and
  # squash-merges the safe ones. See `.claude/commands/dependabot-review.md`
  # and ADR-0016 for the rationale, and #1838 for the prior major-block
  # decision this configuration supersedes.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
