name: "CLI Render Smoke"
description: >
  Run the README Usage examples against an installed `chordsketch` binary
  on PATH and assert each command produces non-empty, structurally valid
  output. Cross-platform via `shell: bash` so it works on ubuntu-latest
  and windows-latest (git-bash) runners.
inputs:
  fixtures-dir:
    description: "Directory containing sample.cho, song2.cho, sample-config.json."
    required: false
    default: ".github/fixtures"
runs:
  using: "composite"
  steps:
    - name: Verify CLI is on PATH
      shell: bash
      run: |
        set -euo pipefail
        chordsketch --version

    - name: Render to plain text
      shell: bash
      run: |
        set -euo pipefail
        chordsketch "${{ inputs.fixtures-dir }}/sample.cho" > out.txt
        test -s out.txt
        grep -q "Smoke Test" out.txt
        grep -q "Hello" out.txt

    - name: Render to HTML
      shell: bash
      run: |
        set -euo pipefail
        chordsketch -f html "${{ inputs.fixtures-dir }}/sample.cho" -o out.html
        test -s out.html
        grep -q "Smoke Test" out.html
        grep -q "<html" out.html

    - name: Render to PDF
      shell: bash
      run: |
        set -euo pipefail
        chordsketch -f pdf "${{ inputs.fixtures-dir }}/sample.cho" -o out.pdf
        test -s out.pdf
        head -c 4 out.pdf | grep -q "%PDF"

    - name: Transpose
      shell: bash
      run: |
        set -euo pipefail
        chordsketch --transpose 2 "${{ inputs.fixtures-dir }}/sample.cho" > out-transposed.txt
        test -s out-transposed.txt
        # Original is in C/G/Am/F; +2 should yield D/A/Bm/G. Spot-check
        # "Bm" (transposed Am) to confirm transposition actually ran.
        # "D" alone is unreliable because "README" in the subtitle
        # contains the letter D, so that grep would always pass.
        grep -q "Bm" out-transposed.txt

    - name: Custom config (-c) with RRJSON file
      shell: bash
      run: |
        set -euo pipefail
        chordsketch -c "${{ inputs.fixtures-dir }}/sample-config.json" \
          "${{ inputs.fixtures-dir }}/sample.cho" > out-config.txt
        test -s out-config.txt
        grep -q "Smoke Test" out-config.txt

    - name: Multi-file PDF
      shell: bash
      run: |
        set -euo pipefail
        chordsketch -f pdf \
          "${{ inputs.fixtures-dir }}/sample.cho" \
          "${{ inputs.fixtures-dir }}/song2.cho" \
          -o songbook.pdf
        test -s songbook.pdf
        head -c 4 songbook.pdf | grep -q "%PDF"
        # A multi-song PDF should be larger than a single-song PDF; this
        # is a cheap structural check that both songs were actually
        # rendered rather than only one being emitted.
        chordsketch -f pdf "${{ inputs.fixtures-dir }}/sample.cho" -o single.pdf
        single_size=$(wc -c < single.pdf)
        book_size=$(wc -c < songbook.pdf)
        if [ "$book_size" -le "$single_size" ]; then
          echo "Multi-song PDF ($book_size bytes) is not larger than single-song PDF ($single_size bytes)" >&2
          exit 1
        fi

    # --- iReal Pro smoke ----------------------------------------------------
    # The next three steps cover the iReal Pro Usage examples documented in
    # README.md (irealb:// URL, .irealb file, .irealbook collection). They
    # are marked `continue-on-error: true` because every published binary
    # on every registry today predates the iReal Pro track (the entire
    # iReal Pro feature set is in `## [Unreleased]` per CHANGELOG.md).
    # Workspace-HEAD jobs (source-build, usage-smoke) build from current
    # code and DO run these steps successfully, providing full end-to-end
    # coverage of the new commands on every PR. After the next release
    # publishes iReal-supporting binaries to every channel, a follow-up
    # PR removes `continue-on-error: true` so iReal smoke becomes
    # hard-gating on every install path. Until then, failures still
    # surface visibly in the job log — they just don't fail the job.
    # See #2400.

    - name: Render iReal Pro from irealb:// URL
      shell: bash
      continue-on-error: true
      run: |
        set -euo pipefail
        # Read the canonical fixture URL from the .irealb file rather
        # than hardcoding it inline so a future fixture refresh is
        # picked up automatically.
        url=$(cat "${{ inputs.fixtures-dir }}/sample.irealb")
        chordsketch "$url" > out-ireal-url.svg
        test -s out-ireal-url.svg
        head -c 5 out-ireal-url.svg | grep -q "<?xml"
        grep -q "<svg" out-ireal-url.svg

    - name: Render iReal Pro from .irealb file
      shell: bash
      continue-on-error: true
      run: |
        set -euo pipefail
        chordsketch "${{ inputs.fixtures-dir }}/sample.irealb" > out-ireal-file.svg
        test -s out-ireal-file.svg
        head -c 5 out-ireal-file.svg | grep -q "<?xml"
        grep -q "<svg" out-ireal-file.svg

    - name: Render iReal Pro from .irealbook collection
      shell: bash
      continue-on-error: true
      run: |
        set -euo pipefail
        chordsketch "${{ inputs.fixtures-dir }}/sample.irealbook" > out-ireal-book.svg
        test -s out-ireal-book.svg
        head -c 5 out-ireal-book.svg | grep -q "<?xml"
        grep -q "<svg" out-ireal-book.svg
        # Multi-song collection should produce a larger SVG than a
        # single song — the same structural sanity check used for the
        # ChordPro multi-file PDF above. If the .irealbook dispatch
        # silently rendered only the first song, this check fails.
        single_size=$(wc -c < out-ireal-file.svg)
        book_size=$(wc -c < out-ireal-book.svg)
        if [ "$book_size" -le "$single_size" ]; then
          echo "Multi-song iRealbook SVG ($book_size bytes) is not larger than single-song .irealb SVG ($single_size bytes)" >&2
          exit 1
        fi
