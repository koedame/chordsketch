name: Feature
description: New feature or enhancement
labels: ["type:feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be achieved?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: "Checklist (use - [ ] syntax)"
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - "Phase 1: Scaffolding"
        - "Phase 2: Core Parser"
        - "Phase 3: Text Renderer"
        - "Phase 4: CLI"
        - "Phase 5: Extended Directives"
        - "Phase 6: Additional Renderers"
        - "Phase 7: Missing Metadata"
        - "Phase 8: Additional Section Environments"
        - "Phase 9: Inline Markup"
        - "Phase 10: Font, Size, Color Directives"
        - "Phase 11: Page Control and Multi-page PDF"
        - "Phase 12: Image Directive"
        - "Phase 13: Configuration File System"
        - "Phase 14: Chord Diagram Rendering"
        - "Phase 15: Delegate Environments"
        - "Phase 16: Conditional Directive Selectors"
        - "Phase 17: Multi-song Files"
        - "Phase 18: Perl Compatibility Testing"
        - "Phase 19: Production Readiness & Publishing"
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      options:
        - "Small (< 1 hour)"
        - "Medium (1-4 hours)"
        - "Large (4+ hours)"
    validations:
      required: true
