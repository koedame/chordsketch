name: Ruby Gem

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/ffi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "packages/ruby/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ruby.yml"
  pull_request:
    paths:
      - "crates/ffi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "packages/ruby/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ruby.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g., v0.1.0). Leave empty to build from the workflow's ref without publishing."
        required: false
        type: string

# Cancel stale PR runs when a new commit is pushed to the same PR so
# that rebase / force-push does not leave two parallel Ruby builds
# competing for the macOS 5-job concurrency cap. `main` pushes, tag
# pushes, and `workflow_dispatch` / `release` events are not grouped
# with PRs and run to completion.
concurrency:
  group: ruby-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Build the linux-x86_64 native library first so that generate-and-test
  # can start as soon as this single artifact is ready, without waiting for
  # the slower Windows build (see #1461).
  build-native-linux-x64:
    name: Build native library (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ruby-x86_64-unknown-linux-gnu
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build
        run: cargo build -p chordsketch-ffi --release --target x86_64-unknown-linux-gnu

      - name: Upload native library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/libchordsketch_ffi.so
          retention-days: 7

  # Build the remaining 4 native targets in parallel with generate-and-test.
  # These are only needed by publish (release runs), not by generate-and-test.
  build-native-others:
    name: Build native library (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    # Intentionally fail-closed: if any native-library matrix cell
    # fails, the downstream `publish` job (needs: build-native-linux-x64,
    # build-native-others, generate-and-test) is skipped. The RubyGems
    # gem bundles every platform's native library; a missing triple
    # means `require 'chordsketch'` fails at runtime on that platform
    # with no fallback. Blocking the release until all cells succeed
    # is the safer failure mode. Contrast with
    # `vscode-extension.yml build-platform`, which has a universal
    # VSIX fallback (#1795). See #1806.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            lib: libchordsketch_ffi.so
            platform_dir: aarch64-linux
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            lib: libchordsketch_ffi.dylib
            platform_dir: aarch64-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            lib: libchordsketch_ffi.dylib
            platform_dir: x86_64-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: chordsketch_ffi.dll
            platform_dir: x86_64-windows
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ruby-${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build -p chordsketch-ffi --release --target ${{ matrix.target }}

      - name: Upload native library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib }}
          retention-days: 7

  generate-and-test:
    name: Generate bindings and test
    # Wait only on the linux-x64 artifact, which is the only one consumed by
    # this job.  The remaining targets (build-native-others) run in parallel
    # and are joined by publish for release completeness.
    needs: [build-native-linux-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ruby-generate
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build FFI crate
        run: cargo build -p chordsketch-ffi

      - name: Generate Ruby bindings
        # Generating directly into `packages/ruby/lib/` overwrites the
        # committed platform-aware loader at `packages/ruby/lib/chordsketch.rb`
        # because UniFFI names the file after the .udl namespace
        # (also `chordsketch`). Generate into a temporary directory and
        # move only the binding file out as `chordsketch_uniffi.rb`.
        #
        # Then rewrite the `ffi_lib 'chordsketch_ffi'` line to use the
        # absolute path exposed by the loader as `Chordsketch::NATIVE_LIB_PATH`.
        # ffi gem 1.17+ ignores RTLD_GLOBAL pre-loaded handles when looking
        # up libraries by bare name, so the previous loader's
        # `FFI::DynamicLibrary.open(..., RTLD_GLOBAL)` approach didn't work.
        # See #1082 for the full root-cause analysis.
        run: |
          mkdir -p .uniffi-tmp
          cargo run -p chordsketch-ffi --bin uniffi-bindgen generate \
            --library target/debug/libchordsketch_ffi.so \
            --language ruby \
            --out-dir .uniffi-tmp/
          # Use Python to do the rewrite (more robust than sed across
          # subtle UniFFI output-format changes — handles whitespace and
          # quote-style variation, and prints the matched line for clarity).
          python3 - <<'PYTHON'
          import re, sys
          path = ".uniffi-tmp/chordsketch.rb"
          with open(path) as f:
              content = f.read()
          # Match a line whose first non-whitespace token is `ffi_lib`
          # followed by something containing `chordsketch_ffi`. Tolerant
          # of single/double quotes, optional `.so`/etc suffix, and any
          # indentation.
          pat = re.compile(
              r'^([ \t]*)ffi_lib[ \t]+[\'"][^\'"]*chordsketch_ffi[^\'"]*[\'"][ \t]*$',
              re.MULTILINE,
          )
          m = pat.search(content)
          if not m:
              # Print the surrounding lines so we can update the regex
              # if UniFFI's output format ever changes.
              sys.stderr.write(
                  "ERROR: could not find ffi_lib line for chordsketch_ffi.\n"
                  "Lines mentioning ffi_lib in the generated file:\n"
              )
              for i, line in enumerate(content.splitlines(), 1):
                  if "ffi_lib" in line:
                      sys.stderr.write(f"  {i}: {line!r}\n")
              sys.exit(1)
          new_content, n = pat.subn(r"\1ffi_lib Chordsketch::NATIVE_LIB_PATH", content)
          if n != 1:
              sys.stderr.write(f"ERROR: expected exactly 1 ffi_lib substitution, got {n}\n")
              sys.exit(1)
          with open(path, "w") as f:
              f.write(new_content)
          print(f"OK: rewrote 1 ffi_lib line in {path} (matched line was: {m.group(0)!r})")
          PYTHON
          mv .uniffi-tmp/chordsketch.rb packages/ruby/lib/chordsketch_uniffi.rb
          rm -rf .uniffi-tmp/

      - name: Download native library (linux-x86-64)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: native-x86_64-unknown-linux-gnu
          path: packages/ruby/lib/x86_64-linux/

      - name: Set up Ruby
        uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1
        with:
          ruby-version: "3.3"

      - name: Install dependencies
        run: gem install ffi minitest

      - name: Run tests
        working-directory: packages/ruby
        run: ruby -Ilib -Itest test/test_chordsketch.rb

      - name: Upload Ruby bindings
        # Uploaded after tests pass so the artifact represents a validated
        # binding file. The publish job downloads this instead of rebuilding
        # the FFI crate and re-running uniffi-bindgen. See #1448.
        # 7-day retention is sufficient; the artifact is only consumed within
        # the same workflow run by the publish job. See #1452.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ruby-bindings
          path: packages/ruby/lib/chordsketch_uniffi.rb
          retention-days: 7

  publish:
    name: Publish to RubyGems
    # Wait for all native builds AND generate-and-test to ensure the gem
    # contains validated bindings and every platform's native library.
    needs: [build-native-linux-x64, build-native-others, generate-and-test]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    # `id-token: write` exposes ACTIONS_ID_TOKEN_REQUEST_* env vars to the
    # job, which the rubygems/configure-rubygems-credentials action uses
    # to obtain a short-lived API token from RubyGems.org via the OIDC
    # trusted-publishing exchange. Do NOT add a `RUBYGEMS_API_KEY` secret
    # back here — that would silently downgrade us to long-lived
    # credentials. The trusted publisher must be pre-registered at
    #   https://rubygems.org/profile/oidc/pending_trusted_publishers
    # for this repo + workflow + environment, otherwise the very first
    # publish fails with 403 Forbidden. The environment name ("rubygems")
    # must match the environment gate set below.
    #
    # If the "rubygems" environment does not exist (fork, fresh instance), GitHub
    # cannot start this job. continue-on-error keeps the overall workflow green
    # when CI succeeded but publishing infrastructure is absent. See #1443.
    continue-on-error: true
    environment:
      name: rubygems
      url: https://rubygems.org/gems/chordsketch
    permissions:
      contents: read
      id-token: write
    # Enforce `bash -eo pipefail` in `run:` blocks. Scoped to this job
    # rather than workflow-level because ruby.yml has a Windows matrix
    # cell (build-native-others) whose `run:` blocks must keep pwsh
    # defaults. See issue #1845 (fix-propagation from PR #1821).
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Check required secrets present
        # RubyGems uses trusted publishing (OIDC), so there are no long-lived
        # secrets to assert. The post-release rollup in release-verify.yml is
        # the primary guard for "silently skipped" against this channel. See #1506.
        run: python3 scripts/check-env-secrets.py --channel rubygems

      - name: Detect OIDC availability
        # Probes whether GitHub is providing OIDC tokens for this job run.
        # ACTIONS_ID_TOKEN_REQUEST_URL is set when `id-token: write` is in
        # effect. If absent, the OIDC exchange in configure-rubygems-credentials
        # would fail; surfacing the skip here as a warning keeps the job exit-0
        # (consistent with the continue-on-error intent) while making it
        # visible in the run log.
        #
        # Placed before expensive downloads so that OIDC-unavailable runs
        # (e.g. forks without the rubygems environment) exit early without
        # spending CI minutes on artifact downloads. See #1448.
        #
        # Limitation: this probe cannot detect a misconfigured RubyGems trusted
        # publisher — that failure occurs inside the OIDC exchange within the
        # rubygems action and would still be absorbed by continue-on-error.
        # See #1445.
        id: oidc
        shell: bash
        run: |
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub OIDC token endpoint is unavailable; skipping RubyGems publish. Check that the environment exists and id-token: write permission is effective. See #1445."
          fi

      - name: Download Ruby bindings
        # Download the pre-built chordsketch_uniffi.rb from the
        # generate-and-test job instead of rebuilding the FFI crate and
        # re-running uniffi-bindgen. Eliminates the cargo build + bindgen
        # steps from this job. See #1448.
        if: steps.oidc.outputs.available == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ruby-bindings
          path: packages/ruby/lib/

      - name: Download all native libraries
        if: steps.oidc.outputs.available == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: native-*
          path: packages/ruby/lib/

      - name: Organize native libraries by platform
        if: steps.oidc.outputs.available == 'true'
        run: |
          cd packages/ruby/lib
          mkdir -p x86_64-linux aarch64-linux aarch64-darwin x86_64-darwin x86_64-windows
          mv native-x86_64-unknown-linux-gnu/* x86_64-linux/
          mv native-aarch64-unknown-linux-gnu/* aarch64-linux/
          mv native-aarch64-apple-darwin/* aarch64-darwin/
          mv native-x86_64-apple-darwin/* x86_64-darwin/
          mv native-x86_64-pc-windows-msvc/* x86_64-windows/
          rmdir native-*

      - name: Set up Ruby
        if: steps.oidc.outputs.available == 'true'
        uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1
        with:
          ruby-version: "3.3"

      - name: Configure RubyGems trusted publisher credentials
        if: steps.oidc.outputs.available == 'true'
        # Exchanges the GitHub Actions OIDC token for a short-lived
        # RubyGems API key and writes it to ~/.gem/credentials, which
        # `gem push` will pick up automatically. This action is the same
        # one rubygems/release-gem invokes internally; we use it directly
        # because release-gem assumes a Rake-based release flow and this
        # workflow drives `gem build`/`gem push` explicitly.
        uses: rubygems/configure-rubygems-credentials@bc6dd217f8a4f919d6835fcfefd470ef821f5c44 # v1.0.0

      - name: Build and push gem
        if: steps.oidc.outputs.available == 'true'
        working-directory: packages/ruby
        run: |
          gem build chordsketch.gemspec
          gem push chordsketch-*.gem
