name: Extended Tests

on:
  workflow_dispatch:

# Fail-closed default: jobs that need write scopes must opt in via
# job-level `permissions:`. See issue #1839.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  extended:
    name: Extended tests (external tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # NOTE: no Swatinem/rust-cache here. Per .claude/rules/ci-parallelization.md §2,
      # this workflow is `workflow_dispatch`-only and runs rarely, so its cache
      # entries will be evicted by GitHub's 7-day LRU before the next invocation.
      # Caching infrequent workflows delivers no wall-clock benefit and only adds
      # YAML noise. Do not add one back without updating the rule.

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Install abc2svg
        run: npm install -g abc2svg

      - name: Install Lilypond
        run: sudo apt-get update && sudo apt-get install -y lilypond

      - name: Install Perl ChordPro
        run: |
          sudo apt-get install -y cpanminus libperl-dev
          cpanm --notest App::Music::ChordPro

      - name: Verify tool installations
        run: |
          echo "=== abc2svg ==="
          abc2svg --version || echo "abc2svg installed (no --version)"
          echo "=== Lilypond ==="
          lilypond --version
          echo "=== Perl ChordPro ==="
          chordpro --version

      - name: Build release binary
        run: cargo build --release

      - name: Run ignored tests (external-tool tests)
        run: cargo test --workspace -- --ignored

      - name: Run Perl comparison (text)
        run: ./scripts/compare-with-perl.sh text

      - name: Run Perl comparison (html)
        run: ./scripts/compare-with-perl.sh html
