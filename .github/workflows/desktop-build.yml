name: Desktop Build

# Builds the unsigned ChordSketch desktop bundles across macOS
# (x86_64 + aarch64), Windows (x86_64), and Linux (x86_64). This is
# the build matrix referenced by follow-up desktop distribution
# issues:
#   - #2075 signing / notarization layers on top of these bundles
#   - #2078 GitHub Releases uploads consume these artefacts
#   - #2076 auto-update relies on the signed macOS / Windows builds
#   - #2079 Homebrew Cask formula consumes the macOS dmgs
#
# Kept separate from `ci.yml`'s `desktop-smoke` job because a full
# Tauri bundle build is ~5-10 minutes per runner; running the full
# matrix on every PR would blow the macOS-slot ceiling (see
# `.claude/rules/ci-parallelization.md` §5 on the 5-job macOS cap
# and `.claude/rules/one-pr-at-a-time.md` on the rationale for
# keeping the pipeline short).
#
# Triggers:
#   - push to main: produces artefacts for every merged change
#     touching the desktop build graph, which future release PRs
#     can download without rebuilding from scratch.
#   - pull_request with paths filter: catches regressions in
#     desktop-specific code without firing on every unrelated PR.
#   - workflow_dispatch: manual re-run when infra flakes or when
#     someone wants an ad-hoc artefact.

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "packages/npm/**"
      - "packages/tree-sitter-chordpro/**"
      - "packages/ui-web/**"
      # Only the three crates `chordsketch-desktop` depends on —
      # `chordpro`, `render-html`, `render-pdf`. Changes to sibling
      # crates (`lsp`, `ffi`, `napi`, `wasm`, `cli`,
      # `convert-musicxml`) never affect the desktop bundle, so they
      # MUST not trigger the 4-cell macOS/Windows/Linux matrix.
      # Extending this list requires a matching edit to
      # `apps/desktop/src-tauri/Cargo.toml`'s `[dependencies]`.
      - "crates/chordpro/**"
      - "crates/render-html/**"
      - "crates/render-pdf/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/desktop-build.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/npm/**"
      - "packages/tree-sitter-chordpro/**"
      - "packages/ui-web/**"
      # Only the three crates `chordsketch-desktop` depends on —
      # `chordpro`, `render-html`, `render-pdf`. Changes to sibling
      # crates (`lsp`, `ffi`, `napi`, `wasm`, `cli`,
      # `convert-musicxml`) never affect the desktop bundle, so they
      # MUST not trigger the 4-cell macOS/Windows/Linux matrix.
      # Extending this list requires a matching edit to
      # `apps/desktop/src-tauri/Cargo.toml`'s `[dependencies]`.
      - "crates/chordpro/**"
      - "crates/render-html/**"
      - "crates/render-pdf/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

# PR-scoped cancel-in-progress per the §5 shape in
# `.claude/rules/ci-parallelization.md`: force-pushes to the same
# PR cancel the stale run so the macOS 5-slot ceiling does not
# fill with superseded speculative work. Push-to-main and
# workflow_dispatch runs always complete.
concurrency:
  group: desktop-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Fail-closed default — any future secret-bearing step (signing
# once #2075 lands) must opt in explicitly via job-level
# `permissions:`. See issue #1839.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform.label }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      # Per-platform failures are independent — a webkit2gtk
      # regression on Linux should not hide a WebView2 issue on
      # Windows. Don't short-circuit the matrix.
      fail-fast: false
      matrix:
        platform:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
          - label: macos-x86_64
            # Cross-compile x86_64 from the Apple Silicon
            # `macos-latest` runner rather than pinning to the
            # `macos-13` Intel runner, which "cannot be reliably
            # allocated for this repository" per #1084 — the
            # python workflow accepts that CI gap the same way.
            # `rustup target add x86_64-apple-darwin` lands
            # implicitly via `dtolnay/rust-toolchain`'s `targets:`
            # input below, and Xcode on the GitHub runner ships
            # the Intel toolchain, so `cargo tauri build --target
            # x86_64-apple-darwin` is a drop-in replacement for
            # the dedicated Intel runner.
            runner: macos-latest
            target: x86_64-apple-darwin
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Desktop bundle build steps
        # Rust toolchain + rust-cache + Tauri system deps + wasm-pack
        # + Tauri CLI + Node.js + `npm` ceremony + `cargo tauri
        # build`. The composite is shared with `desktop-release.yml`
        # so a bump to any of those tools lands in exactly one place
        # (#2223).
        uses: ./.github/actions/desktop-build-steps
        with:
          target: ${{ matrix.platform.target }}
          # Full `rust-cache` enabled; PR-smoke fires on every
          # desktop-touching PR so the cache is warm.
          enable-cache: "true"
          cache-key-prefix: desktop-build

      - name: List bundle outputs
        # Debug aid — when #2078 (Releases upload) wires the
        # final distribution step, the paths it needs are in the
        # step log here. Also makes bundle-target drift (Tauri
        # adding a new default target silently) visible in CI
        # output. `apps/desktop/src-tauri` is a workspace member,
        # so cargo writes into the ROOT `target/` dir, not the
        # per-crate one — hence the repo-root-relative path
        # below. Verified locally against the Linux bundle.
        shell: bash
        run: |
          BUNDLE_DIR="target/${{ matrix.platform.target }}/release/bundle"
          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -type f | sort
          else
            echo "No bundle dir at $BUNDLE_DIR"
          fi

      - name: Upload bundle artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chordsketch-desktop-${{ matrix.platform.label }}
          # Glob every native installer format Tauri produces on
          # each platform. `.app` bundles ship as directories so
          # the `.app.tar.gz` pattern catches the tarball variant
          # Tauri writes alongside the `.app`. Paths are
          # workspace-root-relative (see the "List bundle outputs"
          # step above for the rationale).
          path: |
            target/${{ matrix.platform.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.platform.target }}/release/bundle/macos/*.app.tar.gz
            target/${{ matrix.platform.target }}/release/bundle/msi/*.msi
            target/${{ matrix.platform.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.platform.target }}/release/bundle/deb/*.deb
            target/${{ matrix.platform.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.platform.target }}/release/bundle/appimage/*.AppImage
          # Warn (not fail) on empty cells so a platform that
          # doesn't emit a particular installer type (e.g. macOS
          # doesn't produce a .deb) still uploads the formats it
          # does emit.
          if-no-files-found: warn
          # 14 days is long enough to let #2078 (Releases upload)
          # round-trip the artefacts during development without
          # pinning unnecessary storage indefinitely.
          retention-days: 14
