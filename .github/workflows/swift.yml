name: Swift Package

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/ffi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "packages/swift/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/swift.yml"
  pull_request:
    paths:
      - "crates/ffi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "packages/swift/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/swift.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g., v0.1.0). Leave empty to build from the workflow's ref without publishing."
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # When triggered via workflow_dispatch with a tag input, build
          # from that tag rather than the workflow's default ref. This
          # is what allows historical tags (e.g., v0.1.0) to be re-built
          # for one-shot remediation. For other triggers, fall through
          # to github.ref via the OR fallback.
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          rustup target add x86_64-apple-ios

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: swift

      - name: Build libraries
        run: |
          cargo build -p chordsketch-ffi --release --target aarch64-apple-darwin
          cargo build -p chordsketch-ffi --release --target x86_64-apple-darwin
          cargo build -p chordsketch-ffi --release --target aarch64-apple-ios
          cargo build -p chordsketch-ffi --release --target aarch64-apple-ios-sim
          cargo build -p chordsketch-ffi --release --target x86_64-apple-ios

      - name: Generate Swift bindings
        run: |
          cargo run -p chordsketch-ffi --bin uniffi-bindgen generate \
            --library target/aarch64-apple-darwin/release/libchordsketch_ffi.dylib \
            --language swift \
            --out-dir generated

      - name: Create universal libraries
        run: |
          # macOS universal (arm64 + x86_64)
          mkdir -p universal/macos
          lipo -create \
            target/aarch64-apple-darwin/release/libchordsketch_ffi.a \
            target/x86_64-apple-darwin/release/libchordsketch_ffi.a \
            -output universal/macos/libchordsketch_ffi.a

          # iOS simulator universal (arm64 + x86_64)
          mkdir -p universal/ios-sim
          lipo -create \
            target/aarch64-apple-ios-sim/release/libchordsketch_ffi.a \
            target/x86_64-apple-ios/release/libchordsketch_ffi.a \
            -output universal/ios-sim/libchordsketch_ffi.a

      - name: Set up module map for XCFramework
        run: |
          mkdir -p generated/include
          # Use the UniFFI-generated modulemap which correctly declares
          # `module` (not `framework module`) for the static library and
          # includes the necessary `use` declarations for the C standard library.
          cp generated/chordsketchFFI.modulemap generated/include/module.modulemap
          cp generated/chordsketchFFI.h generated/include/

      - name: Create XCFramework
        run: |
          xcodebuild -create-xcframework \
            -library universal/macos/libchordsketch_ffi.a \
            -headers generated/include \
            -library target/aarch64-apple-ios/release/libchordsketch_ffi.a \
            -headers generated/include \
            -library universal/ios-sim/libchordsketch_ffi.a \
            -headers generated/include \
            -output chordsketchFFI.xcframework

      - name: Copy generated Swift source
        run: |
          cp generated/chordsketch.swift packages/swift/Sources/ChordSketch/

      - name: Run Swift tests
        run: |
          # Copy XCFramework into the Swift package directory
          cp -R chordsketchFFI.xcframework packages/swift/

          # Replace only the binaryTarget in Package.swift with a local path,
          # preserving any other changes to the file (platforms, products, etc.).
          # Uses parenthesis counting (not regex) so URLs/checksums containing
          # literal `)` are handled correctly.
          python3 << 'PYTHON'
          import re
          path = "packages/swift/Package.swift"
          with open(path) as f:
              content = f.read()

          # Find the start of .binaryTarget(... for chordsketchFFI
          header_re = re.compile(
              r'\.binaryTarget\(\s*name:\s*"chordsketchFFI"',
              re.DOTALL,
          )
          match = header_re.search(content)
          if not match:
              raise SystemExit("Could not find .binaryTarget for chordsketchFFI")

          # Walk forward, counting parens, to find the matching close paren.
          # Skip parens that appear inside Swift "..." string literals so
          # URLs like "https://example.com/v1.0).zip" don't fool the counter.
          # Also handles \" escape sequences inside strings.
          start = match.start()
          # The opening `(` is part of `.binaryTarget(`
          paren_pos = content.index('(', start)
          depth = 1
          i = paren_pos + 1
          in_string = False
          while i < len(content) and depth > 0:
              ch = content[i]
              if in_string:
                  if ch == '\\' and i + 1 < len(content):
                      # Skip the escaped character.
                      i += 2
                      continue
                  if ch == '"':
                      in_string = False
              else:
                  if ch == '"':
                      in_string = True
                  elif ch == '(':
                      depth += 1
                  elif ch == ')':
                      depth -= 1
              i += 1
          if depth != 0:
              raise SystemExit("Unbalanced parentheses in .binaryTarget block")
          end = i  # one past the closing `)`

          # Verify there is no second .binaryTarget for chordsketchFFI elsewhere.
          if header_re.search(content, end):
              raise SystemExit(
                  "Found more than one .binaryTarget for chordsketchFFI"
              )

          replacement = (
              '.binaryTarget(\n'
              '            name: "chordsketchFFI",\n'
              '            path: "chordsketchFFI.xcframework"\n'
              '        )'
          )
          new_content = content[:start] + replacement + content[end:]
          with open(path, "w") as f:
              f.write(new_content)
          PYTHON

          cd packages/swift
          swift test

      - name: Package XCFramework
        run: |
          zip -r chordsketch-xcframework.zip chordsketchFFI.xcframework

      - name: Upload XCFramework
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: xcframework
          path: chordsketch-xcframework.zip
          retention-days: 7

      - name: Upload Swift source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: swift-source
          path: generated/chordsketch.swift
          retention-days: 7

  publish:
    name: Publish XCFramework
    needs: [build-xcframework]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: xcframework

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          gh release upload "$TAG" chordsketch-xcframework.zip \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
