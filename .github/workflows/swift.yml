name: Swift Package

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/ffi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "packages/swift/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/swift.yml"
  pull_request:
    paths:
      - "crates/ffi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "packages/swift/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/swift.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g., v0.1.0). Leave empty to build from the workflow's ref without publishing."
        required: false
        type: string

# Cancel stale PR runs when a new commit is pushed to the same PR so
# that rebase / force-push does not leave two parallel Swift builds
# competing for the macOS 5-job concurrency cap. `main` pushes, tag
# pushes, and `workflow_dispatch` / `release` events are not grouped
# with PRs and run to completion.
concurrency:
  group: swift-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Ensure `run:` blocks use `bash -eo pipefail`, not the silent default that
# swallows mid-pipe failures. swift.yml has no Windows matrix, so a
# workflow-level default is safe (fix-propagation from PR #1821, issue #1845).
# `-u` is added on top (issue #1836) so a typo'd env-var reference fails
# loud; every block in this workflow already runs `set -euo pipefail`
# explicitly, making the default strictly defense-in-depth.
defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  # Build each Apple target on its own runner in parallel.
  # The aarch64-apple-darwin cell also produces the dylib that uniffi-bindgen
  # needs in the assemble job. All five cells upload a static library artifact;
  # the aarch64-apple-darwin cell additionally uploads the dylib.
  #
  # Per-target shared-key avoids cache thrashing: different targets produce
  # different compiled objects and polluting a shared key forces cache misses.
  build-target:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    # Intentionally fail-closed: if any Apple target fails, the
    # downstream `assemble-xcframework` + `publish` jobs are skipped.
    # XCFramework is a sealed container of per-platform static
    # libraries; missing a triple produces an incomplete framework
    # that breaks Swift consumers on that platform at link time.
    # Blocking the release until every cell succeeds is the safer
    # failure mode. Contrast with `vscode-extension.yml
    # build-platform`, which has a universal VSIX fallback (#1795).
    # See #1806.
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
          - target: aarch64-apple-ios
          - target: aarch64-apple-ios-sim
          - target: x86_64-apple-ios
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: swift-${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build library for ${{ matrix.target }}
        run: cargo build -p chordsketch-ffi --release --target ${{ matrix.target }}

      - name: Upload static library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: swift-lib-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libchordsketch_ffi.a
          retention-days: 1
          if-no-files-found: error

      # The dylib is only produced for the macOS target and is only needed in
      # the assemble job to let uniffi-bindgen extract the library metadata.
      - name: Upload dylib (aarch64-apple-darwin only, for uniffi-bindgen)
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: swift-dylib-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/libchordsketch_ffi.dylib
          retention-days: 1
          if-no-files-found: error

  # Download the 5 static libraries and dylib built in parallel above, then
  # assemble the XCFramework, generate Swift bindings, and run swift test.
  # Uses rust-cache (shared-key: swift-assemble) to avoid recompiling the
  # uniffi-bindgen host binary on every run.
  assemble-xcframework:
    name: Assemble XCFramework
    needs: [build-target]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # When triggered via workflow_dispatch with a tag input, build
          # from that tag rather than the workflow's default ref. This
          # is what allows historical tags (e.g., v0.1.0) to be re-built
          # for one-shot remediation. For other triggers, fall through
          # to github.ref via the OR fallback.
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Cache the workspace target/ so that the uniffi-bindgen host binary
      # is compiled once and reused. Without this, every assemble run
      # re-compiles uniffi-bindgen (~60s cold; 0s warm).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: swift-assemble
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Download static libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: swift-lib-*
          # Each artifact downloads to its own subdirectory, e.g.:
          # swift-lib-aarch64-apple-darwin/libchordsketch_ffi.a
          # swift-lib-x86_64-apple-darwin/libchordsketch_ffi.a
          # etc.

      - name: Download dylib for uniffi-bindgen
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: swift-dylib-aarch64-apple-darwin
          # Downloads libchordsketch_ffi.dylib to CWD

      - name: Generate Swift bindings
        run: |
          cargo run -p chordsketch-ffi --bin uniffi-bindgen generate \
            --library libchordsketch_ffi.dylib \
            --language swift \
            --out-dir generated

      - name: Create universal libraries
        run: |
          # macOS universal (arm64 + x86_64)
          mkdir -p universal/macos
          lipo -create \
            swift-lib-aarch64-apple-darwin/libchordsketch_ffi.a \
            swift-lib-x86_64-apple-darwin/libchordsketch_ffi.a \
            -output universal/macos/libchordsketch_ffi.a

          # iOS simulator universal (arm64 + x86_64)
          mkdir -p universal/ios-sim
          lipo -create \
            swift-lib-aarch64-apple-ios-sim/libchordsketch_ffi.a \
            swift-lib-x86_64-apple-ios/libchordsketch_ffi.a \
            -output universal/ios-sim/libchordsketch_ffi.a

      - name: Set up module map for XCFramework
        run: |
          mkdir -p generated/include
          # Use the UniFFI-generated modulemap which correctly declares
          # `module` (not `framework module`) for the static library and
          # includes the necessary `use` declarations for the C standard library.
          cp generated/chordsketchFFI.modulemap generated/include/module.modulemap
          cp generated/chordsketchFFI.h generated/include/

      - name: Create XCFramework
        run: |
          xcodebuild -create-xcframework \
            -library universal/macos/libchordsketch_ffi.a \
            -headers generated/include \
            -library swift-lib-aarch64-apple-ios/libchordsketch_ffi.a \
            -headers generated/include \
            -library universal/ios-sim/libchordsketch_ffi.a \
            -headers generated/include \
            -output chordsketchFFI.xcframework

      - name: Copy generated Swift source
        run: |
          cp generated/chordsketch.swift packages/swift/Sources/ChordSketch/

      - name: Run Swift tests
        run: |
          # Copy XCFramework into the Swift package directory
          cp -R chordsketchFFI.xcframework packages/swift/

          # Replace only the binaryTarget in Package.swift with a local path,
          # preserving any other changes to the file (platforms, products, etc.).
          # Uses parenthesis counting (not regex) so URLs/checksums containing
          # literal `)` are handled correctly.
          python3 << 'PYTHON'
          import re
          path = "packages/swift/Package.swift"
          with open(path) as f:
              content = f.read()

          # Find the start of .binaryTarget(... for chordsketchFFI
          header_re = re.compile(
              r'\.binaryTarget\(\s*name:\s*"chordsketchFFI"',
              re.DOTALL,
          )
          match = header_re.search(content)
          if not match:
              raise SystemExit("Could not find .binaryTarget for chordsketchFFI")

          # Walk forward, counting parens, to find the matching close paren.
          # Skip parens that appear inside Swift "..." string literals so
          # URLs like "https://example.com/v1.0).zip" don't fool the counter.
          # Also handles \" escape sequences inside strings.
          start = match.start()
          # The opening `(` is part of `.binaryTarget(`
          paren_pos = content.index('(', start)
          depth = 1
          i = paren_pos + 1
          in_string = False
          while i < len(content) and depth > 0:
              ch = content[i]
              if in_string:
                  if ch == '\\' and i + 1 < len(content):
                      # Skip the escaped character.
                      i += 2
                      continue
                  if ch == '"':
                      in_string = False
              else:
                  if ch == '"':
                      in_string = True
                  elif ch == '(':
                      depth += 1
                  elif ch == ')':
                      depth -= 1
              i += 1
          if depth != 0:
              raise SystemExit("Unbalanced parentheses in .binaryTarget block")
          end = i  # one past the closing `)`

          # Verify there is no second .binaryTarget for chordsketchFFI elsewhere.
          if header_re.search(content, end):
              raise SystemExit(
                  "Found more than one .binaryTarget for chordsketchFFI"
              )

          replacement = (
              '.binaryTarget(\n'
              '            name: "chordsketchFFI",\n'
              '            path: "chordsketchFFI.xcframework"\n'
              '        )'
          )
          new_content = content[:start] + replacement + content[end:]
          with open(path, "w") as f:
              f.write(new_content)
          PYTHON

          cd packages/swift
          swift test

      - name: Package XCFramework
        run: |
          zip -r chordsketch-xcframework.zip chordsketchFFI.xcframework

      - name: Upload XCFramework
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: xcframework
          path: chordsketch-xcframework.zip
          retention-days: 7
          if-no-files-found: error

      - name: Upload Swift source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: swift-source
          path: generated/chordsketch.swift
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish XCFramework
    needs: [assemble-xcframework]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # Needed so the composite action at
        # `.github/actions/validate-release-tag` is present on disk.
        # actions/download-artifact below places the xcframework zip
        # at the workspace root next to the checked-out tree.

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: xcframework

      - name: Validate release tag
        # Format-validate the tag before `gh release upload` sees it. See #1797.
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ inputs.tag || github.ref_name }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          gh release upload "$TAG" chordsketch-xcframework.zip \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
