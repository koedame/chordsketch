name: README Sync Check

# Detect README install/usage changes that aren't reflected in CI coverage.
# When this fails, the author must either add coverage in
# .github/workflows/readme-smoke.yml and refresh the snapshot, or revert
# the README change.

on:
  pull_request:
    paths:
      - "README.md"
      - ".github/snapshots/readme-commands.txt"
      - "scripts/extract-readme-commands.py"
      - ".github/workflows/readme-sync.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - ".github/snapshots/readme-commands.txt"
      - "scripts/extract-readme-commands.py"
      - ".github/workflows/readme-sync.yml"

permissions:
  contents: read

jobs:
  check-readme-snapshot:
    name: Verify README install/usage snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Diff README install/usage snapshot
        run: python3 scripts/extract-readme-commands.py --check
