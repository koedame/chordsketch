name: Claude Dependabot Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: dependabot-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "dependabot[bot]"
          prompt: |
            You are reviewing a Dependabot dependency update PR.

            ## Review Steps

            1. **Understand the update**: Run `gh pr diff ${{ github.event.pull_request.number }}` to see what changed.
            2. **Check CI status**: Run `gh pr checks ${{ github.event.pull_request.number }}` — wait for all checks to pass. If CI is still running, wait and check again (up to 5 minutes).
            3. **Security review**:
               - Check if this is a major/minor/patch update
               - For major updates: look for breaking changes in the dependency's changelog
               - Check for known security advisories with `gh api /repos/${{ github.repository }}/vulnerability-alerts` or similar
            4. **Functional review**:
               - Verify the update is compatible with our codebase
               - For GitHub Actions updates: verify the action's new version doesn't change behavior we depend on
               - For Cargo dependency updates: run `cargo clippy --workspace --all-targets -- -D warnings` and `cargo test --workspace`
            5. **If CI fails**:
               - Diagnose the failure
               - If fixable (e.g., API change in new version), create a fix commit and push
               - If not fixable, leave a comment explaining the issue and request changes
            6. **If everything passes**:
               - Leave a review comment summarizing what you checked
               - Run `gh pr review ${{ github.event.pull_request.number }} --approve --body "Automated Claude Code review: CI passed, no breaking changes or security issues detected."`
               - Run `gh pr merge ${{ github.event.pull_request.number }} --squash --auto`

            ## Important
            - Follow all rules in CLAUDE.md and .claude/rules/
            - Be thorough with security checks — this is automated, so extra caution is warranted
            - Always explain your reasoning in a PR comment before approving or requesting changes
