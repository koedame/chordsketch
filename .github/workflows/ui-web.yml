name: "@chordsketch/ui-web"

# Typecheck and run vitest unit tests for @chordsketch/ui-web. The
# package is private (not published) and shared between the browser
# playground and the desktop app — both `desktop-smoke` (in `ci.yml`)
# and `deploy-playground.yml` already build it transitively, but
# neither runs vitest. This workflow exercises the framework-agnostic
# routing logic (#2362) directly so a regression surfaces against
# this PR rather than only when the consumer that built ui-web
# discovers an HTML / SVG drift.

on:
  push:
    branches: [main]
    paths:
      - 'packages/ui-web/**'
      - '.github/workflows/ui-web.yml'
  pull_request:
    paths:
      - 'packages/ui-web/**'
      - '.github/workflows/ui-web.yml'

# Cancel stale PR runs on force-push / rebase. Main / workflow_dispatch
# runs always go to completion (gated on pull_request event).
concurrency:
  group: ui-web-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: packages/ui-web

jobs:
  typecheck-and-test:
    name: Typecheck and test @chordsketch/ui-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/ui-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Run vitest tests
        run: npm test
