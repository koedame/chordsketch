name: "@chordsketch/react-ui"

# Lint, typecheck, build, and smoke-test the @chordsketch/react-ui
# package on every PR that touches it, plus pushes to main for
# post-merge verification. Publish-on-tag is intentionally NOT handled
# here — per ADR-0008, every npm publish for every ChordSketch-distributed
# package is a maintainer-local manual operation. The maintainer runs
# `cd packages/react-ui && npm run build && npm publish --access public`
# on the release machine.
#
# Unlike @chordsketch/react, this package carries no wasm dependency
# (ADR-0029), so there is deliberately no Rust toolchain / wasm-pack /
# in-tree wasm build step — npm ci alone resolves everything it needs.

on:
  push:
    branches: [main]
    paths:
      - 'packages/react-ui/**'
      - '.github/workflows/react-ui.yml'
  pull_request:
    paths:
      - 'packages/react-ui/**'
      - '.github/workflows/react-ui.yml'

# Cancel stale PR runs on force-push / rebase. Main / workflow_dispatch
# runs always go to completion (gated on pull_request event).
concurrency:
  group: react-ui-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: packages/react-ui

jobs:
  build-and-test:
    name: Build and test @chordsketch/react-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/react-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Run vitest tests
        run: npm test

      - name: Build (tsup ESM + CJS + .d.ts)
        run: npm run build

      - name: Verify dist/ contents
        run: |
          set -euo pipefail
          test -f dist/index.js     # ESM
          test -f dist/index.cjs    # CJS
          test -f dist/index.d.ts   # Types for the ESM branch
          test -f dist/index.d.cts  # Types for the CJS branch
          test -f dist/styles.css   # Component stylesheet
          echo "dist/ contents:"
          ls -la dist/
