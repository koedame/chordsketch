name: Claude Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  request-review:
    # Only run when CI succeeds on a pull request (not push to main)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Request Claude review
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.CLAUDE_PAT }}
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              console.log('No pull requests found (fork PRs are excluded for security)');
              return;
            }

            const prNumber = prs[0].number;
            const headSha = context.payload.workflow_run.head_sha;

            // Skip Dependabot PRs — reviewed manually via the
            // `/dependabot-review` slash command, not by this workflow.
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.user.login === 'dependabot[bot]') {
              console.log('Skipping Dependabot PR (handled separately)');
              return;
            }

            // Fetch all existing comments to prevent duplicates and limit iterations
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            if (comments.length > 100) {
              console.log(`Note: PR #${prNumber} has ${comments.length} comments (paginated fetch)`);
            }

            // Skip if this commit was already reviewed
            const marker = `<!-- claude-auto-review:${headSha} -->`;
            if (comments.some(c => c.body.includes(marker))) {
              console.log(`Review already requested for commit ${headSha}`);
              return;
            }

            // Limit auto-review iterations to prevent infinite loops.
            // claude[bot] fix commits are NOT skipped — they get delta-reviewed.
            // MAX_ITERATIONS is the safety cap.
            const MAX_ITERATIONS = 3;
            const autoReviewCount = comments.filter(c =>
              c.body.startsWith('<!-- claude-auto-review:')
            ).length;
            if (autoReviewCount >= MAX_ITERATIONS) {
              console.log(`Max auto-review iterations (${MAX_ITERATIONS}) reached for PR #${prNumber}`);
              return;
            }

            // Find the SHA from the previous auto-review (if any) for delta review
            const previousMarkers = comments
              .filter(c => c.body.startsWith('<!-- claude-auto-review:'))
              .map(c => {
                const match = c.body.match(/<!-- claude-auto-review:([a-f0-9]+) -->/);
                return match ? match[1] : null;
              })
              .filter(Boolean);
            const previousSha = previousMarkers.length > 0
              ? previousMarkers[previousMarkers.length - 1]
              : null;

            const isFirstReview = previousSha === null;
            const reviewType = isFirstReview ? 'Full review' : 'Delta review';
            const deltaInstruction = isFirstReview
              ? 'Review the entire PR diff (`gh pr diff`).'
              : `This is a **delta review**. Only review changes since commit \`${previousSha.substring(0, 7)}\`. Use \`git diff ${previousSha}..${headSha}\` to see only the new changes. Do NOT re-review previously-accepted code.`;

            // Post review request comment (triggers claude.yml via @claude mention)
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                marker,
                '',
                `@claude ${reviewType} requested for commit \`${headSha.substring(0, 7)}\`.`,
                '',
                deltaInstruction,
                '',
                '## Review Instructions',
                '',
                'Perform both **code review** and **security review**. Classify every finding by severity so fix commits are ordered sensibly. **Every severity is resolved in this PR before merge — there is no "non-blocking / file as follow-up issue" path.** See `.claude/rules/pr-workflow.md` §Automated Flow for the full rationale.',
                '',
                '| Severity | Definition |',
                '|----------|------------|',
                '| High | Security vulnerabilities, data corruption, crashes |',
                '| Medium | Spec violations, logic bugs, incorrect output |',
                '| Low | Defense-in-depth gaps, minor inconsistencies, portability |',
                '| Nit | Style, naming, test coverage suggestions |',
                '',
                '## Actions',
                '',
                '- **Findings (every severity):** Push fix commits directly to the PR branch, High first through Nit last. Do NOT call `gh issue create` for review findings — the in-PR-resolution rule replaces that flow. If something is genuinely out of scope for this PR, record it in the PR body under a "Deferred" heading with a one-line justification instead of a new issue.',
                '- **No findings at all:** Post a single summary comment listing what was checked and explicitly state "Ready for human merge." Do NOT run `gh pr merge`. Bots do not merge in this repo — a human inspects the check rollup and performs the squash merge.',
                '- **Delta reviews:** Same in-PR-resolution rule. If the delta review surfaces even a Nit the prior iteration missed, fix it with another commit and re-trigger review. Convergence criterion is "delta review is empty", not "no blocking findings".',
              ].join('\n'),
            });

            console.log(`${reviewType} requested for PR #${prNumber} at ${headSha.substring(0, 7)}`);
