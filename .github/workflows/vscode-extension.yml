name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - "packages/vscode-extension/**"
      - "syntaxes/**"
      - ".github/workflows/vscode-extension.yml"
  pull_request:
    paths:
      - "packages/vscode-extension/**"
      - "syntaxes/**"
      - ".github/workflows/vscode-extension.yml"
  # GitHub Release publication triggers the publish job below.
  # This event is path-filter-free, so the publish job always runs on release.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Leave blank to run CI on HEAD without publishing."
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build & Package Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/vscode-extension/package-lock.json

      # Both the web build (for the WebView preview) and the node build (for the
      # convertTo export command) must be present so esbuild.mjs can:
      #   - bundle the web JS glue and copy the .wasm binary into dist/webview/
      #   - copy the node JS and .wasm binary into dist/node/
      # We restore from the npm registry rather than building from source
      # so this CI job has no Rust toolchain dependency.
      - name: Install @chordsketch/wasm (web + node builds)
        run: |
          mkdir -p packages/npm
          cd packages/npm
          npm pack @chordsketch/wasm@latest 2>/dev/null || true
          # Unpack into packages/npm/ so esbuild.mjs can find packages/npm/web/ and packages/npm/node/
          if ls chordsketch-wasm-*.tgz 1>/dev/null 2>&1; then
            tar xzf chordsketch-wasm-*.tgz --strip-components=1
            echo "Unpacked @chordsketch/wasm"
          else
            echo "WARNING: @chordsketch/wasm not available from registry; WASM preview will be absent in this build."
          fi

      - name: Install dependencies
        run: npm ci
        working-directory: packages/vscode-extension

      - name: Type-check
        run: npm run lint
        working-directory: packages/vscode-extension

      - name: Unit tests
        run: npm test
        working-directory: packages/vscode-extension

      - name: Build
        run: npm run build
        working-directory: packages/vscode-extension

      - name: Package extension
        run: npm run package
        working-directory: packages/vscode-extension

      - name: Verify packaged files
        run: ./node_modules/.bin/vsce ls
        working-directory: packages/vscode-extension

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chordsketch-vsix
          path: packages/vscode-extension/*.vsix
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to VS Code Marketplace
    needs: [build]
    runs-on: ubuntu-latest
    # Publish only on GitHub Release (published) events or when workflow_dispatch supplies a tag.
    #
    # Prerequisites (one-time human setup before this job can succeed):
    #   1. Register publisher "koedame" at https://marketplace.visualstudio.com/manage
    #   2. Generate a Personal Access Token (PAT) with "Marketplace (Publish)" scope
    #      at https://dev.azure.com/koedame/_usersSettings/tokens
    #   3. Create the "vscode-marketplace" environment at
    #      https://github.com/koedame/chordsketch/settings/environments
    #      and add the PAT as the VSCE_PAT environment secret.
    #
    # If the "vscode-marketplace" environment does not exist (fork, fresh instance),
    # GitHub cannot start this job. continue-on-error keeps the overall workflow
    # green when CI succeeded but publishing infrastructure is absent. See #1443.
    continue-on-error: true
    environment:
      name: vscode-marketplace
      url: https://marketplace.visualstudio.com/items?itemName=koedame.chordsketch
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/vscode-extension/package-lock.json

      - name: Install dependencies (for vsce)
        run: npm ci
        working-directory: packages/vscode-extension

      - name: Download VSIX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: chordsketch-vsix
          path: packages/vscode-extension/

      - name: Publish to Marketplace
        # vsce reads VSCE_PAT from the environment natively (>= 3.x), so no --pat flag needed.
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: ./node_modules/.bin/vsce publish --packagePath *.vsix
        working-directory: packages/vscode-extension
