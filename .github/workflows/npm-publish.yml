name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.0). Required for manual triggers.'
        required: true
        type: string

env:
  WASM_PACK_VERSION: "0.14.0"

jobs:
  publish:
    name: Publish @chordsketch/wasm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --version "=$WASM_PACK_VERSION" --locked

      - name: Build WASM
        run: wasm-pack build crates/wasm --release --target web

      - name: Copy WASM artifacts to npm package
        run: cp crates/wasm/pkg/chordsketch_wasm* packages/npm/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Derive version from git tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          cd packages/npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        if: github.event_name == 'release'

      - name: Set version from workflow input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cd packages/npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        if: github.event_name == 'workflow_dispatch'

      - name: Check if version already published
        id: check
        run: |
          cd packages/npm
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
