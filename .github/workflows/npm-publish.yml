name: Verify @chordsketch/wasm build

# Per ADR-0008, npm publishing is a maintainer-local manual operation.
# This workflow no longer publishes — it only verifies that the
# @chordsketch/wasm package builds cleanly and packs into a valid
# tarball. The maintainer runs `cd packages/npm && npm run build &&
# npm publish` locally on the release machine.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set in package.json before verifying (e.g., 0.2.0).'
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Verify @chordsketch/wasm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      # NOTE: no Swatinem/rust-cache here. Per .claude/rules/ci-parallelization.md §2,
      # this workflow runs only a few times per month and GitHub Actions evicts
      # cache entries after 7 days of inactivity, so the cache expires between
      # runs. Adding rust-cache delivers no wall-clock benefit and only adds YAML
      # noise. Do not add one back without updating the rule.

      - name: Install wasm-pack
        uses: ./.github/actions/install-wasm-pack

      - name: Build WASM (web target)
        run: wasm-pack build crates/wasm --release --target web --out-dir ../../packages/npm/web

      - name: Build WASM (nodejs target)
        run: wasm-pack build crates/wasm --release --target nodejs --out-dir ../../packages/npm/node

      - name: Write sub-package.json files to scope module type
        # The dual-package layout requires each subdirectory to declare
        # its own module type so Node resolves them correctly:
        #   - web/  is wasm-pack --target web   → ESM
        #   - node/ is wasm-pack --target nodejs → CommonJS
        # The root package.json declares "type": "module" (for the web
        # entry), so the node subdir must override it back to commonjs.
        #
        # Output must be byte-for-byte identical to what
        # `packages/npm/scripts/build.mjs` produces locally
        # (`JSON.stringify({ type }, null, 2) + "\n"`), i.e.
        # 2-space-indented pretty JSON with a trailing newline.
        # See #1046 for the divergence that motivated this.
        run: |
          set -euo pipefail
          printf '%s\n' '{' '  "type": "module"' '}' > packages/npm/web/package.json
          printf '%s\n' '{' '  "type": "commonjs"' '}' > packages/npm/node/package.json

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Derive version from git tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          cd packages/npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        if: github.event_name == 'release'

      - name: Validate workflow_dispatch version
        if: github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/validate-release-version
        with:
          version: ${{ inputs.version }}

      - name: Set version from workflow input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cd packages/npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        if: github.event_name == 'workflow_dispatch'

      - name: Pack tarball (dry run)
        # Surfaces filename / size regressions without producing a
        # publish artefact. The maintainer's local `npm publish` is
        # the only operation that uploads to the registry.
        working-directory: packages/npm
        run: npm pack --dry-run
