name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.0). Required for manual triggers.'
        required: true
        type: string

env:
  WASM_PACK_VERSION: "0.14.0"

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Publish @chordsketch/wasm
    runs-on: ubuntu-latest
    # NPM_TOKEN is a repo-level secret, not an environment secret.
    # The `environment:` block was removed to avoid creating GitHub
    # deployment entries that stay in "failure" state when the granular
    # npm token cannot publish (see #1790).
    #
    # npm publish is done MANUALLY as part of the release checklist.
    # This workflow is kept as a convenience for cases where the token
    # does work, but failure is expected and non-blocking.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check required secrets present
        # Fails fast when NPM_TOKEN is missing so "environment missing →
        # silent skip" turns into a loud, diagnosable error. See #1506.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: python3 scripts/check-env-secrets.py --channel npm-wasm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2
        with:
          tool: wasm-pack@${{ env.WASM_PACK_VERSION }}

      - name: Build WASM (web target)
        run: wasm-pack build crates/wasm --release --target web --out-dir ../../packages/npm/web

      - name: Build WASM (nodejs target)
        run: wasm-pack build crates/wasm --release --target nodejs --out-dir ../../packages/npm/node

      - name: Write sub-package.json files to scope module type
        # The dual-package layout requires each subdirectory to declare
        # its own module type so Node resolves them correctly:
        #   - web/  is wasm-pack --target web   → ESM
        #   - node/ is wasm-pack --target nodejs → CommonJS
        # The root package.json declares "type": "module" (for the web
        # entry), so the node subdir must override it back to commonjs.
        #
        # Output must be byte-for-byte identical to what
        # `packages/npm/scripts/build.mjs` produces locally
        # (`JSON.stringify({ type }, null, 2) + "\n"`), i.e.
        # 2-space-indented pretty JSON with a trailing newline.
        # See #1046 for the divergence that motivated this.
        run: |
          set -euo pipefail
          printf '%s\n' '{' '  "type": "module"' '}' > packages/npm/web/package.json
          printf '%s\n' '{' '  "type": "commonjs"' '}' > packages/npm/node/package.json

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Derive version from git tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          cd packages/npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        if: github.event_name == 'release'

      - name: Validate workflow_dispatch version
        # Format-validate the user-supplied `inputs.version` before
        # passing it to `npm version`. `npm version` also rejects
        # non-semver, but the earlier, narrower check here matches
        # the validation point the rest of the release workflows
        # use (#1797) and fails with a consistent error message
        # instead of npm's opaque "not a valid version" output.
        if: github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/validate-release-version
        with:
          version: ${{ inputs.version }}

      - name: Set version from workflow input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cd packages/npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        if: github.event_name == 'workflow_dispatch'

      - name: Check if version already published
        id: check
        run: |
          cd packages/npm
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
