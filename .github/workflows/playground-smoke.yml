name: Playground Smoke

# Browser-level smoke for the playground bundle. Verifies that every
# editor adapter `mountChordSketchUi` can mount actually mounts in a
# real browser against the production-build dist — the integration
# layer the unit-test suites in `packages/ui-web/tests/` and
# `packages/ui-irealb-editor/tests/` cannot reach because they stub
# wasm. Introduced in #2397 after the iRealb factory shipped with a
# wasm-init race that no unit suite caught.
#
# Runs unconditionally on every PR (no `paths:` filter) per the
# guarantee-style-checks discipline in
# `.claude/rules/ci-parallelization.md`. The same rationale applies
# to push: main — a green smoke is the precondition the
# Deploy Playground workflow's deploy job relies on under branch
# protection. The two workflows are deliberately split: smoke is
# cheap enough to run on every PR, while the deploy workflow
# remains scoped to `paths:` because the artifact upload + Pages
# deploy is wasted work for unrelated PRs.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel stale PR runs on force-push / rebase. `main` and dispatch
# runs always go to completion. Pattern matches every other
# PR-cancellable workflow in this repo
# (`.claude/rules/ci-parallelization.md` §5).
concurrency:
  group: playground-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Distinct shared-key from the deploy workflow so the two
          # do not thrash each other's caches; both target the same
          # wasm32 triple but the keys document the consuming job.
          shared-key: playground-smoke-wasm32-unknown-unknown
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install wasm-pack
        uses: ./.github/actions/install-wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/playground/package-lock.json

      - name: Build @chordsketch/wasm (lean)
        run: npm run build
        working-directory: packages/npm

      # `@chordsketch/wasm-export` carries the heavy (PDF / PNG)
      # renderer surface split out from `@chordsketch/wasm` per
      # #2466. The playground aliases it to this directory's `web/`
      # output, so the build must run before the playground build
      # / smoke test — otherwise the dynamic `import(
      # '@chordsketch/wasm-export')` in `<PdfExport>` would 404
      # against an unbuilt artifact.
      - name: Build @chordsketch/wasm-export (heavy)
        run: npm run build
        working-directory: packages/npm-export

      - name: Install playground dependencies
        run: npm ci
        working-directory: packages/playground

      # Install sibling-package node_modules so tsc (run by
      # `npm run build`) can resolve the transitive react /
      # codemirror / lezer imports inside ../react/src/*.tsx
      # files when they are pulled into the playground's program
      # via tsconfig paths / include. Each sibling owns its own
      # lockfile and its own CI typecheck — installing here is
      # purely about giving node-style upward module resolution
      # a populated packages/<sibling>/node_modules/ to walk into.
      - name: Install @chordsketch/react dependencies
        run: npm ci
        working-directory: packages/react

      - name: Install @chordsketch/ui-web dependencies
        run: npm ci
        working-directory: packages/ui-web

      - name: Install @chordsketch/ui-irealb-editor dependencies
        run: npm ci
        working-directory: packages/ui-irealb-editor

      - name: Build playground (production bundle the smoke serves)
        run: npm run build
        working-directory: packages/playground

      # The Playwright browser binaries are versioned to the
      # `@playwright/test` release. Cache by lockfile hash so a
      # bump to the playground's lockfile invalidates the cache
      # automatically — the binaries are then re-fetched on the
      # next run.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('packages/playground/package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: packages/playground

      - name: Install Playwright system deps when cache hit
        # `--with-deps` installs apt packages — when only the binary
        # cache hits, the apt deps may still be missing from the
        # runner image. Run the deps-only path to keep the cached
        # binaries usable.
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: packages/playground

      - name: Run Playwright smoke
        run: npm run test:e2e
        working-directory: packages/playground

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            packages/playground/playwright-report/
            packages/playground/test-results/
          retention-days: 7
