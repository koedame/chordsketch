name: Python Package

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/ffi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "crates/ffi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python.yml"

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          command: sdist
          args: --manifest-path crates/ffi/Cargo.toml --out dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-sdist
          path: dist

  build-wheels:
    name: Build ${{ matrix.target }} wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          command: build
          args: --release --manifest-path crates/ffi/Cargo.toml --out dist
          target: ${{ matrix.target }}
          manylinux: manylinux2014
          sccache: "true"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  test:
    name: Test Python bindings (${{ matrix.os }})
    needs: [build-wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wheels-ubuntu-latest-x86_64
          # ubuntu-aarch64 wheel requires an arm64 runner to test natively.
          # GitHub's ubuntu-24.04-arm runner is available but may need to be
          # enabled for the repository. Uncomment when arm64 runners are confirmed.
          # - os: ubuntu-24.04-arm
          #   artifact: wheels-ubuntu-latest-aarch64
          - os: macos-latest
            artifact: wheels-macos-latest-aarch64
          # macOS x86_64 wheels are still built and published to PyPI for
          # Intel Mac users, but are intentionally not smoke-tested in CI.
          # GitHub-hosted macos-13 (Intel) runners are being phased out and
          # cannot be reliably allocated for this repository, and exercising
          # the x86_64 wheel through Rosetta on the arm64 macos-latest
          # runner adds non-trivial CI machinery for diminishing-return
          # coverage as the macOS ecosystem moves to Apple Silicon. We
          # accept this CI gap. See #1084.
          - os: windows-latest
            artifact: wheels-windows-latest-x64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Install wheel
        run: pip install chordsketch --find-links dist --no-index

      - name: Run smoke test
        run: |
          python -c "
          import chordsketch

          # Version check
          v = chordsketch.version()
          assert v, 'version should not be empty'
          print(f'Version: {v}')

          # Text rendering
          text = chordsketch.parse_and_render_text('{title: Test}\n[C]Hello', None, None)
          assert 'Test' in text
          assert 'Hello' in text
          print('Text render: OK')

          # HTML rendering
          html = chordsketch.parse_and_render_html('{title: Test}\n[C]Hello', None, None)
          assert 'Test' in html
          print('HTML render: OK')

          # PDF rendering
          pdf = chordsketch.parse_and_render_pdf('{title: Test}\n[C]Hello', None, None)
          assert pdf[:4] == b'%PDF'
          print('PDF render: OK')

          # Validate
          errors = chordsketch.validate('{title: Valid}\n[C]Hello')
          assert isinstance(errors, list)
          print('Validate: OK')

          # Config preset
          text = chordsketch.parse_and_render_text('{title: Test}\n[C]Hello', 'guitar', None)
          assert 'Test' in text
          print('Config preset: OK')

          # Transpose
          text = chordsketch.parse_and_render_text('{title: Test}\n[C]Hello', None, 2)
          print('Transpose: OK')

          print('All smoke tests passed!')
          "

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # Uses PyPI Trusted Publishing via OIDC — no API token needed.
    # `id-token: write` exposes ACTIONS_ID_TOKEN_REQUEST_* env vars to the
    # job, which `maturin upload` automatically picks up to obtain a short-
    # lived OIDC token from PyPI. Do NOT add a `MATURIN_PYPI_TOKEN` secret
    # here — that would silently downgrade us back to long-lived credentials.
    # The trusted publisher must be pre-registered on
    #   https://pypi.org/manage/project/chordsketch/settings/publishing/
    # for this repo + workflow + environment, otherwise the very first
    # publish fails with 403 Forbidden. See #1068.
    #
    # If the "pypi" environment does not exist (fork, fresh instance), GitHub
    # cannot start this job. continue-on-error keeps the overall workflow green
    # when CI succeeded but publishing infrastructure is absent. See #1443.
    continue-on-error: true
    environment:
      name: pypi
      url: https://pypi.org/p/chordsketch
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Detect OIDC availability
        # Probes whether GitHub is providing OIDC tokens for this job run.
        # ACTIONS_ID_TOKEN_REQUEST_URL is set when `id-token: write` is in
        # effect. If absent, maturin upload would fail with an auth error;
        # surfacing the skip here as a warning keeps the job exit-0
        # (consistent with the continue-on-error intent) while making it
        # visible in the run log.
        #
        # Limitation: this probe cannot detect a misconfigured PyPI trusted
        # publisher — that failure occurs inside the OIDC exchange within
        # maturin upload and would still be absorbed by continue-on-error.
        # See #1445.
        id: oidc
        shell: bash
        run: |
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub OIDC token endpoint is unavailable; skipping PyPI publish. Check that the environment exists and id-token: write permission is effective. See #1445."
          fi

      - uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        if: steps.oidc.outputs.available == 'true'
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
