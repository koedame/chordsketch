name: Python Package

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/ffi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "crates/ffi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python.yml"

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path crates/ffi/Cargo.toml --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  build-wheels:
    name: Build ${{ matrix.target }} wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v6

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path crates/ffi/Cargo.toml --out dist
          target: ${{ matrix.target }}
          manylinux: manylinux2014
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  test:
    name: Test Python bindings (${{ matrix.os }})
    needs: [build-wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wheels-ubuntu-latest-x86_64
          - os: macos-latest
            artifact: wheels-macos-latest-aarch64
          - os: windows-latest
            artifact: wheels-windows-latest-x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Install wheel
        run: pip install chordsketch --find-links dist --no-index

      - name: Run smoke test
        run: |
          python -c "
          import chordsketch

          # Version check
          v = chordsketch.version()
          assert v, 'version should not be empty'
          print(f'Version: {v}')

          # Text rendering
          text = chordsketch.parse_and_render_text('{title: Test}\n[C]Hello', None, None)
          assert 'Test' in text
          assert 'Hello' in text
          print('Text render: OK')

          # HTML rendering
          html = chordsketch.parse_and_render_html('{title: Test}\n[C]Hello', None, None)
          assert 'Test' in html
          print('HTML render: OK')

          # PDF rendering
          pdf = chordsketch.parse_and_render_pdf('{title: Test}\n[C]Hello', None, None)
          assert pdf[:4] == b'%PDF'
          print('PDF render: OK')

          # Validate
          errors = chordsketch.validate('{title: Valid}\n[C]Hello')
          assert isinstance(errors, list)
          print('Validate: OK')

          # Config preset
          text = chordsketch.parse_and_render_text('{title: Test}\n[C]Hello', 'guitar', None)
          assert 'Test' in text
          print('Config preset: OK')

          # Transpose
          text = chordsketch.parse_and_render_text('{title: Test}\n[C]Hello', None, 2)
          print('Transpose: OK')

          print('All smoke tests passed!')
          "

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/chordsketch
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
