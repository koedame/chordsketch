name: Python Package

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/ffi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "crates/ffi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python.yml"

# Cancel stale PR runs when a new commit is pushed to the same PR so
# that rebase / force-push does not leave two parallel Python builds
# competing for the macOS 5-job concurrency cap. `main` pushes, tag
# pushes, and `workflow_dispatch` / `release` events are not grouped
# with PRs and run to completion.
concurrency:
  group: python-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --manifest-path crates/ffi/Cargo.toml --out dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-sdist
          path: dist
          retention-days: 7

  # Build Linux wheels (x86_64 and aarch64) in parallel.
  # test-ubuntu waits only on this job, not on macOS or Windows builds (#1463).
  #
  # build-wheels-* matrices are intentionally fail-closed: if any cell
  # fails, the downstream `publish` job (needs: every build-wheels-*
  # cell and every test-* cell) is skipped. The PyPI release ships
  # wheels per (python-version, os, arch) triple; a missing triple
  # means `pip install chordsketch` falls back to sdist compilation on
  # that platform, which requires a Rust toolchain and fails for most
  # end users. Blocking the release until all cells succeed is the
  # safer failure mode. Contrast with `vscode-extension.yml
  # build-platform`, which has a universal VSIX fallback (#1795). See #1806.
  build-wheels-ubuntu:
    name: Build ${{ matrix.target }} wheels on ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
          - target: aarch64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --manifest-path crates/ffi/Cargo.toml --out dist
          target: ${{ matrix.target }}
          manylinux: manylinux2014
          # sccache disabled — measured 0% hit rate on 4 of 5 recent
          # ubuntu-latest runs despite an unchanged Cargo.lock. Root
          # cause: maturin-action runs the wheel build inside a
          # `manylinux2014` Docker container whose host path varies
          # per runner instance; sccache's argument hash includes
          # those absolute paths, so identical compilations produce
          # different hashes across runs. Each run was writing ~244
          # cache entries (~285 MB) that no future run could read,
          # consuming the 10 GB Actions cache cap and forcing LRU
          # eviction of warm caches read by sister workflows. See
          # #2310 for the measurements and rationale.
          sccache: "false"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-ubuntu-latest-${{ matrix.target }}
          path: dist
          retention-days: 7

  # Build macOS wheels (x86_64 and aarch64) in parallel.
  # test-macos waits only on this job, not on Linux or Windows builds (#1463).
  build-wheels-macos:
    name: Build ${{ matrix.target }} wheels on macos-latest
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
          - target: aarch64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --manifest-path crates/ffi/Cargo.toml --out dist
          target: ${{ matrix.target }}
          manylinux: manylinux2014
          # sccache stays enabled on macOS — measured 30-70% hit
          # rate across the last 5 runs (vs 0% on Linux + Windows).
          # macOS builds run natively on the runner (no
          # `manylinux2014` Docker container) so absolute paths are
          # stable enough for sccache's argument hash to match across
          # runs. See #2310 for the cross-platform measurements.
          sccache: "true"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-macos-latest-${{ matrix.target }}
          path: dist
          retention-days: 7

  # Build the Windows wheel.
  # test-windows waits only on this job (#1463).
  build-wheels-windows:
    name: Build x64 wheels on windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Exclude build directories from Windows Defender
        # Windows Defender real-time protection scans every file written to disk
        # during compilation, adding significant overhead on I/O-heavy Rust builds.
        # Excluding the workspace and Cargo home from scanning is a standard
        # mitigation for GitHub-hosted Windows runners. See #1464.
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath $env:GITHUB_WORKSPACE
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.rustup"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Cache the workspace target/ directory between runs.
      #
      # Investigation (#1464) found that the 30 compilation units that depend on
      # UniFFI's `build.rs` generated code have environment-specific paths and
      # consistently miss sccache (~390 of ~420s on a sccache-only build).
      # Investigation #2310 generalised the finding: across the last 5 runs,
      # the Windows cell hit sccache 0 / 5 times for *all* units, not just the
      # 30 UniFFI-dependent ones, with each run writing ~223 cache entries
      # (~270 MB) that no future run could read. sccache is therefore disabled
      # on this cell (see `sccache: "false"` below). `Swatinem/rust-cache`
      # remains the sole cache layer here: it works at the cargo level (skipping
      # the rustc invocation entirely for unchanged crates on a warm hit), so
      # it does not depend on stable absolute paths the way sccache does.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: python-x86_64-pc-windows-msvc
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --manifest-path crates/ffi/Cargo.toml --out dist
          target: x64
          manylinux: manylinux2014
          # sccache disabled per #2310 — measured 0% hit rate on every
          # one of 5 recent runs. Same UniFFI build.rs path issue
          # documented in #1464, but applies to every compilation
          # unit on Windows, not only the 30 originally identified.
          # Swatinem/rust-cache (above) covers this cell.
          sccache: "false"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-windows-latest-x64
          path: dist
          retention-days: 7

  # Each test job waits only for the matching OS wheel build so that linux
  # and macOS smoke tests don't block on the slower Windows build (#1463).
  test-ubuntu:
    name: Test Python bindings (ubuntu-latest)
    needs: [build-wheels-ubuntu]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: wheels-ubuntu-latest-x86_64
          path: dist

      - name: Install wheel
        run: pip install chordsketch --find-links dist --no-index

      - name: Run smoke test
        run: python scripts/smoke-test-python.py

  test-macos:
    name: Test Python bindings (macos-latest)
    needs: [build-wheels-macos]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # macOS x86_64 wheels are still built and published to PyPI for
          # Intel Mac users, but are intentionally not smoke-tested in CI.
          # GitHub-hosted macos-13 (Intel) runners are being phased out and
          # cannot be reliably allocated for this repository, and exercising
          # the x86_64 wheel through Rosetta on the arm64 macos-latest
          # runner adds non-trivial CI machinery for diminishing-return
          # coverage as the macOS ecosystem moves to Apple Silicon. We
          # accept this CI gap. See #1084.
          name: wheels-macos-latest-aarch64
          path: dist

      - name: Install wheel
        run: pip install chordsketch --find-links dist --no-index

      - name: Run smoke test
        run: python scripts/smoke-test-python.py

  test-windows:
    name: Test Python bindings (windows-latest)
    needs: [build-wheels-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: wheels-windows-latest-x64
          path: dist

      - name: Install wheel
        run: pip install chordsketch --find-links dist --no-index

      - name: Run smoke test
        run: python scripts/smoke-test-python.py

  publish:
    name: Publish to PyPI
    # Wait for all per-OS builds and tests; publish only on release tags.
    needs:
      [
        build-sdist,
        build-wheels-ubuntu,
        build-wheels-macos,
        build-wheels-windows,
        test-ubuntu,
        test-macos,
        test-windows,
      ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # Uses PyPI Trusted Publishing via OIDC — no API token needed.
    # `id-token: write` exposes ACTIONS_ID_TOKEN_REQUEST_* env vars to the
    # job, which `maturin upload` automatically picks up to obtain a short-
    # lived OIDC token from PyPI. Do NOT add a `MATURIN_PYPI_TOKEN` secret
    # here — that would silently downgrade us back to long-lived credentials.
    # The trusted publisher must be pre-registered on
    #   https://pypi.org/manage/project/chordsketch/settings/publishing/
    # for this repo + workflow + environment, otherwise the very first
    # publish fails with 403 Forbidden. See #1068.
    #
    # If the "pypi" environment does not exist (fork, fresh instance), GitHub
    # cannot start this job. continue-on-error keeps the overall workflow green
    # when CI succeeded but publishing infrastructure is absent. See #1443.
    continue-on-error: true
    environment:
      name: pypi
      url: https://pypi.org/p/chordsketch
    permissions:
      contents: read
      id-token: write
    # Enforce `bash -eo pipefail` in `run:` blocks. Scoped to this job
    # rather than workflow-level because python.yml has Windows matrix
    # cells (build-wheels-windows, test-windows) whose `run:` blocks must
    # keep pwsh defaults. See issue #1845 (fix-propagation from PR #1821).
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Check required secrets present
        # PyPI uses trusted publishing (OIDC), so there are no long-lived
        # secrets to assert. The post-release rollup in release-verify.yml
        # is the primary guard for "silently skipped" against this channel.
        # Still run the check so a future required_secrets addition is
        # picked up automatically. See #1506.
        run: python3 scripts/check-env-secrets.py --channel pypi

      - name: Detect OIDC availability
        # Probes whether GitHub is providing OIDC tokens for this job run.
        # ACTIONS_ID_TOKEN_REQUEST_URL is set when `id-token: write` is in
        # effect. If absent, maturin upload would fail with an auth error;
        # surfacing the skip here as a warning keeps the job exit-0
        # (consistent with the continue-on-error intent) while making it
        # visible in the run log.
        #
        # Placed first so that OIDC-unavailable runs (e.g. forks without
        # the pypi environment) exit before downloading wheel artifacts.
        # See #1454.
        #
        # Limitation: this probe cannot detect a misconfigured PyPI trusted
        # publisher — that failure occurs inside the OIDC exchange within
        # maturin upload and would still be absorbed by continue-on-error.
        # See #1445.
        id: oidc
        shell: bash
        run: |
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub OIDC token endpoint is unavailable; skipping PyPI publish. Check that the environment exists and id-token: write permission is effective. See #1445."
          fi

      - name: Download wheel artifacts
        if: steps.oidc.outputs.available == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        if: steps.oidc.outputs.available == 'true'
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
