name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # Fires when a PR enters the GitHub Merge Queue. The queue runs CI
  # on a speculative merge commit before appending it to main. All
  # checks listed in branch protection's required_status_checks must
  # exist in this workflow (or another workflow that also handles
  # merge_group) for the queue to consider a PR "green" and land it.
  # The event has no effect until merge queue is enabled on `main` via
  # repository / branch protection settings; until then this is a
  # no-op trigger that never fires.
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Fail-closed default: jobs that need write scopes must opt in via
# job-level `permissions:`. See issue #1839.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Clippy lints
        # `chordsketch-desktop` is excluded because its Tauri/WRY deps
        # need webkit2gtk/appindicator system libs that are installed
        # only in the dedicated `desktop-smoke` job. Cross-platform
        # coverage is tracked in #2077.
        run: cargo clippy --workspace --exclude chordsketch-desktop --all-targets -- -D warnings

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build docs (warnings as errors)
        # See the clippy job for the `chordsketch-desktop` exclusion rationale.
        run: cargo doc --workspace --exclude chordsketch-desktop --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  version-consistency:
    name: Version consistency
    # Enforces that every versioned manifest (workspace crates, the npm,
    # vscode-extension, and napi package.json files, and the hardcoded pins
    # inside readme-smoke.yml) is either aligned with the canonical workspace
    # crate version or has an explicit entry in
    # ci/version-skew-allowlist.toml. Every allowlist entry must reference a
    # tracking issue so skews cannot silently rot. See #1506.
    #
    # Intentionally Python-only, no cargo invocation — runs in ~2-3 seconds,
    # gives near-instant feedback on PRs that forget to bump a manifest.
    # No rust-cache entry is needed (per .claude/rules/ci-parallelization.md
    # §2: the job does not compile Rust).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run consistency check
        run: python3 scripts/check-version-consistency.py

      - name: Unit tests
        run: |
          python3 -m unittest scripts/test_check_version_consistency.py scripts/test_check_release_channels.py

  fixture-counts:
    name: Fixture counts
    # Enforces the minimum per-renderer golden fixture counts documented in
    # `.claude/rules/golden-tests.md`. Guarantee-style check per
    # `.claude/rules/ci-parallelization.md` §3 — no paths: filter, runs on
    # every PR. Python-only, ~1 second wall clock; no rust-cache needed
    # (does not compile Rust).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Count fixtures
        run: python3 scripts/check-fixture-counts.py

      - name: Unit tests
        run: python3 -m unittest scripts/test_check_fixture_counts.py

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.85.0"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run tests
        # See the clippy job for the `chordsketch-desktop` exclusion rationale.
        run: cargo test --workspace --exclude chordsketch-desktop

  desktop-smoke:
    name: Desktop smoke (Linux)
    # Linux-only `cargo check` of the `chordsketch-desktop` Tauri scaffold.
    # Guarantees the scaffold still compiles on every PR while keeping
    # the cross-platform bundle build in a dedicated workflow (#2077).
    # Per `.claude/rules/ci-parallelization.md` §3, this runs without a
    # `paths:` filter so any workspace or dependency change is exercised.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: desktop-smoke-x86_64-unknown-linux-gnu

      - name: cargo check
        run: cargo check -p chordsketch-desktop --all-targets
