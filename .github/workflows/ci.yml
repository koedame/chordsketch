name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # GitHub Merge Queue was disabled on `main` per
  # docs/adr/0015-disable-github-merge-queue.md, so no `merge_group`
  # event is produced today and this trigger is a no-op. It is kept
  # in place so that re-enabling the queue (should a future ADR
  # supersede 0015) does not require a workflow edit, and so the
  # secret-access caveat documented in ADR-0015 remains a single-edit
  # change rather than a workflow-and-rule change. Removing this line
  # is safe; do not add new `merge_group:` triggers without first
  # superseding ADR-0015.
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Fail-closed default: jobs that need write scopes must opt in via
# job-level `permissions:`. See issue #1839.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Clippy lints
        # `chordsketch-desktop` is excluded because its Tauri/WRY deps
        # need webkit2gtk/appindicator system libs that are installed
        # only in the dedicated `desktop-smoke` job. Cross-platform
        # coverage is tracked in #2077.
        run: cargo clippy --workspace --exclude chordsketch-desktop --all-targets -- -D warnings

      - name: Clippy lints (chordsketch-render-ireal --features png,pdf)
        # The `png` (#2064) and `pdf` (#2063) features are both off
        # by default; the workspace clippy run above does not
        # exercise them, so a clippy regression inside either
        # feature-gated module would not surface. Lint with both
        # features in one pass — they share the same `usvg` 0.43
        # transitive line, so this does not double-compile the SVG
        # parser.
        run: cargo clippy -p chordsketch-render-ireal --features png,pdf --all-targets -- -D warnings

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build docs (warnings as errors)
        # See the clippy job for the `chordsketch-desktop` exclusion rationale.
        #
        # `--features chordsketch-render-ireal/png,chordsketch-render-ireal/pdf`
        # doc-checks the feature-gated `png` (#2064) and `pdf`
        # (#2063) modules too. Without these, broken intra-doc
        # links inside either module would not surface, and a link
        # from the always-on crate root into a gated module would
        # fail rustdoc's broken-link check anyway because the gated
        # module would not be in the rendered tree.
        run: |
          cargo doc --workspace --exclude chordsketch-desktop \
            --features chordsketch-render-ireal/png,chordsketch-render-ireal/pdf \
            --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  version-consistency:
    name: Version consistency
    # Enforces that every versioned manifest (workspace crates, the npm,
    # vscode-extension, and napi package.json files, and the hardcoded pins
    # inside readme-smoke.yml) is either aligned with the canonical workspace
    # crate version or has an explicit entry in
    # ci/version-skew-allowlist.toml. Every allowlist entry must reference a
    # tracking issue so skews cannot silently rot. See #1506.
    #
    # Intentionally Python-only, no cargo invocation — runs in ~2-3 seconds,
    # gives near-instant feedback on PRs that forget to bump a manifest.
    # No rust-cache entry is needed (per .claude/rules/ci-parallelization.md
    # §2: the job does not compile Rust).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run consistency check
        run: python3 scripts/check-version-consistency.py

      - name: Unit tests
        run: |
          python3 -m unittest scripts/test_check_version_consistency.py scripts/test_check_release_channels.py

  fixture-counts:
    name: Fixture counts
    # Enforces the minimum per-renderer golden fixture counts documented in
    # `.claude/rules/golden-tests.md`. Guarantee-style check per
    # `.claude/rules/ci-parallelization.md` §3 — no paths: filter, runs on
    # every PR. Python-only, ~1 second wall clock; no rust-cache needed
    # (does not compile Rust).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Count fixtures
        run: python3 scripts/check-fixture-counts.py

      - name: Unit tests
        run: python3 -m unittest scripts/test_check_fixture_counts.py

  macports-portfile-sync:
    name: MacPorts Portfile sync
    # Guards against the `cargo.crates` block in
    # `packaging/macports/Portfile` drifting from the `Cargo.lock`
    # shipped in the source tarball that the Portfile's `github.setup`
    # line points at. The cargo portgroup downloads each crate listed
    # in `cargo.crates` and validates its checksum against what the
    # tarball's lockfile demands; if the two are out of sync, the
    # upstream MacPorts build fails with "checksum mismatch on
    # <crate>" before any compilation begins. This is therefore a
    # tag-relative check: HEAD's Cargo.lock is irrelevant — the only
    # lockfile that matters is the one inside the tarball.
    # Same guarantee-style trigger as `fixture-counts`: runs on every
    # PR, no path filter, Python-only, < 1 s wall clock.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need the tagged commit reachable so `git show
          # vX.Y.Z:Cargo.lock` works inside the regen script. The
          # script auto-detects the tag from the Portfile's
          # `github.setup` line, so no explicit tag wiring is needed
          # here.
          fetch-depth: 0

      - name: Verify Portfile cargo.crates matches tagged Cargo.lock
        run: python3 scripts/macports-regen-cargo-crates.py --check

      - name: Unit tests for the regen script
        run: python3 -m unittest scripts/test_macports_regen_cargo_crates.py

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.85.0"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run tests
        # See the clippy job for the `chordsketch-desktop` exclusion rationale.
        run: cargo test --workspace --exclude chordsketch-desktop

      - name: Run feature-gated tests (chordsketch-render-ireal --features png,pdf)
        # The `png` (#2064) and `pdf` (#2063) features are both off
        # by default to keep the transitive-dep surface small for
        # SVG-only consumers. Without an explicit feature pass here
        # the `tests/png.rs` and `tests/pdf.rs` suites never compile
        # in CI; a regression in either pipeline would slip through
        # unnoticed. Both features share the same `usvg` 0.43 line
        # so this single test run does not double-compile the SVG
        # parser stack.
        run: cargo test -p chordsketch-render-ireal --features png,pdf

  desktop-smoke:
    name: Desktop smoke (Linux)
    # End-to-end smoke for the `chordsketch-desktop` app:
    #   1. Build `@chordsketch/wasm` (web + node dual-package) so the
    #      Vite alias in `apps/desktop/vite.config.ts` has a target.
    #   2. `npm ci` + `npm run build` inside `apps/desktop/` (runs `tsc`
    #      + `vite build`) to prove the WebView frontend type-checks
    #      and bundles against the shared `@chordsketch/ui-web` source.
    #   3. `cargo check -p chordsketch-desktop --all-targets` on the
    #      Tauri Rust side, with webkit2gtk installed.
    # Guarantees both halves of the desktop stack compile on every PR,
    # while the cross-platform bundle build matrix stays tracked in
    # #2077. Per `.claude/rules/ci-parallelization.md` §3, this runs
    # without a `paths:` filter so any workspace or dep change is
    # exercised.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: desktop-smoke-x86_64-unknown-linux-gnu
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install wasm-pack
        uses: ./.github/actions/install-wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          # Multiline glob — `setup-node`'s `cache-dependency-path`
          # accepts a newline-separated list, and both lockfiles
          # participate in the cache key. This is a step up from the
          # pre-#2072 single-lockfile pin, which would have missed a
          # `tree-sitter-chordpro` dep bump.
          cache-dependency-path: |
            apps/desktop/package-lock.json
            packages/tree-sitter-chordpro/package-lock.json

      - name: Build @chordsketch/wasm (lean, dual-package layout)
        # Same canonical build used by `deploy-playground.yml`.
        run: npm run build
        working-directory: packages/npm

      # The desktop app uses `render_pdf` synchronously in
      # apps/desktop/src/main.ts, so its Vite alias points
      # `@chordsketch/wasm` at the HEAVY bundle (#2466). Build it
      # here so the alias resolves at desktop-build time.
      - name: Build @chordsketch/wasm-export (heavy)
        run: npm run build
        working-directory: packages/npm-export

      - name: Install tree-sitter-chordpro grammar deps
        # `apps/desktop`'s `prebuild` script runs `tree-sitter build
        # --wasm` against this grammar package to produce
        # `tree-sitter-chordpro.wasm` (served at the Vite public
        # root for the CodeMirror editor). The tree-sitter CLI is a
        # devDependency of `packages/tree-sitter-chordpro/`, so the
        # prebuild needs this install first.
        run: npm ci
        working-directory: packages/tree-sitter-chordpro

      - name: Install desktop frontend deps
        run: npm ci
        working-directory: apps/desktop

      - name: Build desktop frontend (prebuild + tsc + vite)
        # `npm run build` runs the `prebuild` hook which builds the
        # grammar wasm; then `tsc && vite build` produces the Vite
        # bundle under `apps/desktop/dist/`.
        run: npm run build
        working-directory: apps/desktop

      - name: cargo check
        run: cargo check -p chordsketch-desktop --all-targets
