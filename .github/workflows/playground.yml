name: "playground"

# Typecheck and run vitest unit tests for the browser playground
# (`packages/playground`). The playground was build-only in CI
# (`deploy-playground.yml` runs `tsc && vite build` on push to
# `main`); this workflow exercises the playground's own unit
# tests — currently the URL-hash helpers (#2366) — on every PR
# so a regression surfaces against the change rather than only
# at deploy time.
#
# Mirrors `ui-web.yml`: same setup-node config, same install-then-
# typecheck-then-test ordering, same concurrency / cancel-in-progress
# rules.

on:
  push:
    branches: [main]
    paths:
      - 'packages/playground/**'
      - '.github/workflows/playground.yml'
  pull_request:
    paths:
      - 'packages/playground/**'
      - '.github/workflows/playground.yml'

# Cancel stale PR runs on force-push / rebase. Main / workflow_dispatch
# runs always go to completion (gated on pull_request event).
concurrency:
  group: playground-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: packages/playground

jobs:
  typecheck-and-test:
    name: Typecheck and test playground
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/playground/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Install sibling-package node_modules so tsc can resolve the
      # transitive `react` / `@codemirror/*` / `@lezer/*` imports
      # inside `../react/src/*.tsx` files when they are pulled into
      # the playground's program via tsconfig `paths` /
      # `include`. Each sibling owns its own lockfile and its own
      # CI typecheck — installing here is purely about giving
      # node-style upward module resolution a populated
      # `packages/<sibling>/node_modules/` to walk into.
      - name: Install sibling package dependencies
        working-directory: packages/react
        run: npm ci

      - name: Install ui-web dependencies
        working-directory: packages/ui-web
        run: npm ci

      - name: Install ui-irealb-editor dependencies
        working-directory: packages/ui-irealb-editor
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        # `packages/playground/src/wasm.d.ts` declares an ambient
        # module for `@chordsketch/wasm` covering every export the
        # playground imports — including `parseIrealb` /
        # `serializeIrealb` / `renderIrealSvg`. The ambient
        # declarations merge with whatever `wasm-pack` regenerates
        # in `packages/npm/web/chordsketch_wasm.d.ts`, so the
        # typecheck succeeds without rebuilding the wasm crate.
        # `deploy-playground.yml` is the canonical workflow that
        # runs the full `tsc && vite build` against fresh wasm
        # artefacts on push to `main`.
        run: npm run typecheck

      - name: Run vitest tests
        run: npm test
