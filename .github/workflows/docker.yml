name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string

# Deny-by-default: each job declares only the permissions it needs.
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: koedame/chordsketch

defaults:
  run:
    shell: bash

jobs:
  ghcr:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Determine version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag
        # Format-validate the resolved tag before downstream `gh release
        # download` and `docker buildx` invocations use it. See #1797.
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ steps.version.outputs.tag }}

      - name: Download and extract release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Download musl binaries from the release
          gh release download "$TAG" \
            -p "chordsketch-${TAG}-x86_64-unknown-linux-musl.tar.gz" \
            -p "chordsketch-${TAG}-aarch64-unknown-linux-musl.tar.gz"

          # Extract and rename for TARGETARCH convention
          tar xzf "chordsketch-${TAG}-x86_64-unknown-linux-musl.tar.gz"
          cp "chordsketch-${TAG}-x86_64-unknown-linux-musl/chordsketch" chordsketch-amd64

          tar xzf "chordsketch-${TAG}-aarch64-unknown-linux-musl.tar.gz"
          cp "chordsketch-${TAG}-aarch64-unknown-linux-musl/chordsketch" chordsketch-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            # Only auto-tag :latest on actual release events. workflow_dispatch
            # reruns (e.g. fixing a broken older release) MUST NOT regress the
            # :latest tag — they only republish the immutable :X.Y.Z and :X.Y
            # aliases. See #1064 for the regression scenario.
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-hub:
    name: Copy to Docker Hub
    needs: [ghcr]
    runs-on: ubuntu-latest
    # Scopes DOCKERHUB_TOKEN and DOCKERHUB_USERNAME to this environment,
    # consistent with python.yml (pypi), ruby.yml (rubygems),
    # kotlin.yml (maven-central), vscode-extension.yml (vscode-marketplace),
    # and npm-publish.yml (npm).
    #
    # This job is intentionally separate from `ghcr`: the environment gate
    # applies only here, so if the "docker-hub" environment does not exist
    # or its secrets are absent, the `ghcr` job (which runs first) still
    # succeeds and GHCR publishing is unaffected. See #1435.
    #
    # `continue-on-error: true` extends that optional-infrastructure intent
    # to the environment-gate level: if the "docker-hub" environment does not
    # exist (e.g. a fork, a fresh instance, or a temporary environment
    # deletion), GitHub cannot start the job and would otherwise mark the
    # whole workflow run red — even though GHCR publishing succeeded. Docker
    # Hub is secondary to GHCR, so a blocked or missing environment should
    # not color a successful release workflow red. See #1437.
    #
    # One-time human setup: create the "docker-hub" environment at
    #   https://github.com/koedame/chordsketch/settings/environments
    # and move DOCKERHUB_USERNAME and DOCKERHUB_TOKEN from repository
    # secrets to environment secrets.
    continue-on-error: true
    environment:
      name: docker-hub
      url: https://hub.docker.com/r/koedame/chordsketch
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Determine version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag
        # Format-validate the resolved tag before downstream `gh release
        # download` and `docker buildx` invocations use it. See #1797.
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ steps.version.outputs.tag }}

      - name: Detect Docker Hub credentials
        # Decouple Docker Hub from GHCR: if DOCKERHUB_TOKEN or DOCKERHUB_USERNAME
        # is unset (fork PRs, manual recovery runs, an org-side credential
        # rotation), the GHCR push (already completed by the `ghcr` job) is
        # unaffected. Secrets aren't available in step `if:` expressions
        # directly, so we surface the boolean via a step output. See #1072.
        #
        # Uses `check-env-secrets.py --soft` which reads the manifest at
        # ci/release-channels.toml, looks up the `docker-hub` channel's
        # required_secrets list, and writes `available=true|false` to stdout.
        # --soft mode is correct here because Docker Hub is intentionally
        # secondary to GHCR: a missing token must NOT fail the workflow. For
        # primary channels (VSCode, npm, Kotlin, etc.) the hard-fail default
        # is correct. See #1506 for the shared script.
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: python3 scripts/check-env-secrets.py --channel docker-hub --soft >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Copy tags from GHCR to Docker Hub
        # `docker buildx imagetools create` copies the multi-platform manifest
        # list from GHCR to Docker Hub without a rebuild.
        #
        # Tag logic must stay in sync with the metadata-action config in the
        # `ghcr` job:
        #   type=semver,pattern={{version}}         → X.Y.Z
        #   type=semver,pattern={{major}}.{{minor}} → X.Y
        #   type=raw,value=latest (release only)    → latest
        # When adding a new tag pattern in `ghcr`, add the corresponding copy
        # command here. See #1440.
        if: steps.dockerhub.outputs.available == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          SRC: ghcr.io/${{ env.IMAGE_NAME }}
          DST: docker.io/${{ env.IMAGE_NAME }}
        run: |
          VERSION="${TAG#v}"
          # Use cut to extract major.minor so that 2-part tags (e.g. v1.2)
          # produce "1.2" instead of "1" (which ${VERSION%.*} would give).
          # This matches metadata-action's {{major}}.{{minor}} output exactly.
          # See #1439.
          MAJOR_MINOR="$(echo "${VERSION}" | cut -d. -f1,2)"

          docker buildx imagetools create \
            -t "${DST}:${VERSION}" \
            "${SRC}:${VERSION}"

          docker buildx imagetools create \
            -t "${DST}:${MAJOR_MINOR}" \
            "${SRC}:${MAJOR_MINOR}"

          # Only copy :latest for release events. workflow_dispatch reruns
          # (e.g. fixing a broken older release) MUST NOT regress the :latest
          # tag. See #1064.
          if [ "${EVENT_NAME}" = "release" ]; then
            docker buildx imagetools create \
              -t "${DST}:latest" \
              "${SRC}:latest"
          fi
