name: Coverage

# Measures workspace test coverage with cargo-llvm-cov and uploads lcov.info
# to Codecov. See #1846 for the multi-phase rollout plan.
#
# Triggers:
# - push to main: captures the authoritative baseline that every PR diff
#   is compared against.
# - pull_request: posts the Codecov diff comment and status check on each
#   PR. The status check is NOT yet wired into branch protection — per
#   tracker §Strategy, "add to branch protection required checks only
#   after two consecutive green main builds at the gate value".
#
# `needs: []` ensures the coverage job never blocks other CI jobs; only
# the Codecov status becomes a required check once branch protection is
# updated.
#
# Token: public repos authenticate codecov-action via GitHub OIDC, so
# CODECOV_TOKEN is not required.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Measure and upload coverage
    runs-on: ubuntu-latest
    # needs: [] — intentional; this workflow must never gate other jobs.
    permissions:
      contents: read
      # Required for codecov-action's `use_oidc: true`: GitHub refuses to
      # mint the OIDC token without this.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@b5fddbb5361bce8a06fb168c9d403a6cc552b084 # v2
        with:
          tool: cargo-llvm-cov

      - name: Collect coverage
        # `chordsketch-desktop` is excluded (Tauri scaffold, covered by
        # `desktop-smoke` in ci.yml). See the matching exclusions in
        # ci.yml and .claude/rules/ci-parallelization.md.
        #
        # `--features chordsketch-render-ireal/png,chordsketch-render-ireal/pdf`
        # turns on the PNG rasteriser (#2064) and PDF converter
        # (#2063) so both feature-gated modules compile and their
        # respective test suites run — without this, the patch
        # coverage gate would skip the new lines because they would
        # not be in the compiled crate.
        run: |
          cargo llvm-cov --workspace --exclude chordsketch-desktop \
            --features chordsketch-render-ireal/png,chordsketch-render-ireal/pdf \
            --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: true
          use_oidc: true
