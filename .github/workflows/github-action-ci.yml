name: GitHub Action CI

# Exercises the composite action defined in packages/github-action/action.yml
# against a sample fixture on all supported platforms.
#
# No paths: filter — the action downloads a published release binary, so any
# CI regression introduced here is structural (action.yml / workflow wiring),
# not a code regression. Running unconditionally ensures the test always
# reflects the current state of the action wiring.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel previous runs on the same PR when new commits land.
concurrency:
  group: github-action-ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test action (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ---- text output (default format) ------------------------------------
      - name: Render to text
        id: render-text
        uses: ./packages/github-action
        with:
          input: packages/github-action/fixtures/simple.cho
          output: out/simple.txt
          # format defaults to "text", transpose defaults to "0"

      - name: Verify text output exists and is non-empty
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT="${{ steps.render-text.outputs.output-path }}"
          echo "output-path: $OUTPUT"
          [ -s "$OUTPUT" ] || { echo "Output file is missing or empty"; exit 1; }
          # The title directive must appear in text output
          grep -qi "Amazing Grace" "$OUTPUT" || { echo "Title not found in text output"; exit 1; }
          cat "$OUTPUT"

      # ---- HTML output -----------------------------------------------------
      - name: Render to HTML
        id: render-html
        uses: ./packages/github-action
        with:
          input: packages/github-action/fixtures/simple.cho
          output: out/simple.html
          format: html

      - name: Verify HTML output
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT="${{ steps.render-html.outputs.output-path }}"
          echo "output-path: $OUTPUT"
          [ -s "$OUTPUT" ] || { echo "Output file is missing or empty"; exit 1; }
          grep -q "Amazing Grace" "$OUTPUT" || { echo "Title not found in HTML output"; exit 1; }

      # ---- transpose -------------------------------------------------------
      # The fixture uses G-major chords. Transposing by +2 semitones
      # shifts G→A, C→D, D→E, Em→F#m. Assert that A (transposed root)
      # appears in the output to confirm the flag is not silently ignored.
      - name: Render with transpose
        id: render-transpose
        uses: ./packages/github-action
        with:
          input: packages/github-action/fixtures/simple.cho
          output: out/simple-transposed.txt
          format: text
          transpose: '2'

      - name: Verify transposed output
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT="${{ steps.render-transpose.outputs.output-path }}"
          echo "output-path: $OUTPUT"
          [ -s "$OUTPUT" ] || { echo "Output file is missing or empty"; exit 1; }
          # The text renderer puts chords on their own line above lyrics (no brackets).
          # After G+2=A transpose: all standalone G chords become A.
          # -w matches whole words: "A" matches the chord token but NOT "Amazing" or "A7".
          # -w "G" matches the chord token but NOT "Grace" (G followed by r) or "G7".
          # -w is portable across GNU grep, BSD grep, and Git Bash; \bX\b ERE is GNU-only.
          grep -qw 'A' "$OUTPUT" || { echo "Expected standalone A chord (G+2) not found in transposed output"; exit 1; }
          if grep -qw 'G' "$OUTPUT"; then
            echo "Standalone G chord found in transposed output — transposition was not applied"
            cat "$OUTPUT"
            exit 1
          fi
          cat "$OUTPUT"

      # ---- negative transpose ----------------------------------------------
      # Transposing by -2 shifts G→F, C→Bb, D→C, Em→Dm. The action uses
      # --transpose=VALUE (equals-sign form) so clap correctly interprets
      # '-2' as the argument value rather than an unknown short flag.
      - name: Render with negative transpose
        id: render-negative-transpose
        uses: ./packages/github-action
        with:
          input: packages/github-action/fixtures/simple.cho
          output: out/simple-neg-transposed.txt
          format: text
          transpose: '-2'

      - name: Verify negative transposed output
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT="${{ steps.render-negative-transpose.outputs.output-path }}"
          echo "output-path: $OUTPUT"
          [ -s "$OUTPUT" ] || { echo "Output file is missing or empty"; exit 1; }
          # After G-2=F transpose: standalone G chords become F.
          grep -qw 'F' "$OUTPUT" || { echo "Expected standalone F chord (G-2) not found in transposed output"; exit 1; }
          if grep -qw 'G' "$OUTPUT"; then
            echo "Standalone G chord found in negatively transposed output — transposition was not applied"
            cat "$OUTPUT"
            exit 1
          fi
          cat "$OUTPUT"

      # ---- PDF output -----------------------------------------------------
      - name: Render to PDF
        id: render-pdf
        uses: ./packages/github-action
        with:
          input: packages/github-action/fixtures/simple.cho
          output: out/simple.pdf
          format: pdf

      - name: Verify PDF output
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT="${{ steps.render-pdf.outputs.output-path }}"
          echo "output-path: $OUTPUT"
          [ -s "$OUTPUT" ] || { echo "PDF output file is missing or empty"; exit 1; }
          # PDF files begin with the %PDF- magic bytes. Use python3 (pre-installed on
          # all GitHub-hosted runners) to read binary bytes without grep binary-mode issues.
          python3 -c "
          import sys
          with open(sys.argv[1], 'rb') as f:
              header = f.read(5)
          assert header == b'%PDF-', f'Expected PDF magic bytes, got {header!r}'
          print('PDF header verified:', header)
          " "$OUTPUT"

      # ---- validation: negative-path tests --------------------------------
      # Verify that the action exits non-zero when given an invalid format or
      # transpose value. 'continue-on-error: true' prevents the job from failing
      # when the action under test exits 1; we then assert the outcome explicitly.

      - name: Test invalid format (should fail)
        id: test-invalid-format
        uses: ./packages/github-action
        continue-on-error: true
        with:
          input: packages/github-action/fixtures/simple.cho
          output: out/should-not-exist.txt
          format: xlsx

      - name: Verify invalid format was rejected
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.test-invalid-format.outcome }}" != "failure" ]; then
            echo "Expected action to fail with invalid format 'xlsx' but it succeeded"
            exit 1
          fi
          echo "Correctly rejected invalid format 'xlsx'"

      - name: Test invalid transpose (should fail)
        id: test-invalid-transpose
        uses: ./packages/github-action
        continue-on-error: true
        with:
          input: packages/github-action/fixtures/simple.cho
          output: out/should-not-exist-2.txt
          transpose: abc

      - name: Verify invalid transpose was rejected
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.test-invalid-transpose.outcome }}" != "failure" ]; then
            echo "Expected action to fail with invalid transpose 'abc' but it succeeded"
            exit 1
          fi
          echo "Correctly rejected invalid transpose 'abc'"

      - name: Test leading-zero transpose (should fail)
        id: test-leading-zero-transpose
        uses: ./packages/github-action
        continue-on-error: true
        with:
          input: packages/github-action/fixtures/simple.cho
          output: out/should-not-exist-3.txt
          transpose: '007'

      - name: Verify leading-zero transpose was rejected
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.test-leading-zero-transpose.outcome }}" != "failure" ]; then
            echo "Expected action to fail with leading-zero transpose '007' but it succeeded"
            exit 1
          fi
          echo "Correctly rejected leading-zero transpose '007'"
