name: WASM

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: wasm-${{ github.ref }}
  cancel-in-progress: true

# Fail-closed default: jobs that need write scopes must opt in via
# job-level `permissions:`. See issue #1839.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  WASM_PACK_VERSION: "0.14.0"

jobs:
  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2
        with:
          tool: wasm-pack@${{ env.WASM_PACK_VERSION }}

      - name: Build with wasm-pack
        run: wasm-pack build crates/wasm --target web

      - name: Setup Node.js for wasm-pack test
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: wasm-pack test (Node)
        # Exercise the actual `#[wasm_bindgen]` -> `JsValue` boundary that
        # native `cargo test` cannot reach (`JsValue::UNDEFINED`,
        # `serde_wasm_bindgen::from_value`, `console_warn`, etc.). Tests
        # live in the `wasm_tests` module of `crates/wasm/src/lib.rs`,
        # gated to `target_arch = "wasm32"` so they don't break native
        # `cargo test -p chordsketch-wasm`. See #1055, #1108.
        run: wasm-pack test --node crates/wasm

      - name: Clippy (wasm32)
        # Lint every workspace crate that compiles for wasm32, not just
        # `chordsketch-wasm`. The renderer crates each have wasm32-specific
        # code paths (e.g. `chordsketch-render-pdf` switches the flate2
        # backend, `chordsketch-chordpro` cfg-gates fs/process modules) and
        # clippy warnings introduced in those paths must fail CI too. See
        # #1054.
        run: |
          cargo clippy --target wasm32-unknown-unknown \
            -p chordsketch-wasm \
            -p chordsketch-render-pdf \
            -p chordsketch-render-html \
            -p chordsketch-render-text \
            -p chordsketch-chordpro \
            -- -D warnings
