name: README Install Smoke Tests

# Verify every install method advertised in README.md works for an
# unauthenticated end user, AND that the binary it produces actually
# renders songs end-to-end (text/HTML/PDF/transpose/-c/multi-file PDF).
# Also verifies that the Library Usage Rust snippet still compiles and
# runs against the published crates on crates.io. Catches breakage like
# a private GHCR package, yanked crate, broken tap, missing PDF font,
# or removed library API before users hit it.

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC — catches registry-side regressions without coupling
    # to the release cadence.
    - cron: "0 6 * * *"
  release:
    types: [published]
  # Run on every PR, no path filter. End-user installability is a
  # global property of the repo: it either works or it doesn't, and
  # the validity of that guarantee should not depend on which file
  # the current PR happens to edit. A path-filter list also has to be
  # re-audited every time the workspace shape changes (new crate,
  # build.rs, rust-toolchain.toml, .cargo/config.toml, etc.) and a
  # missed entry produces a false sense of safety. The daily cron
  # already runs the same matrix; running it on each PR adds bounded
  # cost in exchange for catching every regression at PR time.
  pull_request:

# Cancel previous runs on the same PR when new commits land. Daily cron
# and release runs use a unique run_id and are never cancelled.
concurrency:
  group: readme-smoke-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  issues: write

jobs:
  docker-ghcr:
    name: Docker (GHCR)
    runs-on: ubuntu-latest
    # DOCKER_CONFIG points at a fresh empty directory so the Docker
    # client cannot pick up any pre-cached credentials from the runner
    # image, $HOME/.docker, or a credential helper. This guarantees the
    # `docker pull` below runs with the exact same authentication state
    # as an end user on a clean machine — which is the only way to
    # detect "package was silently flipped to private" regressions like
    # the one this workflow exists for.
    env:
      DOCKER_CONFIG: /tmp/docker-anon-ghcr
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize empty DOCKER_CONFIG and assert no credentials
        run: |
          set -euo pipefail
          rm -rf "$DOCKER_CONFIG"
          mkdir -p "$DOCKER_CONFIG"
          # Defensive: also clear any creds the runner image happened
          # to leave behind in the default location.
          docker logout ghcr.io || true
          # Hard assertion: the config we're about to use must contain
          # zero auth entries. If it doesn't, the test below would be
          # silently authenticated and stop reflecting end-user reality.
          if [ -f "$DOCKER_CONFIG/config.json" ] && grep -q '"auths"' "$DOCKER_CONFIG/config.json" 2>/dev/null; then
            echo "DOCKER_CONFIG contains auth entries; refusing to run anonymous test." >&2
            cat "$DOCKER_CONFIG/config.json" >&2
            exit 1
          fi
          # Idempotent: if a previous attempt left a stale named container
          # behind (e.g., the runner re-runs after `docker create` succeeded
          # but before `docker rm` ran), remove it so the next
          # `docker create --name extract-ghcr` below doesn't fail with
          # "Conflict. The container name already in use".
          docker rm -f extract-ghcr 2>/dev/null || true

      - name: Verify GHCR manifest is anonymously pullable at HTTP layer
        run: |
          set -euo pipefail
          # Cross-check independent of the docker daemon: hit the
          # registry v2 API directly with a fresh anonymous bearer
          # token. For a *public* package this returns the manifest;
          # for a *private* one the manifest fetch returns 401 even
          # though the token endpoint hands out a token. This catches
          # the failure mode at the HTTP layer in case some future
          # docker daemon change masks it.
          TOKEN=$(curl -fsS \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:koedame/chordsketch:pull" \
            | python3 -c 'import sys, json; print(json.load(sys.stdin)["token"])')
          curl -fsS \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/koedame/chordsketch/manifests/latest" \
            -o /dev/null

      - name: Pull image as unauthenticated user and verify --version
        run: |
          set -euo pipefail
          docker pull ghcr.io/koedame/chordsketch:latest
          docker run --rm ghcr.io/koedame/chordsketch:latest --version

      - name: Extract binary from image for render smoke
        run: |
          set -euo pipefail
          mkdir -p /tmp/cli-bin
          docker create --name extract-ghcr ghcr.io/koedame/chordsketch:latest
          docker cp extract-ghcr:/usr/local/bin/chordsketch /tmp/cli-bin/chordsketch
          docker rm extract-ghcr
          chmod +x /tmp/cli-bin/chordsketch
          echo "/tmp/cli-bin" >> "$GITHUB_PATH"

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  docker-hub:
    name: Docker Hub
    runs-on: ubuntu-latest
    # See docker-ghcr for the rationale behind isolating DOCKER_CONFIG.
    env:
      DOCKER_CONFIG: /tmp/docker-anon-hub
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize empty DOCKER_CONFIG and assert no credentials
        run: |
          set -euo pipefail
          rm -rf "$DOCKER_CONFIG"
          mkdir -p "$DOCKER_CONFIG"
          docker logout docker.io || true
          if [ -f "$DOCKER_CONFIG/config.json" ] && grep -q '"auths"' "$DOCKER_CONFIG/config.json" 2>/dev/null; then
            echo "DOCKER_CONFIG contains auth entries; refusing to run anonymous test." >&2
            cat "$DOCKER_CONFIG/config.json" >&2
            exit 1
          fi
          # See docker-ghcr for the rationale: stale named container from a
          # previous attempt would block the docker create below.
          docker rm -f extract-hub 2>/dev/null || true

      - name: Verify Docker Hub manifest is anonymously pullable at HTTP layer
        run: |
          set -euo pipefail
          # Docker Hub uses a different auth realm than GHCR.
          TOKEN=$(curl -fsS \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:koedame/chordsketch:pull" \
            | python3 -c 'import sys, json; print(json.load(sys.stdin)["token"])')
          curl -fsS \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://registry-1.docker.io/v2/koedame/chordsketch/manifests/latest" \
            -o /dev/null

      - name: Pull image as unauthenticated user and verify --version
        run: |
          set -euo pipefail
          docker pull docker.io/koedame/chordsketch:latest
          docker run --rm docker.io/koedame/chordsketch:latest --version

      - name: Extract binary from image for render smoke
        run: |
          set -euo pipefail
          mkdir -p /tmp/cli-bin
          docker create --name extract-hub docker.io/koedame/chordsketch:latest
          docker cp extract-hub:/usr/local/bin/chordsketch /tmp/cli-bin/chordsketch
          docker rm extract-hub
          chmod +x /tmp/cli-bin/chordsketch
          echo "/tmp/cli-bin" >> "$GITHUB_PATH"

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  npm-wasm:
    name: npm (@chordsketch/wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install @chordsketch/wasm in scratch directory
        run: |
          set -euo pipefail
          mkdir -p /tmp/wasm-smoke
          cd /tmp/wasm-smoke
          npm init -y
          # Pin to the exact released version so the smoke test verifies
          # the *specific* artifact it was written against, rather than
          # silently following whatever the latest published version
          # happens to be. 0.1.0 is published-but-broken on Node.js (the
          # --target web init tries to fetch via file:// which Node's
          # undici does not implement); 0.1.1 ships the dual-package
          # layout where Node resolves to a wasm-pack --target nodejs
          # build that auto-loads synchronously.
          #
          # Bump policy: every time `@chordsketch/wasm` is published to
          # npm, update this pin in the same PR that bumps the workspace
          # version (or, for npm-only patch releases like the dual-package
          # 0.1.0 → 0.1.1 fix, in the publish PR itself). The README sync
          # check (.github/workflows/readme-sync.yml) does not catch this
          # automatically because the version string lives only here.
          npm install '@chordsketch/wasm@0.2.2'

      - name: Smoke test text + HTML + PDF render
        run: |
          set -euo pipefail
          cd /tmp/wasm-smoke
          # Node.js consumes the package via the "node" condition in
          # the package.json `exports` field. That entry resolves to a
          # wasm-pack --target nodejs build (CommonJS) which auto-loads
          # the .wasm file synchronously on require. There is therefore
          # no `init()` to await on the Node side — direct named
          # imports work. The browser-side `await init()` flow is
          # exercised by the playground manually; CI focuses on Node
          # correctness because that is where automated testing lives.
          cat > smoke.mjs << 'EOF'
          import { render_text, render_html, render_pdf, version } from '@chordsketch/wasm';

          const v = version();
          if (!v) throw new Error('version() returned empty');
          console.log('version:', v);

          const input = '{title: Smoke}\n{subtitle: WASM smoke}\n\n[C]Hello [G]world';

          const txt = render_text(input);
          if (!txt.includes('Smoke') || !txt.includes('Hello')) {
            throw new Error('render_text output missing expected content: ' + txt);
          }
          console.log('render_text OK');

          const html = render_html(input);
          if (!html.includes('Smoke') || !html.includes('<html')) {
            throw new Error('render_html output missing expected content');
          }
          console.log('render_html OK');

          const pdf = render_pdf(input);
          // render_pdf returns a Uint8Array; check the %PDF magic.
          if (!(pdf instanceof Uint8Array) || pdf.length < 4) {
            throw new Error('render_pdf did not return a Uint8Array');
          }
          const magic = String.fromCharCode(pdf[0], pdf[1], pdf[2], pdf[3]);
          if (magic !== '%PDF') {
            throw new Error('render_pdf output is not a PDF (magic: ' + magic + ')');
          }
          console.log('render_pdf OK (' + pdf.length + ' bytes)');
          EOF
          node smoke.mjs

  cargo-install:
    name: cargo install chordsketch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # rust-cache intentionally omitted: this job installs from crates.io into a
      # custom CARGO_HOME (/tmp/cargo-smoke) outside the workspace. Both the registry
      # and build artifacts land under /tmp, not under ~/.cargo or the workspace
      # target/, so Swatinem/rust-cache would cache nothing useful.

      - name: Install from crates.io into scratch CARGO_HOME
        env:
          CARGO_HOME: /tmp/cargo-smoke
        run: |
          set -euo pipefail
          mkdir -p "$CARGO_HOME"
          cargo install chordsketch
          "$CARGO_HOME/bin/chordsketch" --version
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  source-build:
    name: From source (git clone + cargo install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # rust-cache intentionally omitted: compilation happens inside a fresh clone at
      # /tmp/chordsketch-src with CARGO_HOME=/tmp/cargo-source — both are outside the
      # workspace and ~/.cargo, so Swatinem/rust-cache has nothing to cache.

      - name: Clone, install, and run
        env:
          CARGO_HOME: /tmp/cargo-source
          # Route attacker-controllable GitHub context values through env
          # vars instead of inline `${{ }}` interpolation in the shell
          # script — see GitHub Actions security hardening guide. Even
          # though `release: published` requires write access (limiting
          # the practical attack surface for REF_NAME), the env-var
          # pattern is the established defense-in-depth convention used
          # elsewhere in this workflow.
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          ORIG_DIR="$PWD"
          mkdir -p "$CARGO_HOME"
          # The literal `git clone` ritual from README ## Installation
          # ## From source must work end-to-end. We resolve the ref the
          # clone should land on based on event:
          #   - release:      the exact tag being released
          #   - pull_request: the PR's HEAD commit, fetched via the
          #                   `refs/pull/<N>/head` ref so the SHA is
          #                   reachable for *both* same-repo and fork
          #                   PRs (a raw `origin <sha>` fetch would only
          #                   resolve same-repo branches because forks
          #                   live in a different remote).
          #   - schedule/dispatch: default branch
          if [ "$EVENT_NAME" = "release" ]; then
            git clone --branch "$REF_NAME" --depth 1 \
              https://github.com/koedame/chordsketch.git /tmp/chordsketch-src
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            git clone --depth 1 \
              https://github.com/koedame/chordsketch.git /tmp/chordsketch-src
            cd /tmp/chordsketch-src
            git fetch --depth 1 origin "refs/pull/${PR_NUMBER}/head"
            git checkout "$PR_HEAD_SHA"
            cd "$ORIG_DIR"
          else
            git clone --depth 1 \
              https://github.com/koedame/chordsketch.git /tmp/chordsketch-src
          fi
          cd /tmp/chordsketch-src
          cargo install --path crates/cli
          "$CARGO_HOME/bin/chordsketch" --version
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  homebrew:
    name: Homebrew
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@fc695c54c2032716dd4cedd007489c8e32fc8a5d # master

      - name: Tap and install
        run: |
          set -euo pipefail
          brew tap koedame/tap
          brew install chordsketch
          chordsketch --version

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  scoop:
    name: Scoop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Scoop
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy RemoteSigned -Force
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          echo "$env:USERPROFILE\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Add bucket and install
        shell: powershell
        run: |
          scoop bucket add koedame https://github.com/koedame/scoop-bucket
          scoop install chordsketch
          chordsketch --version

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  winget:
    name: winget (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install via winget
        shell: powershell
        run: |
          winget install --id koedame.chordsketch --exact --accept-source-agreements --accept-package-agreements --silent
          # winget portable installs place command-line aliases in
          # %LOCALAPPDATA%\Microsoft\WinGet\Links\ and adds that directory to
          # the user PATH in the registry — but the current process does not
          # inherit registry PATH changes. Write the Links directory to
          # $GITHUB_PATH so that all subsequent steps (including bash ones)
          # can find `chordsketch` without a new shell.
          $wingetLinks = "$env:LOCALAPPDATA\Microsoft\WinGet\Links"
          Add-Content -Path $env:GITHUB_PATH -Value $wingetLinks
          # Also refresh the current session so the immediate --version check works.
          $env:Path = "$wingetLinks;" + $env:Path
          chordsketch --version

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  chocolatey:
    name: Chocolatey (Windows)
    runs-on: windows-latest
    # Temporarily skipped: the chordsketch Chocolatey package is stuck in
    # community moderation (see #1852), so `choco install chordsketch` has
    # been failing on every run for an extended period. Re-enable this job
    # (remove `if: false` and drop `continue-on-error: true` per #1776) once
    # the package is reliably installable from the Chocolatey Community
    # Repository. Tracking: #2021.
    if: false
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install via Chocolatey
        shell: powershell
        run: |
          choco install chordsketch -y --no-progress
          # choco shims are on PATH by default on GitHub Actions runners
          chordsketch --version

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  snap:
    name: Snap (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install via Snap
        run: |
          set -euo pipefail
          sudo snap install chordsketch
          chordsketch --version

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  # AUR smoke is intentionally omitted. GitHub-hosted runners do not have
  # yay/paru or an Arch Linux base, and installing an AUR helper in CI
  # would require bootstrapping pacman on Ubuntu — fragile and slow.
  # AUR package correctness is verified by the PKGBUILD template in
  # packaging/aur/ and the post-release.yml update-aur job.
  # Rationale, alternatives considered, and watch signals for revisiting
  # this decision: docs/adr/0002-aur-smoke-coverage-exemption.md.

  library-smoke:
    name: Library Usage
    runs-on: ubuntu-latest
    steps:
      # Checkout is needed even on non-PR runs because the PR branch
      # variant uses workspace path-deps. Cheap on shallow clone.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Caches ~/.cargo/registry so crates.io dependency fetches are fast on
      # re-runs. The scratch project builds in /tmp/library-smoke so its target/
      # is NOT in the workspace; rust-cache will attempt to save the workspace
      # target/ but it will be empty for this job (harmless). The registry cache
      # alone is worthwhile given the daily + PR cadence.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: readme-smoke-library

      - name: Build and run README Library Usage snippet
        run: |
          set -euo pipefail
          # On PR events, we test the README snippet against the PR's
          # *workspace* crates via path deps so that a PR which changes
          # the public library API surface is caught immediately. On
          # all other events (schedule, release, dispatch), we test
          # against the *published* crates.io versions so that
          # post-release API drift between README and published crates
          # is caught daily. Both are necessary; one alone leaves a
          # window where README and reality can disagree.
          SCRATCH=/tmp/library-smoke
          mkdir -p "$SCRATCH/src"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CORE_DEP="chordsketch-core = { path = \"$GITHUB_WORKSPACE/crates/core\" }"
            RENDER_DEP="chordsketch-render-text = { path = \"$GITHUB_WORKSPACE/crates/render-text\" }"
            MODE="workspace path deps (PR)"
          else
            # Cargo `^0.1` means `>=0.1.0, <0.2.0` (the caret rules treat
            # the leftmost non-zero as the breaking-change boundary).
            # Bump policy: when the workspace bumps to 0.2.x, update both
            # constraints below to `^0.2` in the same release PR.
            # Otherwise, daily smoke tests will silently stop resolving.
            CORE_DEP='chordsketch-core = "^0.2"'
            RENDER_DEP='chordsketch-render-text = "^0.2"'
            MODE="crates.io published"
          fi
          echo "library-smoke mode: $MODE"
          cat > "$SCRATCH/Cargo.toml" << EOF
          [package]
          name = "library-smoke"
          version = "0.0.0"
          edition = "2021"
          publish = false

          [dependencies]
          $CORE_DEP
          $RENDER_DEP
          EOF
          cat > "$SCRATCH/src/main.rs" << 'EOF'
          use chordsketch_core::parser::parse;
          use chordsketch_render_text::render_song;

          fn main() {
              let input = "{title: Amazing Grace}\n{subtitle: Traditional}\n\n[G]Amazing [G7]grace, how [C]sweet the [G]sound";
              let song = parse(input).unwrap();
              let text = render_song(&song);
              println!("{text}");

              // Assertions: the rendered output must contain the title,
              // subtitle, and lyric text from the README snippet. If any
              // of these are missing, the public API or rendering
              // semantics drifted away from what the README promises.
              assert!(text.contains("Amazing Grace"), "missing title in output: {text}");
              assert!(text.contains("Traditional"), "missing subtitle in output: {text}");
              assert!(text.contains("sweet the"), "missing lyric in output: {text}");
          }
          EOF
          cd "$SCRATCH"
          cargo run --quiet

  usage-smoke:
    name: README Usage examples (source build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Caches the workspace target/ directory. Although CARGO_HOME is redirected to
      # /tmp/cargo-usage, cargo install --path still compiles into the workspace
      # target/, so subsequent runs skip recompiling unchanged crates.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: readme-smoke-usage

      - name: Install CLI from workspace
        env:
          CARGO_HOME: /tmp/cargo-usage
        run: |
          set -euo pipefail
          mkdir -p "$CARGO_HOME"
          cargo install --path crates/cli
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Render smoke
        uses: ./.github/actions/cli-render-smoke

  report-failure:
    name: Open or update tracking issue on failure
    needs:
      - docker-ghcr
      - docker-hub
      - npm-wasm
      - cargo-install
      - source-build
      - homebrew
      - scoop
      - winget
      - chocolatey
      - snap
      - library-smoke
      - usage-smoke
    if: failure() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # GH_REPO is honored by every `gh` invocation below, so we
          # don't need an actions/checkout to read remote.origin.url
          # from a local .git/. Without this, every previous run of
          # this job has died with:
          #   failed to run git: fatal: not a git repository
          # …meaning the auto-managed tracking issue was never
          # actually created. See koedame/chordsketch#1030.
          TITLE="README install smoke tests are failing"
          # Find existing open tracking issue (if any).
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty')
          BODY="One or more README install smoke tests failed.

          See run: $RUN_URL

          This issue is auto-managed by .github/workflows/readme-smoke.yml.
          It will not be re-opened if closed manually."
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "type:bug,priority:high"
          fi
