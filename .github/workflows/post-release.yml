name: Post-Release Package Updates

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$RELEASE_TAG"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.version.outputs.tag }}" -p checksums.txt

      - name: Generate formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract and validate SHA256 values from checksums.txt
          SHA_AARCH64_APPLE=$(grep "aarch64-apple-darwin" checksums.txt | awk '{print $1}')
          SHA_X86_64_APPLE=$(grep "x86_64-apple-darwin" checksums.txt | awk '{print $1}')
          SHA_AARCH64_LINUX=$(grep "aarch64-unknown-linux-gnu" checksums.txt | awk '{print $1}')
          SHA_X86_64_LINUX=$(grep "x86_64-unknown-linux-gnu" checksums.txt | awk '{print $1}')

          for var_name in SHA_AARCH64_APPLE SHA_X86_64_APPLE SHA_AARCH64_LINUX SHA_X86_64_LINUX; do
            val="${!var_name}"
            if [[ ! "$val" =~ ^[0-9a-fA-F]{64}$ ]]; then
              echo "ERROR: missing or invalid SHA256 for ${var_name}: '${val}'" >&2
              exit 1
            fi
          done

          # Generate formula from template
          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256_AARCH64_APPLE_DARWIN}}/${SHA_AARCH64_APPLE}/g" \
            -e "s/{{SHA256_X86_64_APPLE_DARWIN}}/${SHA_X86_64_APPLE}/g" \
            -e "s/{{SHA256_AARCH64_UNKNOWN_LINUX_GNU}}/${SHA_AARCH64_LINUX}/g" \
            -e "s/{{SHA256_X86_64_UNKNOWN_LINUX_GNU}}/${SHA_X86_64_LINUX}/g" \
            packaging/homebrew/chordsketch.rb.template > chordsketch.rb

          cat chordsketch.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Note on credential persistence: both this URL-form approach
          # AND the previous `git config http.<url>.extraheader "..."`
          # approach persist the token to `tap/.git/config` — the URL
          # form embeds it in `[remote "origin"].url`, the extraheader
          # form embeds it in `[http "https://github.com/"].extraheader`.
          # Neither approach avoids on-disk credential persistence; the
          # working directory itself is the trust boundary. Do NOT
          # `actions/upload-artifact` the `tap/` directory — that is the
          # only way the token would leak from this step. See #1086 for
          # the prior comment that overstated the URL-form's security.
          # Use a credential helper or SSH deploy key if true zero-disk
          # credential persistence is required.
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/koedame/homebrew-tap.git" tap
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p Formula
          cp ../chordsketch.rb Formula/chordsketch.rb
          git add Formula/chordsketch.rb
          git commit -m "Update chordsketch to ${VERSION}"
          git push

  update-scoop:
    name: Update Scoop manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$RELEASE_TAG"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.version.outputs.tag }}" -p checksums.txt

      - name: Generate manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_WINDOWS=$(grep "x86_64-pc-windows-msvc" checksums.txt | awk '{print $1}')

          if [[ ! "$SHA_WINDOWS" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "ERROR: missing or invalid SHA256 for x86_64-pc-windows-msvc: '${SHA_WINDOWS}'" >&2
            exit 1
          fi

          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256_X86_64_PC_WINDOWS_MSVC}}/${SHA_WINDOWS}/g" \
            packaging/scoop/chordsketch.json.template > chordsketch.json

          cat chordsketch.json

      - name: Push to scoop-bucket
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # See the credential-persistence note on `update-homebrew` above.
          # The token IS written to `bucket/.git/config`; do not artifact
          # this directory. #1086.
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/koedame/scoop-bucket.git" bucket
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p bucket
          cp ../chordsketch.json bucket/chordsketch.json
          git add bucket/chordsketch.json
          git commit -m "Update chordsketch to ${VERSION}"
          git push
