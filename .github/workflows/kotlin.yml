name: Kotlin Package

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/ffi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "packages/kotlin/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/kotlin.yml"
  pull_request:
    paths:
      - "crates/ffi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "packages/kotlin/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/kotlin.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g., v0.1.0). Leave empty to build from the workflow's ref without publishing."
        required: false
        type: string

permissions:
  contents: read

jobs:
  # Build the linux-x86_64 JNI library first so that generate-and-test
  # can start as soon as this single artifact is ready, without waiting for
  # the slower Windows build (see #1462).
  build-jni-linux-x64:
    name: Build JNI library (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: kotlin-x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build -p chordsketch-ffi --release --target x86_64-unknown-linux-gnu

      - name: Upload JNI library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jni-linux-x86-64
          path: target/x86_64-unknown-linux-gnu/release/libchordsketch_ffi.so
          retention-days: 7

  # Build the remaining 4 JNI targets in parallel with generate-and-test.
  # These are only needed by publish (release runs), not by generate-and-test.
  build-jni-others:
    name: Build JNI library (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            jni-dir: linux-aarch64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            jni-dir: darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            jni-dir: darwin-x86-64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            jni-dir: win32-x86-64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (aarch64-linux)
        # `cross` runs cargo inside a Docker container that already has
        # the aarch64 gcc toolchain, eliminating the need to install
        # gcc-aarch64-linux-gnu via apt-get on every run. The pre-built
        # binary from taiki-e/install-action is downloaded in ~5 seconds
        # vs. 1-2 minutes for apt-get. Docker is pre-installed on
        # ubuntu-latest runners.
        if: matrix.cross
        uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2 # v2
        with:
          tool: cross

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: kotlin-${{ matrix.target }}

      - name: Build
        # `cross` is used for the aarch64-linux target (matrix.cross == true);
        # all other targets build with plain `cargo`.
        # The command is on one line so it works on all runner shells
        # (bash, PowerShell, cmd) — backslash line continuation is bash-only.
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build -p chordsketch-ffi --release --target ${{ matrix.target }}

      - name: Upload JNI library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jni-${{ matrix.jni-dir }}
          path: |
            target/${{ matrix.target }}/release/libchordsketch_ffi.so
            target/${{ matrix.target }}/release/libchordsketch_ffi.dylib
            target/${{ matrix.target }}/release/chordsketch_ffi.dll
          retention-days: 7

  generate-and-test:
    name: Generate bindings and test
    # Wait only on the linux-x64 artifact, which is the only one consumed by
    # this job.  The remaining targets (build-jni-others) run in parallel
    # and are joined by publish for release completeness.
    needs: [build-jni-linux-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: kotlin-generate

      - name: Build FFI crate
        run: cargo build -p chordsketch-ffi

      - name: Generate Kotlin bindings
        run: |
          cargo run -p chordsketch-ffi --bin uniffi-bindgen generate \
            --library target/debug/libchordsketch_ffi.so \
            --language kotlin \
            --out-dir packages/kotlin/lib/src/main/kotlin/

      - name: Download JNI library (linux-x86-64)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: jni-linux-x86-64
          path: packages/kotlin/lib/src/main/resources/linux-x86-64/

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Test with Gradle
        working-directory: packages/kotlin
        run: |
          ./gradlew test

      - name: Upload generated Kotlin bindings
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kotlin-bindings
          path: packages/kotlin/lib/src/main/kotlin/uniffi/
          retention-days: 7

  publish:
    name: Publish to Maven Central
    # Wait for all JNI builds AND generate-and-test to ensure the package
    # contains validated bindings and every platform's JNI library.
    needs: [build-jni-linux-x64, build-jni-others, generate-and-test]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    # Scopes the four signing and publishing secrets to this environment,
    # matching the pattern used in python.yml (pypi), ruby.yml (rubygems),
    # and vscode-extension.yml (vscode-marketplace).
    #
    # One-time human setup: create the "maven-central" environment at
    #   https://github.com/koedame/chordsketch/settings/environments
    # and move CENTRAL_PORTAL_USERNAME, CENTRAL_PORTAL_PASSWORD,
    # GPG_SIGNING_KEY, GPG_SIGNING_PASSWORD from repository secrets to
    # environment secrets.
    #
    # If the "maven-central" environment does not exist (fork, fresh instance),
    # GitHub cannot start this job. continue-on-error keeps the overall workflow
    # green when CI succeeded but publishing infrastructure is absent. See #1443.
    continue-on-error: true
    environment:
      name: maven-central
      url: https://repo1.maven.org/maven2/io/github/koedame/chordsketch/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Check required secrets present
        # Fails fast when any Maven Central credential is missing so
        # "environment missing → silent skip" turns into a loud, diagnosable
        # error. Paired with the post-release rollup in release-verify.yml
        # which catches the silent environment-gate case. See #1506.
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: python3 scripts/check-env-secrets.py --channel maven-central

      - name: Download generated Kotlin bindings
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: kotlin-bindings
          path: packages/kotlin/lib/src/main/kotlin/uniffi/

      - name: Download all JNI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: jni-*
          path: packages/kotlin/lib/src/main/resources/
          merge-multiple: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Publish
        working-directory: packages/kotlin
        env:
          # Vanniktech maven-publish reads credentials from Gradle
          # properties; setting them via ORG_GRADLE_PROJECT_<name> env
          # vars is the standard CI pattern. The Central Portal user
          # token (NOT the legacy OSSRH user token) must be generated at
          # https://central.sonatype.com/account and added to repo
          # secrets as CENTRAL_PORTAL_USERNAME / CENTRAL_PORTAL_PASSWORD.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          # ASCII-armored secret GPG key from `gpg --export-secret-keys --armor <key id>`.
          # The signing key is unchanged from the previous OSSRH setup.
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          # `publishAllPublicationsToMavenCentralRepository` is the
          # repository task registered by the vanniktech plugin. With
          # `automaticRelease = true` set in build.gradle.kts, the
          # deployment will be promoted from VALIDATED to RELEASED
          # automatically after the upload completes.
          ./gradlew publishAllPublicationsToMavenCentralRepository --no-configuration-cache
