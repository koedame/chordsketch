name: Deploy Playground

on:
  push:
    branches: [main]
    paths:
      - 'crates/wasm/**'
      - 'packages/playground/**'
      - 'packages/ui-web/**'
      - 'packages/npm/**'
      - '.github/workflows/deploy-playground.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

# Fail-closed default: jobs that need write scopes must opt in via
# job-level `permissions:`. See issue #1839.
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install wasm-pack
        uses: ./.github/actions/install-wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Build @chordsketch/wasm (dual-package layout)
        # Use the canonical build script (`packages/npm/scripts/build.mjs`,
        # invoked via `npm run build`). It produces the dual-package layout
        # (web/ ESM + node/ CommonJS, each with its own `package.json`) that
        # the playground imports from at `packages/playground/src/main.ts`.
        # This is the same script that local development uses, and its
        # output is mirrored byte-for-byte by `npm-publish.yml`.
        run: npm run build
        working-directory: packages/npm

      - name: Install playground dependencies
        run: npm ci
        working-directory: packages/playground

      - name: Build playground
        run: npm run build
        working-directory: packages/playground

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/playground/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
