name: Deploy Playground

on:
  push:
    branches: [main]
    paths:
      - 'crates/wasm/**'
      - 'packages/playground/**'
      - 'packages/npm/**'
      - '.github/workflows/deploy-playground.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

env:
  WASM_PACK_VERSION: "0.14.0"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2 # v2
        with:
          tool: wasm-pack@${{ env.WASM_PACK_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Build @chordsketch/wasm (dual-package layout)
        # Use the canonical build script (`packages/npm/scripts/build.mjs`,
        # invoked via `npm run build`). It produces the dual-package layout
        # (web/ ESM + node/ CommonJS, each with its own `package.json`) that
        # the playground imports from at `packages/playground/src/main.ts`.
        # This is the same script that local development uses, and its
        # output is mirrored byte-for-byte by `npm-publish.yml`.
        run: npm run build
        working-directory: packages/npm

      - name: Install playground dependencies
        run: npm ci
        working-directory: packages/playground

      - name: Build playground
        run: npm run build
        working-directory: packages/playground

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: packages/playground/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
