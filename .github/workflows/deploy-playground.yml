name: Deploy Playground

on:
  push:
    branches: [main]
    paths:
      # The playground ships the wasm bundle built from `crates/wasm`, which
      # transitively depends on `chordsketch-chordpro` and every renderer
      # crate. A behaviour change in any of those (e.g. chord-diagram
      # rendering in `crates/chordpro`) changes the wasm output the deployed
      # playground serves, but watching only `crates/wasm/**` would not
      # redeploy and the live playground would go silently stale (issue
      # #2608: PR #2605's fret-number axis lived in `crates/chordpro` and
      # never reached the deployed site). Watch every crate so a transitive
      # change can never leave the deployed playground stale; the extra
      # redeploys for wasm-irrelevant crates (CLI / LSP / FFI / …) are cheap
      # and idempotent, and self-maintaining beats an explicit dep list that
      # the next `crates/wasm` dependency addition would silently outdate.
      - 'crates/**'
      - 'packages/playground/**'
      - 'packages/npm/**'
      - 'packages/npm-export/**'
      # The playground build pulls these workspace packages directly from
      # their SOURCE via Vite aliases (see `packages/playground/
      # vite.config.ts`: `@chordsketch/react` → `../react/src`, etc.), not
      # from a published/built copy. A change under any of them therefore
      # changes the bundle the deployed site serves, so — by the same
      # reasoning as the `crates/**` block above — they must be watched or
      # the live playground goes silently stale (PR #2633's
      # `packages/react/src/styles.css` metronome change merged without a
      # redeploy because none of these were listed; issue #2636).
      - 'packages/react/**'
      - 'packages/react-ui/**'
      - 'packages/ui-irealb-editor/**'
      # The docs SSG reads `docs/sdk/**` from disk at build time (see
      # `packages/playground/scripts/build-docs-static.mjs`), so Markdown
      # edits under that tree must trigger a redeploy or the deployed
      # docs go silently stale.
      - 'docs/sdk/**'
      - '.github/workflows/deploy-playground.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

# Fail-closed default: jobs that need write scopes must opt in via
# job-level `permissions:`. See issue #1839.
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install wasm-pack
        uses: ./.github/actions/install-wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Build @chordsketch/wasm (lean, dual-package layout)
        # Use the canonical build script (`packages/npm/scripts/build.mjs`,
        # invoked via `npm run build`). It produces the dual-package layout
        # (web/ ESM + node/ CommonJS, each with its own `package.json`) that
        # the playground imports from at `packages/playground/src/main.ts`.
        # This is the same script that local development uses, and its
        # output is mirrored byte-for-byte by `npm-publish.yml`.
        run: npm run build
        working-directory: packages/npm

      # `@chordsketch/wasm-export` is the heavy sister bundle (PDF /
      # PNG renderer surface, #2466). Vite resolves the import via
      # alias to this directory's `web/` build, so it must be built
      # before the playground build.
      - name: Build @chordsketch/wasm-export (heavy)
        run: npm run build
        working-directory: packages/npm-export

      - name: Install playground dependencies
        run: npm ci
        working-directory: packages/playground

      # Install sibling-package node_modules so tsc (run by
      # the playground's build) can resolve the transitive
      # react / codemirror / lezer imports inside the
      # ../react/src/*.tsx files pulled into the playground's
      # program via tsconfig paths and include. Each sibling
      # owns its own lockfile and its own CI typecheck — this
      # step exists purely to give node-style upward module
      # resolution a populated packages/<sibling>/node_modules/
      # to walk into.
      - name: Install and build @chordsketch/react
        # `npm ci` populates the React package's own devDeps so the
        # playground's `tsc` can resolve transitive imports inside
        # `../react/src/*.tsx` files. The `npm run build` step emits
        # `dist/` (consumed by other workspaces that resolve
        # `@chordsketch/react` via their `paths` mapping or by the
        # docs SSG) — necessary as of v0.3.0's React-consolidation
        # build graph (#2527).
        run: |
          npm ci
          npm run build
        working-directory: packages/react

      - name: Install @chordsketch/ui-irealb-editor dependencies
        run: npm ci
        working-directory: packages/ui-irealb-editor

      - name: Install @chordsketch/react-ui dependencies
        # `npm ci` populates the wasm-free primitives package's devDeps
        # so the playground's `tsc` can resolve the transitive `react`
        # imports inside `../react-ui/src/*.tsx`. Aliased to source, so
        # no `npm run build` is needed here.
        run: npm ci
        working-directory: packages/react-ui

      - name: Build playground
        run: npm run build
        working-directory: packages/playground

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/playground/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
