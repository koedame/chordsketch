name: Grammar Tests

on:
  push:
    branches: [main]
    paths:
      - "syntaxes/**"
      - ".github/workflows/grammar.yml"
  pull_request:
    paths:
      - "syntaxes/**"
      - ".github/workflows/grammar.yml"

concurrency:
  group: grammar-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: TextMate grammar snapshot tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syntaxes
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: syntaxes/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run grammar tests
        run: npm test
