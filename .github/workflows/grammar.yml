name: Grammar Tests

on:
  push:
    branches: [main]
    paths:
      - "syntaxes/**"
      - ".github/workflows/grammar.yml"
  pull_request:
    paths:
      - "syntaxes/**"
      - ".github/workflows/grammar.yml"

concurrency:
  group: grammar-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: TextMate grammar snapshot tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syntaxes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: syntaxes/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run grammar tests
        run: npm test
