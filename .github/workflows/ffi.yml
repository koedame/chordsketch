name: FFI Bindings

on:
  push:
    branches: [main]
    paths:
      - "crates/ffi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ffi.yml"
  pull_request:
    paths:
      - "crates/ffi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ffi.yml"

# Cancel stale PR runs when a new commit is pushed to the same PR so
# that rebase / force-push does not leave two parallel FFI builds
# contending for Linux runner capacity (every job here is
# `ubuntu-latest`). `main` pushes, tag pushes, and `workflow_dispatch` /
# `release` events are not grouped with PRs and run to completion.
concurrency:
  group: ffi-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test FFI crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ffi
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build
        run: cargo build -p chordsketch-ffi

      - name: Test
        run: cargo test -p chordsketch-ffi

      - name: Format
        run: cargo fmt -p chordsketch-ffi --check

      - name: Clippy
        run: cargo clippy -p chordsketch-ffi -- -D warnings

  # Smoke-test that UniFFI binding generation succeeds for all languages.
  # Each language has its own dedicated workflow (python.yml, swift.yml,
  # kotlin.yml, ruby.yml) that generates, tests, and publishes bindings.
  # This job catches UDL schema breakage early without running full builds.
  generate-bindings:
    name: Generate ${{ matrix.language }} bindings
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, swift, kotlin, ruby]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ffi
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build FFI crate
        run: cargo build -p chordsketch-ffi

      - name: Determine library path
        id: lib-path
        run: |
          case "$RUNNER_OS" in
            Linux)  echo "path=target/debug/libchordsketch_ffi.so" >> "$GITHUB_OUTPUT" ;;
            macOS)  echo "path=target/debug/libchordsketch_ffi.dylib" >> "$GITHUB_OUTPUT" ;;
            Windows) echo "path=target/debug/chordsketch_ffi.dll" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported RUNNER_OS: $RUNNER_OS" && exit 1 ;;
          esac

      - name: Generate bindings
        run: |
          cargo run -p chordsketch-ffi --bin uniffi-bindgen generate \
            --library "${{ steps.lib-path.outputs.path }}" \
            --language "${{ matrix.language }}" \
            --out-dir "bindings/${{ matrix.language }}"
