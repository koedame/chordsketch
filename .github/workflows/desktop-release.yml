name: Desktop Release

# Tag-triggered release pipeline for the ChordSketch desktop app.
# Builds the 4-cell matrix (same as `desktop-build.yml`) and
# publishes the resulting native installers plus a `SHA256SUMS`
# file to a GitHub Release.
#
# Tag namespace: `desktop-v<major>.<minor>.<patch>[-prerelease]`.
# Kept separate from the CLI's `v<major>.<minor>.<patch>` namespace
# so the two can ship on independent cadences without one tag
# firing the other's workflow. `release.yml`'s trigger
# (`tags: ['v*']`) does NOT match `desktop-v*` — fnmatch requires
# the tag name to start with `v`.
#
# Signing: this workflow ships **unsigned** bundles today. When
# #2075 lands (Apple Developer ID + Windows Authenticode
# certificates in repository secrets), Tauri's build step picks
# up the signing env vars automatically and the same cargo tauri
# build invocation below starts producing signed artefacts
# without a workflow change. The `TAURI_SIGNING_PRIVATE_KEY` /
# `APPLE_SIGNING_IDENTITY` / `WINDOWS_CERTIFICATE_*` env vars are
# reserved here so the plumbing is already in place.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., desktop-v0.1.0)"
        required: true
        type: string

# Release-shape concurrency per `.claude/rules/ci-parallelization.md`
# §5 "Release/tag-triggered workflows" — a partial release (some
# platform bundles missing) would silently degrade every
# downstream install path, so NEVER cancel in-flight runs on a
# second tag push or a re-dispatch.
concurrency:
  group: desktop-release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate tag format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ inputs.tag || github.ref_name }}
          prefix: desktop-

  build:
    name: Build (${{ matrix.platform.label }})
    needs: [validate]
    runs-on: ${{ matrix.platform.runner }}
    # Fail-closed: if any matrix cell fails, the downstream
    # `release` job (needs: build) is skipped and no GitHub
    # Release is created. A partial desktop release would orphan
    # users on the failing platform, so holding back the whole
    # cut is safer. Mirrors the rationale in `release.yml`'s
    # `build` job (see #1806).
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
          - label: macos-x86_64
            # Cross-compile from Apple Silicon per #1084 — same
            # decision documented in `desktop-build.yml`.
            runner: macos-latest
            target: x86_64-apple-darwin
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Pin to the tag under release so `workflow_dispatch` runs
          # build from the tagged commit rather than whichever branch
          # HEAD the user selected as the dispatch ref. `push: tags:`
          # events already resolve GITHUB_SHA to the tagged commit,
          # so this `ref:` is a no-op on that path and a correctness
          # fix for manual re-runs (#2226).
          ref: ${{ inputs.tag || github.ref }}

      - name: Desktop bundle build steps
        # Shared composite with `desktop-build.yml` (#2223). Per
        # `.claude/rules/ci-parallelization.md` §2, tag-triggered
        # workflows run too infrequently for rust-cache to help;
        # `enable-cache: "false"` suppresses the cache step.
        # `build-config` enables updater `.sig` file generation
        # only for the release pipeline (#2076 rationale in the
        # composite's doc). Signing secrets are threaded through
        # the composite's pass-through inputs; absent values ship
        # unsigned installers (pre-#2075 state).
        uses: ./.github/actions/desktop-build-steps
        with:
          target: ${{ matrix.platform.target }}
          enable-cache: "false"
          build-config: '{"bundle":{"createUpdaterArtifacts":true}}'
          apple-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          apple-id: ${{ secrets.APPLE_ID }}
          apple-password: ${{ secrets.APPLE_PASSWORD }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}
          windows-certificate: ${{ secrets.WINDOWS_CERTIFICATE }}
          windows-certificate-password: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          tauri-signing-private-key: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          tauri-signing-private-key-password: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect bundles into a flat directory
        # Downstream SHA256SUMS and Release upload want one
        # directory per cell with just the installer files. Flat
        # out the nested `bundle/<type>/` layout so the collected
        # tree is easy to glob.
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          ARCH_LABEL: ${{ matrix.platform.label }}
        run: |
          set -euo pipefail
          SRC="target/${{ matrix.platform.target }}/release/bundle"
          DST="release-artefacts/${ARCH_LABEL}"
          mkdir -p "$DST"
          # macOS: .dmg + .app.tar.gz (+ their .sig). Windows: .msi
          # + .exe (+ .sig). Linux: .deb + .rpm + .AppImage (+ .sig).
          # The `|| true` tolerates platforms that don't emit a given
          # format. `.sig` files are Tauri updater signatures written
          # alongside their respective bundles whenever
          # `TAURI_SIGNING_PRIVATE_KEY` is populated (#2076); without
          # the secret the `.sig` glob matches nothing and auto-update
          # stays disabled — the rest of the release still ships.
          for pat in '*.dmg' '*.app.tar.gz' '*.app.tar.gz.sig' \
                     '*.msi' '*.msi.sig' '*.exe' '*.exe.sig' \
                     '*.deb' '*.rpm' '*.AppImage' '*.AppImage.sig'; do
            find "$SRC" -type f -name "$pat" -exec cp -v {} "$DST/" \; || true
          done

          # Tauri 2.10 emits `<ProductName>.app.tar.gz` and
          # `<ProductName>.app.tar.gz.sig` for the macOS updater
          # bundle WITHOUT the `_<version>_<arch>` suffix that the
          # `.dmg` carries. Two macOS cells produce identically-named
          # files, and the release-flatten step (job `release` below)
          # then `cp`s both into a single flat `release/` directory,
          # silently overwriting one cell's bundle with the other's.
          # The `publish-updater-manifest` job further down expects
          # `*_<version>_(aarch64|x64).app.tar.gz.sig` per platform
          # — which never exists on the release. Fix: rename per
          # cell to match the existing `_<version>_<arch>` convention
          # before upload-artifact captures the cell. See #2260.
          if [ "${ARCH_LABEL}" = "macos-aarch64" ] || [ "${ARCH_LABEL}" = "macos-x86_64" ]; then
            VERSION="${TAG#desktop-v}"
            case "${ARCH_LABEL}" in
              macos-aarch64) ARCH=aarch64 ;;
              macos-x86_64)  ARCH=x64 ;;
            esac
            for f in "$DST"/*.app.tar.gz "$DST"/*.app.tar.gz.sig; do
              [ -e "$f" ] || continue
              dir=$(dirname "$f")
              base=$(basename "$f")
              # Strip everything before `.app.tar.gz` so the rename is
              # idempotent if Tauri ever starts emitting a versioned
              # name in a future release — `ChordSketch.app.tar.gz`
              # and `ChordSketch_<v>_<a>.app.tar.gz` both reduce to
              # the same target name here.
              ext="${base#*.app.tar.gz}"  # "" or ".sig"
              new="ChordSketch_${VERSION}_${ARCH}.app.tar.gz${ext}"
              if [ "$base" != "$new" ]; then
                mv -v "$f" "$dir/$new"
              fi
            done
          fi

          ls -la "$DST"

      - name: Upload cell artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chordsketch-desktop-${{ matrix.platform.label }}
          path: release-artefacts/${{ matrix.platform.label }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all cell artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Re-validate tag format
        # Guard against the `release` job running without the
        # `validate` job's format check (e.g. a future refactor
        # that drops the `needs:`).
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ steps.tag.outputs.tag }}
          prefix: desktop-

      - name: Flatten artefacts + generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          # Copy every file in every downloaded cell directory
          # into a flat `release/` for the Release upload.
          find dist -type f \
            \( -name '*.dmg' -o -name '*.app.tar.gz' \
               -o -name '*.app.tar.gz.sig' -o -name '*.msi' \
               -o -name '*.msi.sig' -o -name '*.exe' \
               -o -name '*.exe.sig' -o -name '*.deb' \
               -o -name '*.rpm' -o -name '*.AppImage' \
               -o -name '*.AppImage.sig' \) \
            -exec cp -v {} release/ \;
          cd release
          # Deterministic sort so the SHA256SUMS file is stable
          # across runs (same tag → same file content). NUL-delimited
          # form (`-printf '%f\0'` + `sort -z` + `xargs -0`) so a
          # future installer filename with whitespace still produces
          # one-line-per-file output; Tauri's current naming scheme
          # (`ChordSketch_<version>_<arch>.<ext>`) never contains
          # spaces, so this is defense-in-depth (#2229).
          find . -type f -printf '%f\0' | sort -z | xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Assert RELEASE_DISPATCH_TOKEN is present
        # Per ADR-0009: the release MUST be created by a PAT, not
        # GITHUB_TOKEN, so that `release: [published]` cascades.
        # Fail loud if the secret is missing.
        env:
          DISPATCH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "::error::RELEASE_DISPATCH_TOKEN is unset. Per ADR-0009 this token is required for desktop releases to cascade. Provision it via 'gh secret set RELEASE_DISPATCH_TOKEN' before re-running."
            exit 1
          fi

      - name: Create Release
        env:
          # See ADR-0009. `RELEASE_DISPATCH_TOKEN` is a fine-grained
          # PAT (Contents: Read and write on this repo only). Using
          # a non-GITHUB_TOKEN here is what causes the resulting
          # `release: [published]` event to fire downstream workflows.
          GH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        # `--generate-notes` asks GitHub to auto-build the body
        # from commits + merged PRs between the previous
        # `desktop-v*` tag and this one. `--verify-tag` ensures
        # the tag actually exists on the remote.
        #
        # `--latest=false` is REQUIRED, not optional. When it is
        # omitted, `gh release create` defaults to GitHub's
        # `make_latest=legacy` semver-based picker, which compares
        # `desktop-v0.3.0`'s semver against the CLI's `v*` tags
        # and silently promotes the desktop tag to "latest". That
        # broke `chordsketch-action@v1` for downstream users on
        # 2026-04-25 because the action's "resolve latest"
        # endpoint returned `desktop-v0.3.0` and tried to download
        # CLI binaries from a release that only had desktop
        # bundles (#2260). Mapping the desktop release out of the
        # "latest" picker keeps the CLI's `v*` chain authoritative
        # for the GitHub Releases landing page and for the
        # `/releases/latest` API.
        #
        # Known cosmetic for the very first `desktop-v*` tag:
        # `--generate-notes` has no prior tag in the desktop
        # namespace to diff against, so GitHub falls back to
        # "every merged PR since the repo was created". The note
        # body will be long; edit manually after the release cuts
        # if desired. Subsequent desktop tags diff against the
        # immediately-prior `desktop-v*` and are concise (#2229).
        #
        # `--prerelease` is set iff the tag carries a prerelease
        # suffix (`desktop-v0.1.0-beta.1`, `desktop-v0.2.0-rc.1`).
        # Without it, a prerelease tag would publish as a
        # "latest"-eligible release and leak into users' stable
        # update channels (#2227).
        run: |
          set -euo pipefail
          args=(
            "$TAG"
            --repo "$GITHUB_REPOSITORY"
            --title "$TAG"
            --generate-notes
            --verify-tag
            --latest=false
          )
          # Prerelease suffix is anything after the `MAJOR.MINOR.PATCH`
          # triplet; the tag format regex (validate job above) already
          # guarantees the suffix starts with `-` when present.
          if printf '%s' "$TAG" | grep -Eq '^desktop-v[0-9]+\.[0-9]+\.[0-9]+-'; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}" release/*

  update-cask:
    name: Update Homebrew Cask
    # Fans out the `brew install --cask chordsketch` path (#2079).
    # Clones the existing `koedame/homebrew-tap` (shared with the
    # CLI formula under `Formula/chordsketch.rb`), writes the
    # generated cask to `Casks/chordsketch.rb`, and pushes. The
    # token secret is shared with the CLI post-release flow.
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Pin to the tag under release so `workflow_dispatch` re-runs
          # read `packaging/homebrew/chordsketch-desktop.rb.template`
          # from the tagged commit rather than the current branch HEAD.
          # Same source-commit-drift class fixed in the `build` job
          # (#2226); a future placeholder rename in the template would
          # otherwise produce a silently-broken cask on re-dispatch.
          ref: ${{ inputs.tag || github.ref }}

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # `desktop-v0.1.0` → `0.1.0`
          echo "version=${TAG#desktop-v}" >> "$GITHUB_OUTPUT"

      - name: Re-validate tag format
        # Same defense-in-depth as the `release` job — `needs:
        # [release]` already serialises on a validated tag, but
        # a future refactor could break that ordering.
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ steps.version.outputs.tag }}
          prefix: desktop-

      - name: Download SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release download "$TAG" -p SHA256SUMS

      - name: Generate cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # The DMG filename pattern is determined by Tauri's
          # bundle output: `<ProductName>_<version>_<arch>.dmg`
          # where `<arch>` is `aarch64` or `x64` (NOT the rust
          # triple). `SHA256SUMS` lists the base filename (no
          # directory prefix), so a suffix grep is safe.
          #
          # Pre-escape VERSION's dots so the grep regex matches
          # literal version numbers, not regex wildcards — a
          # hypothetical `0.1.0` that also matched `0X1Y0` would
          # silently over-match if two DMGs ever coexisted in the
          # same `SHA256SUMS` file.
          VERSION_RE=$(printf '%s' "$VERSION" | sed 's/\./\\./g')
          SHA_ARM=$(grep -E "_${VERSION_RE}_aarch64\.dmg\$" SHA256SUMS | awk '{print $1}')
          SHA_X64=$(grep -E "_${VERSION_RE}_x64\.dmg\$" SHA256SUMS | awk '{print $1}')
          for name in SHA_ARM SHA_X64; do
            val="${!name}"
            if [[ ! "$val" =~ ^[0-9a-fA-F]{64}$ ]]; then
              echo "ERROR: missing or invalid SHA256 for ${name}: '${val}'" >&2
              echo "SHA256SUMS contents:" >&2
              cat SHA256SUMS >&2
              exit 1
            fi
          done

          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256_DMG_AARCH64_APPLE_DARWIN}}/${SHA_ARM}/g" \
            -e "s/{{SHA256_DMG_X86_64_APPLE_DARWIN}}/${SHA_X64}/g" \
            packaging/homebrew/chordsketch-desktop.rb.template > chordsketch.rb
          cat chordsketch.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Same credential-persistence trade-off as
          # `post-release.yml` (#1086 comment there): the token
          # embeds into `tap/.git/config`. Do NOT
          # `actions/upload-artifact` the `tap/` directory.
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/koedame/homebrew-tap.git" tap
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p Casks
          cp ../chordsketch.rb Casks/chordsketch.rb
          git add Casks/chordsketch.rb
          # `--allow-empty` tolerates the already-identical case
          # (a re-run on the same tag), which keeps the
          # workflow_dispatch idempotent.
          git commit --allow-empty -m "Update chordsketch desktop cask to ${VERSION}"
          git push

  publish-updater-manifest:
    name: Publish Tauri updater manifest
    # Generates `latest.json` — the manifest the Tauri updater
    # plugin reads from `tauri.conf.json`'s `endpoints` entry — and
    # publishes it to the **`desktop-updater-manifest` branch** of
    # this repo. Each entry points at the format Tauri's updater
    # actually consumes per platform (macOS: `.app.tar.gz`; Linux:
    # `.AppImage`; Windows: `.exe`) and embeds the matching `.sig`
    # signature with its multi-line minisign frame preserved.
    #
    # Why a branch, not a release asset: `/releases/latest/download/`
    # resolves to the repo-wide "Latest" release — which is the CLI
    # (`v*`) release, not the desktop (`desktop-v*`) one, because
    # the desktop pipeline intentionally omits `--latest` to avoid
    # demoting CLI releases on the repo landing page. A branch-
    # hosted manifest is stable (tag-independent), cheap to update
    # (single git push), and well-supported by Tauri's updater
    # (which just GETs the URL).
    #
    # If `TAURI_SIGNING_PRIVATE_KEY` is not set in repo secrets
    # (the pre-#2076 state), the `.sig` files never exist and this
    # job fails early with a clear error rather than publishing a
    # manifest with empty signatures that would fail client-side
    # verification.
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Determine tag + version
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#desktop-v}" >> "$GITHUB_OUTPUT"

      - name: Re-validate tag format
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ steps.tag.outputs.tag }}
          prefix: desktop-

      - name: Download release signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p sigs
          cd sigs
          # `gh release download` with `-p '*.sig'` would match too
          # aggressively; listing patterns explicitly both documents
          # the platform set and fails closed if a platform's
          # signature is missing (e.g. the signing env var was
          # unset on that runner).
          gh release download "$TAG" \
            -p "*.app.tar.gz.sig" \
            -p "*.AppImage.sig" \
            -p "*-setup.exe.sig" || {
              echo "ERROR: release $TAG does not contain the updater signature files." >&2
              echo "       Verify TAURI_SIGNING_PRIVATE_KEY is populated in repo secrets." >&2
              exit 1
            }
          ls -la

      - name: Build latest.json
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
          # `gh release view` inside this step reads the release
          # body the `release` job just created. Previously this
          # was set in a second `env:` block at the bottom of the
          # step, which GitHub Actions rejects as duplicate-key —
          # Python's PyYAML tolerates it (second key overwrites),
          # so `python3 -c 'yaml.safe_load(...)'` passes locally
          # while `actions/workflows/.../dispatches` returns
          # `HTTP 422: 'env' is already defined`. Merged here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION_RE=$(printf '%s' "$VERSION" | sed 's/\./\\./g')
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          cd sigs

          # Each Tauri platform key uses a fixed arch suffix
          # (`aarch64` / `x86_64`) — NOT the rust triple — and the
          # URL points at the binary, not the `.sig` file.
          #
          # Per-platform signature bodies are read via `jq -Rs`,
          # which preserves the full multi-line minisign frame
          # (`untrusted comment`, signature, `trusted comment`,
          # global signature). A flattened single-line form breaks
          # the minisign parser on the client and every auto-update
          # check fails signature verification. See PR #2235 review.
          manifest_platforms=$(jq -n '{}')
          for platform in darwin-aarch64 darwin-x86_64 linux-x86_64 windows-x86_64; do
            case "$platform" in
              darwin-aarch64) suffix="aarch64.app.tar.gz" ;;
              darwin-x86_64)  suffix="x64.app.tar.gz" ;;
              linux-x86_64)   suffix="amd64.AppImage" ;;
              windows-x86_64) suffix="x64-setup.exe" ;;
            esac
            sig_file=$(find . -maxdepth 1 -type f -name "*_${VERSION_RE}_${suffix}.sig" -printf '%f\n' | head -n1)
            if [ -z "$sig_file" ]; then
              echo "ERROR: missing signature for platform ${platform} (suffix ${suffix})" >&2
              exit 1
            fi
            url="${BASE}/${sig_file%.sig}"
            manifest_platforms=$(
              jq --arg key "$platform" \
                 --rawfile sig "$sig_file" \
                 --arg url "$url" \
                 '. + { ($key): { signature: $sig, url: $url } }' \
                 <<<"$manifest_platforms"
            )
          done

          release_notes=$(gh release view "$TAG" --json body --jq .body)
          pub_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$release_notes" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$manifest_platforms" \
            '{ version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms }' \
            > latest.json

          # Sanity: the Tauri updater client parses this document
          # with `serde_json`; `jq .` rejects malformed JSON so a
          # broken template expansion cannot ship.
          jq . latest.json > /dev/null
          cat latest.json

      - name: Publish latest.json to desktop-updater-manifest branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          # The manifest lives on its own branch (`desktop-updater-manifest`)
          # so the Tauri updater can GET a stable URL regardless of
          # which release is marked "latest" on the repo. Reusing
          # the `GITHUB_TOKEN` (which already has `contents: write`
          # per the job-level `permissions:` above) avoids provisioning
          # a dedicated PAT.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Probe whether the publishing branch exists before choosing
          # between the clone path and the orphan-bootstrap path.
          # `git ls-remote --exit-code --heads` returns 2 iff the ref
          # does not exist, 0 when it does, and a non-2 non-zero on
          # auth/network failures. Bootstrapping only on the explicit
          # "branch not found" signal prevents a transient network
          # error from clobbering an already-published branch's
          # history by running `--orphan` + `git rm -rf .` against it.
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          set +e
          git ls-remote --exit-code --heads "$REMOTE_URL" desktop-updater-manifest >/dev/null
          ls_remote_rc=$?
          set -e
          case "$ls_remote_rc" in
            0)
              git clone --depth=1 "$REMOTE_URL" \
                --branch desktop-updater-manifest \
                manifest-repo
              ;;
            2)
              # Branch doesn't exist yet — bootstrap it as an orphan
              # branch containing only `latest.json`. The
              # --orphan + rm -rf + commit dance is the canonical
              # git idiom for a no-history publishing branch.
              git clone --depth=1 "$REMOTE_URL" manifest-repo
              cd manifest-repo
              git checkout --orphan desktop-updater-manifest
              git rm -rf .
              cd ..
              ;;
            *)
              echo "ERROR: git ls-remote failed with exit code ${ls_remote_rc}" >&2
              echo "       This is not a 'branch not found' failure" \
                   "(exit 2); refusing to fall through to the orphan" \
                   "bootstrap path. Check network / auth / permissions." >&2
              exit "$ls_remote_rc"
              ;;
          esac
          cp sigs/latest.json manifest-repo/latest.json
          cd manifest-repo
          git add latest.json
          # `--allow-empty` so re-running workflow_dispatch on a
          # tag that produced an identical manifest still succeeds.
          git commit --allow-empty \
            -m "Publish updater manifest for ${TAG}"
          git push origin desktop-updater-manifest

      - name: Also upload latest.json to the release (convenience)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          # Duplicate the manifest as a release asset so maintainers
          # inspecting a specific release can see the exact
          # signature payloads without branch-checkout. The branch
          # is the source of truth for the live updater endpoint.
          gh release upload "$TAG" sigs/latest.json --clobber
