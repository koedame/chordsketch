name: napi-rs Native Addon

on:
  push:
    branches: [main]
    paths:
      - "crates/napi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/napi.yml"
  pull_request:
    paths:
      - "crates/napi/**"
      - "crates/chordpro/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/napi.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g., v0.2.0)"
        required: true
        type: string

# Cancel stale PR runs when a new commit is pushed to the same PR so
# that rebase / force-push does not leave two parallel napi-rs builds
# competing for the macOS 5-job concurrency cap. `main` pushes, tag
# pushes, and `workflow_dispatch` / `release` events are not grouped
# with PRs and run to completion.
concurrency:
  group: napi-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Force `bash -eo pipefail` for every `run:` block, including on the
# Windows matrix cell, so a broken command in a pipe or an empty
# `rustup target add` fails loud instead of being swallowed by pwsh's
# permissive defaults. Closes the fix-propagation gap from PR #1821
# (issue #1835). The unshelled blocks in this workflow — `rustup target
# add`, `npm install -g`, `napi build` — are all cross-platform CLI
# tools that behave identically under Git Bash on Windows, so switching
# away from pwsh has no functional impact.
# `-u` is added on top (issue #1836) so a typo'd env-var reference
# fails loud; every var-using block in this workflow already runs
# `set -euo pipefail` explicitly.
defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Intentionally fail-closed: if any build matrix cell fails, the
    # downstream `publish` job is skipped. The published
    # `@chordsketch/node` package resolves a platform-specific
    # prebuilt binary at install time via optionalDependencies; a
    # missing platform triple results in a hard install failure on
    # that platform with no universal fallback. Blocking the whole
    # release until every cell succeeds is the safer failure mode.
    # Contrast with `vscode-extension.yml build-platform`, which has
    # a universal VSIX fallback (#1795). See #1806.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: napi-${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: crates/napi
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          napi build --release --manifest-path Cargo.toml --target ${{ matrix.target }}

      - name: Smoke test the built addon (host target only)
        # Load the just-built .node file into the runner's Node.js and call
        # every public API surface end-to-end. The unit tests in
        # `crates/napi/src/lib.rs` only exercise the underlying chordsketch
        # crates, not the napi wrapper functions, because napi::Error /
        # Buffer need the Node.js runtime for linking. CI is the only place
        # we can exercise the actual #[napi] -> JsValue boundary, so do it
        # here against the freshly-built artifact. See #1066.
        #
        # Cross-compiled targets (aarch64-linux from x86_64 runner) cannot
        # `require()` their `.node` file on the build host, so this step is
        # gated to host-native targets only. The published Node.js addon
        # still gets exercised end-to-end on every supported platform via
        # readme-smoke.
        if: |
          (matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu') ||
          (matrix.os == 'macos-latest' && matrix.target == 'aarch64-apple-darwin') ||
          (matrix.os == 'windows-latest' && matrix.target == 'x86_64-pc-windows-msvc')
        working-directory: crates/napi
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const files = fs.readdirSync(".").filter(f => f.endsWith(".node"));
            if (files.length !== 1) {
              throw new Error("expected exactly 1 .node file, found " + files.length + ": " + files.join(","));
            }
            const m = require("./" + files[0]);
            const v = m.version();
            if (!v || typeof v !== "string") throw new Error("version() returned: " + JSON.stringify(v));
            console.log("version:", v);
            const text = m.renderText("{title:Test}\n[C]Hello");
            if (!text.includes("Test")) throw new Error("renderText output missing title");
            console.log("renderText: OK");
            const html = m.renderHtml("{title:Test}\n[C]Hello");
            if (!html.includes("Test")) throw new Error("renderHtml output missing title");
            console.log("renderHtml: OK");
            const pdf = m.renderPdf("{title:Test}\n[C]Hello");
            if (!Buffer.isBuffer(pdf)) throw new Error("renderPdf did not return a Buffer");
            if (!pdf.toString("utf8", 0, 4).startsWith("%PDF")) throw new Error("renderPdf output missing PDF header");
            console.log("renderPdf: OK");
            const optsText = m.renderTextWithOptions("{title:Test}\n[C]Hello", { transpose: 2 });
            if (!optsText.includes("Test")) throw new Error("renderTextWithOptions output missing title");
            console.log("renderTextWithOptions: OK");
            const optsHtml = m.renderHtmlWithOptions("{title:Test}\n[C]Hello", { config: "guitar" });
            if (!optsHtml.includes("Test")) throw new Error("renderHtmlWithOptions output missing title");
            console.log("renderHtmlWithOptions: OK");
            const optsPdf = m.renderPdfWithOptions("{title:Test}\n[C]Hello", { transpose: 2 });
            if (!Buffer.isBuffer(optsPdf)) throw new Error("renderPdfWithOptions did not return a Buffer");
            if (!optsPdf.toString("utf8", 0, 4).startsWith("%PDF")) throw new Error("renderPdfWithOptions output missing PDF header");
            console.log("renderPdfWithOptions: OK");
            const errs = m.validate("{title:T}\n[C]X");
            if (!Array.isArray(errs) || errs.length !== 0) throw new Error("validate(valid) returned " + JSON.stringify(errs));
            console.log("validate (valid): OK");
            const errs2 = m.validate("{title:T}\n[G");
            if (!Array.isArray(errs2) || errs2.length === 0) throw new Error("validate(broken) returned " + JSON.stringify(errs2));
            console.log("validate (broken): OK");
            console.log("All smoke tests passed!");
          '

      - name: Jest warning-routing test (host target only)
        # Exercises the full Rust flush_warnings → eprintln! → stderr path.
        # Must run after the .node artifact is built and on the same host
        # targets as the smoke test (cross-compiled artifacts cannot be
        # required on the build host).  See #1568.
        if: |
          (matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu') ||
          (matrix.os == 'macos-latest' && matrix.target == 'aarch64-apple-darwin') ||
          (matrix.os == 'windows-latest' && matrix.target == 'x86_64-pc-windows-msvc')
        working-directory: crates/napi
        shell: bash
        run: |
          npm install --ignore-scripts
          npx jest --no-coverage

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: napi-${{ matrix.target }}
          path: crates/napi/*.node
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: napi-lint
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Clippy
        run: cargo clippy -p chordsketch-napi -- -D warnings

      - name: Format check
        run: cargo fmt --check -p chordsketch-napi

  upload-release-tarballs:
    name: Upload napi tarballs to GitHub Release
    # Per ADR-0008, npm publishing is a maintainer-local manual operation.
    # This job no longer publishes — it stages the platform packages with
    # their prebuilt .node files and uploads them as compressed tarballs to
    # the GitHub Release for the maintainer to fetch via `gh release
    # download <tag>` and publish locally with the script in
    # `crates/napi/scripts/local-publish.sh`.
    #
    # `build` must succeed so every target triple has an artifact to stage;
    # we download them all, assemble each platform package, and tar the
    # six packages (5 platforms + meta) into the release.
    needs: [build]
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Validate release tag
        # Format-validate the user-supplied tag before downstream steps
        # derive a `version` from it. See #1797.
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ inputs.tag || github.event.release.tag_name || github.ref_name }}

      - name: Determine version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          else
            tag="$INPUT_TAG"
          fi
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Staging @chordsketch/node@$version for local publish"

      - name: Download all platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: napi-artifacts
          pattern: napi-*
          merge-multiple: false

      - name: Stage each platform package with its prebuilt binary
        # Each `crates/napi/npm/<triple>/package.json` declares a `main` and
        # `files` entry referencing a specific `.node` filename. Copy the
        # downloaded artifact into the staging directory under that name so
        # the local `npm publish` picks it up via the `files` allowlist.
        # Fail loud if a target's artifact is missing, rather than uploading
        # an empty package.
        working-directory: crates/napi
        run: |
          set -euo pipefail
          declare -A TARGET_TO_TRIPLE=(
            [x86_64-unknown-linux-gnu]=linux-x64-gnu
            [aarch64-unknown-linux-gnu]=linux-arm64-gnu
            [x86_64-apple-darwin]=darwin-x64
            [aarch64-apple-darwin]=darwin-arm64
            [x86_64-pc-windows-msvc]=win32-x64-msvc
          )
          for target in "${!TARGET_TO_TRIPLE[@]}"; do
            triple="${TARGET_TO_TRIPLE[$target]}"
            src_dir="../../napi-artifacts/napi-${target}"
            dst_dir="npm/${triple}"
            if [ ! -d "$src_dir" ]; then
              echo "::error::artifact directory $src_dir is missing; build matrix failed for $target"
              exit 1
            fi
            node_file=$(ls "$src_dir"/*.node 2>/dev/null | head -n1 || true)
            if [ -z "$node_file" ]; then
              echo "::error::no .node file found in $src_dir"
              exit 1
            fi
            cp "$node_file" "$dst_dir/chordsketch-napi.${triple}.node"
            # Verify the file is non-empty — a zero-byte .node uploads
            # without error but fails at require() time on the user.
            if [ ! -s "$dst_dir/chordsketch-napi.${triple}.node" ]; then
              echo "::error::$dst_dir/chordsketch-napi.${triple}.node is empty"
              exit 1
            fi
            ls -la "$dst_dir/"
          done

      - name: Assert committed version matches the release tag
        # crates/napi/package.json and each crates/napi/npm/<triple>/package.json
        # all have a committed `version` field that must match the release tag
        # exactly. The version-consistency check enforces this on every PR, but
        # re-verify here to catch any out-of-band edit that slipped through
        # (e.g., a hotfix tag cut from an older commit).
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          check() {
            local path="$1"
            local actual
            actual=$(node -p "require('./$path/package.json').version")
            if [ "$actual" != "$EXPECTED" ]; then
              echo "::error::$path/package.json version=$actual but release tag is $EXPECTED"
              exit 1
            fi
          }
          check crates/napi
          for triple in linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64 win32-x64-msvc; do
            check "crates/napi/npm/$triple"
          done

      - name: Pack each platform tarball with npm pack
        # `npm pack` produces a tarball with the exact filename and
        # contents `npm publish` would upload, so the maintainer's local
        # publish step is byte-equivalent to a CI publish would be.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-staging
          for triple in linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64 win32-x64-msvc; do
            pkg_dir="crates/napi/npm/${triple}"
            (cd "$pkg_dir" && npm pack --pack-destination=../../../../release-staging)
          done
          (cd crates/napi && npm pack --pack-destination=../../release-staging)
          ls -la release-staging

      - name: Upload tarballs to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        # `--clobber` lets a re-run overwrite the previous tarball if a
        # build was rebuilt against the same tag.
        run: |
          set -euo pipefail
          gh release upload "$TAG" release-staging/*.tgz --clobber -R "$GITHUB_REPOSITORY"
