name: napi-rs Native Addon

on:
  push:
    branches: [main]
    paths:
      - "crates/napi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/napi.yml"
  pull_request:
    paths:
      - "crates/napi/**"
      - "crates/core/**"
      - "crates/render-*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/napi.yml"

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: napi-${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: crates/napi
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          napi build --release --manifest-path Cargo.toml --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: napi-${{ matrix.target }}
          path: crates/napi/*.node

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: napi-lint

      - name: Clippy
        run: cargo clippy -p chordsketch-napi -- -D warnings

      - name: Format check
        run: cargo fmt --check -p chordsketch-napi
