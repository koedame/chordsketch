[workspace]
members = [
    "crates/chordpro",
    "crates/render-text",
    "crates/render-html",
    "crates/render-pdf",
    "crates/cli",
    "crates/lsp",
    "crates/wasm",
    "crates/napi",
    "crates/ffi",
    "crates/convert-musicxml",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "MIT"
authors = ["koedame <koedame@users.noreply.github.com>"]
repository = "https://github.com/koedame/chordsketch"
homepage = "https://github.com/koedame/chordsketch"
keywords = ["chordpro", "music", "chord", "parser", "lyrics"]
categories = ["parser-implementations", "text-processing"]
