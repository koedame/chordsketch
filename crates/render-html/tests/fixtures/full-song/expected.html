<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Amazing Grace</title>
<style>
body { font-family: serif; max-width: 800px; margin: 2em auto; padding: 0 1em; }
h1 { margin-bottom: 0.2em; }
h2 { margin-top: 0; font-weight: normal; color: #555; }
.line { display: flex; flex-wrap: wrap; margin: 0.1em 0; }
.chord-block { display: inline-flex; flex-direction: column; align-items: flex-start; }
.chord { font-weight: bold; color: #b00; font-size: 0.9em; min-height: 1.2em; }
.lyrics { white-space: pre; }
.empty-line { height: 1em; }
section { margin: 1em 0; }
section > .section-label { font-weight: bold; font-style: italic; margin-bottom: 0.3em; }
.comment { font-style: italic; color: #666; margin: 0.3em 0; }
.comment-box { border: 1px solid #999; padding: 0.2em 0.5em; display: inline-block; margin: 0.3em 0; }
.chorus-recall { margin: 1em 0; }
.chorus-recall > .section-label { font-weight: bold; font-style: italic; margin-bottom: 0.3em; }
img { max-width: 100%; height: auto; }
.chord-diagrams-grid { display: flex; flex-wrap: wrap; gap: 0.5em; margin: 0.5em 0; }
.chord-diagram-container { display: inline-block; vertical-align: top; }
.chord-diagram { display: block; }
</style>
</head>
<body>
<div class="song">
<h1>Amazing Grace</h1>
<h2>Traditional</h2>
<div class="empty-line"></div>
<section class="verse">
<div class="section-label">Verse: Verse 1</div>
<div class="line"><span class="chord-block"><span class="chord">G</span><span class="lyrics">Amazing </span></span><span class="chord-block"><span class="chord">G7</span><span class="lyrics">grace, how </span></span><span class="chord-block"><span class="chord">C</span><span class="lyrics">sweet the </span></span><span class="chord-block"><span class="chord">G</span><span class="lyrics">sound</span></span></div>
<div class="line"><span class="chord-block"><span class="chord">G</span><span class="lyrics">That saved a </span></span><span class="chord-block"><span class="chord">Em</span><span class="lyrics">wretch like </span></span><span class="chord-block"><span class="chord">D</span><span class="lyrics">me</span></span></div>
</section>
<div class="empty-line"></div>
<section class="verse">
<div class="section-label">Verse: Verse 2</div>
<div class="line"><span class="chord-block"><span class="chord">G</span><span class="lyrics">I once was </span></span><span class="chord-block"><span class="chord">G7</span><span class="lyrics">lost, but </span></span><span class="chord-block"><span class="chord">C</span><span class="lyrics">now am </span></span><span class="chord-block"><span class="chord">G</span><span class="lyrics">found</span></span></div>
<div class="line"><span class="chord-block"><span class="chord">G</span><span class="lyrics">Was blind, but </span></span><span class="chord-block"><span class="chord">Em</span><span class="lyrics">now I </span></span><span class="chord-block"><span class="chord">D</span><span class="lyrics">see</span></span></div>
</section>
<div class="empty-line"></div>
<section class="chorus">
<div class="section-label">Chorus</div>
<div class="line"><span class="chord-block"><span class="chord">G</span><span class="lyrics">How </span></span><span class="chord-block"><span class="chord">C</span><span class="lyrics">sweet the </span></span><span class="chord-block"><span class="chord">G</span><span class="lyrics">sound</span></span></div>
</section>
<div class="empty-line"></div>
<p class="comment">Repeat chorus</p>
</div>
</body>
</html>
