<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChordSketch — 音色サンプル比較 (triangle vs piano)</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    max-width: 680px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6;
  }
  h1 { font-size: 1.3rem; }
  h2 { font-size: 1.05rem; margin-top: 1.8rem; }
  .row { display: flex; gap: .6rem; flex-wrap: wrap; margin: .6rem 0 1.2rem; }
  button {
    font: inherit; padding: .55rem .9rem; border-radius: 8px;
    border: 1px solid #bd1642; background: #bd1642; color: #fff; cursor: pointer;
  }
  button.ghost { background: transparent; color: #bd1642; }
  button:active { transform: translateY(1px); }
  .timbre { padding: .15rem .5rem; border-radius: 999px; font-size: .8rem;
    background: #bd164222; color: #bd1642; margin-left: .4rem; }
  small { opacity: .75; }
  code { background: #8881; padding: .1rem .35rem; border-radius: 4px; }
</style>
</head>
<body>
<h1>ChordSketch — 音色サンプル比較</h1>
<p><small>
  左列が現行の <code>triangle</code> 波、右列が「合成ピアノ」案(波形=ピアノ風倍音 +
  打鍵エンベロープ)。同じコード/スケールを鳴らして聞き比べできます。
  クリックすると音が出ます(ブラウザの自動再生ポリシー対策)。
</small></p>

<h2>コード(ブロック和音)</h2>
<div class="row" id="chords"></div>

<h2>スケール(ド〜ド)+ トニック和音</h2>
<div class="row" id="scales"></div>

<h2>メトロノーム(120 BPM・4/4・1拍目アクセント)</h2>
<div class="row" id="metro"></div>
<p><small>
  「現行(ビープ)」は今の <code>square</code> 波クリック。
  「合成ウッドブロック」はフィルタしたノイズ＋短いピッチ成分で、
  電子音っぽさを抑えた木のクリック。サンプル音源は使っていません。
</small></p>

<script>
// ---- Web Audio 基盤(現行コードと同じ考え方) --------------------
let ctx = null;
function getCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}
const midiToFreq = (m) => 440 * 2 ** ((m - 69) / 12);

// ピアノ風波形: 倍音を少し含む PeriodicWave を一度だけ生成してキャッシュ。
// 基音 + 第2〜6倍音を徐々に減衰させたスペクトルで、triangle より
// 「鍵盤楽器」らしい明るさを出す。
let pianoWave = null;
function getPianoWave(c) {
  if (pianoWave) return pianoWave;
  // index 0 は DC 成分(0)、以降が各倍音の振幅
  const real = new Float32Array([0, 1, 0.55, 0.32, 0.18, 0.10, 0.06, 0.03]);
  const imag = new Float32Array(real.length); // 全て0(sin成分なし)
  pianoWave = c.createPeriodicWave(real, imag, { disableNormalization: false });
  return pianoWave;
}

// 現行 scheduleVoice 相当(triangle 用): 直線アタック + 指数リリース
function scheduleTriangle(c, midi, start, peak, release) {
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(midiToFreq(midi), start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(peak, start + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + release);
  osc.connect(gain).connect(c.destination);
  osc.start(start); osc.stop(start + release + 0.05);
}

// 合成ピアノ: ピアノ風波形 + 打鍵エンベロープ
//   - ごく速いアタック(打鍵の立ち上がり)
//   - サスティンなしの連続減衰(指数)で自然に減衰
//   - 高い音ほど少し短く減衰(piano らしさ)
function schedulePiano(c, midi, start, peak, release) {
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.setPeriodicWave(getPianoWave(c));
  osc.frequency.setValueAtTime(midiToFreq(midi), start);
  // 高音ほど減衰を速める
  const decay = release * (midi > 72 ? 0.7 : 1);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(peak, start + 0.004); // 速い打鍵
  gain.gain.exponentialRampToValueAtTime(0.0001, start + decay);
  osc.connect(gain).connect(c.destination);
  osc.start(start); osc.stop(start + decay + 0.05);
}

// ---- 楽曲データ -------------------------------------------------
// C / Am7 / F / G7 のブロック和音(MIDI)
const CHORDS = {
  'C':   [60, 64, 67],
  'Am7': [57, 60, 64, 67],
  'F':   [60, 65, 69],
  'G7':  [55, 59, 62, 65],
};
// C メジャースケール(ド〜ド)とトニック和音
const SCALE = [60, 62, 64, 65, 67, 69, 71, 72];
const TONIC = [60, 64, 67];

function playChord(synth, pitches) {
  const c = getCtx();
  const now = c.currentTime;
  const per = 0.22 / pitches.length;
  pitches.forEach((m) => synth(c, m, now, per, synth === schedulePiano ? 2.4 : 1.4));
}

function playScale(synth) {
  const c = getCtx();
  const now = c.currentTime;
  SCALE.forEach((m, i) => synth(c, m, now + i * 0.16, 0.2, 0.34));
  const chordStart = now + SCALE.length * 0.16 + 0.12;
  const per = 0.22 / TONIC.length;
  TONIC.forEach((m, j) =>
    synth(c, m, chordStart + j * 0.035, per, synth === schedulePiano ? 2.6 : 1.6));
}

// ---- ボタン生成 -------------------------------------------------
const chordsEl = document.getElementById('chords');
for (const [name, pitches] of Object.entries(CHORDS)) {
  const t = document.createElement('button');
  t.className = 'ghost';
  t.textContent = name + ' (triangle)';
  t.onclick = () => playChord(scheduleTriangle, pitches);
  const p = document.createElement('button');
  p.textContent = name + ' (piano)';
  p.onclick = () => playChord(schedulePiano, pitches);
  chordsEl.append(t, p);
}

// ---- メトロノーム ----------------------------------------------
// 現行(ビープ): square 波の短いブリップ
function beepTick(c, time, accent) {
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(accent ? 1500 : 1000, time);
  gain.gain.setValueAtTime(accent ? 0.34 : 0.3, time);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.04);
  osc.connect(gain).connect(c.destination);
  osc.start(time); osc.stop(time + 0.05);
}

// 合成ウッドブロック: ノイズ(打撃の立ち上がり)+ 短いピッチ(胴鳴り)
let noiseBuffer = null;
function getNoise(c) {
  if (noiseBuffer) return noiseBuffer;
  const len = Math.floor(c.sampleRate * 0.1);
  noiseBuffer = c.createBuffer(1, len, c.sampleRate);
  const d = noiseBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return noiseBuffer;
}
function woodTick(c, time, accent) {
  // ノイズ → バンドパス → 速い減衰(木のアタック)
  const src = c.createBufferSource();
  src.buffer = getNoise(c);
  const bp = c.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = accent ? 2600 : 2000;
  bp.Q.value = 6;
  const ng = c.createGain();
  ng.gain.setValueAtTime(accent ? 0.9 : 0.6, time);
  ng.gain.exponentialRampToValueAtTime(0.0001, time + 0.03);
  src.connect(bp).connect(ng).connect(c.destination);
  src.start(time); src.stop(time + 0.05);
  // 短いピッチ成分(胴鳴りの「コッ」)
  const osc = c.createOscillator();
  const og = c.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(accent ? 1800 : 1300, time);
  og.gain.setValueAtTime(accent ? 0.5 : 0.32, time);
  og.gain.exponentialRampToValueAtTime(0.0001, time + 0.045);
  osc.connect(og).connect(c.destination);
  osc.start(time); osc.stop(time + 0.06);
}

// ルックアヘッド・スケジューラ(現行コードと同じ方式)
let metroTimer = null, nextTick = 0, beatIdx = 0, metroTickFn = null;
function startMetro(tickFn) {
  stopMetro();
  const c = getCtx();
  metroTickFn = tickFn;
  beatIdx = 0;
  nextTick = c.currentTime;
  const period = 60 / 120;
  const pump = () => {
    while (nextTick < c.currentTime + 0.12) {
      metroTickFn(c, nextTick, beatIdx % 4 === 0); // 4拍ごとにアクセント
      beatIdx++;
      nextTick += period;
    }
  };
  pump();
  metroTimer = setInterval(pump, 25);
}
function stopMetro() {
  if (metroTimer !== null) { clearInterval(metroTimer); metroTimer = null; }
}

const metroEl = document.getElementById('metro');
const mb = document.createElement('button');
mb.className = 'ghost';
mb.textContent = '▶ 現行 (ビープ)';
mb.onclick = () => startMetro(beepTick);
const mw = document.createElement('button');
mw.textContent = '▶ 合成ウッドブロック';
mw.onclick = () => startMetro(woodTick);
const ms = document.createElement('button');
ms.className = 'ghost';
ms.textContent = '■ 停止';
ms.onclick = stopMetro;
metroEl.append(mb, mw, ms);

const scalesEl = document.getElementById('scales');
const st = document.createElement('button');
st.className = 'ghost';
st.textContent = 'C スケール (triangle)';
st.onclick = () => playScale(scheduleTriangle);
const sp = document.createElement('button');
sp.textContent = 'C スケール (piano)';
sp.onclick = () => playScale(schedulePiano);
scalesEl.append(st, sp);
</script>
</body>
</html>
