# Release channels manifest.
#
# Single source of truth for every distribution channel chordsketch ships to.
# Consumed by:
#   1. `.github/workflows/release-verify.yml` — post-release rollup that
#      queries every channel's registry and fails if a version is stale,
#      missing, or a public-visibility contract is broken.
#   2. `scripts/check-env-secrets.py` — fail-fast secrets check at the top of
#      every publish job. The `required_secrets` field below is the list that
#      must be present in the GitHub Actions environment at publish time.
#
# This file is TOML (not YAML, despite what the issue body suggests) because
# tomllib is in the Python standard library from 3.11 onward; using TOML keeps
# the check scripts dependency-free. All YAML-specific language in issue #1506
# should be read as "the manifest file" regardless of extension.
#
# When adding a new channel:
#   - Add an [[channels]] entry with kind, package, expected_version,
#     required_secrets.
#   - If you add it behind an environment gate, also create that environment
#     in repo settings and add its secrets.
#   - Register the channel in README.md `## Installation` if it is user-facing.
#   - Add smoke coverage under `.github/workflows/readme-smoke.yml` per
#     `.claude/rules/readme-sync.md`.
#   - Update `docs/releasing.md` Step 1 bump list if the channel has a manifest.
#
# When intentionally skipping a channel (e.g. manual PR flows such as winget),
# set `expected_version = "skip"` and fill in `skip_reason` — the post-release
# verifier uses these fields to distinguish "no publish expected" from
# "publish missing".

