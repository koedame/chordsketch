Gated on the `vscode-marketplace` GitHub environment in
.github/workflows/vscode-extension.yml. First publish must be performed
manually by a human after registering the publisher at
https://marketplace.visualstudio.com/manage (see #1428).
"""

[[channels]]
id = "open-vsx"
display = "Open VSX Registry — koedame.chordsketch"
kind = "open-vsx"
package = "koedame.chordsketch"
expected_version = "tag"
required_secrets = ["OPEN_VSX_TOKEN"]
notes = """
Gated on the `open-vsx` GitHub environment in
.github/workflows/vscode-extension.yml. First publish requires creating a
namespace on open-vsx.org (GitHub login) and generating a personal access
token. The same .vsix artifact built by the `build` job is reused; no
separate build step is needed. See #1604.
"""

# ---------------------------------------------------------------- CocoaPods

[[channels]]
id = "cocoapods"
display = "CocoaPods — ChordSketch"
kind = "manual"
expected_version = "skip"
skip_reason = """
CocoaPods trunk push requires COCOAPODS_TRUNK_TOKEN which has not been
configured yet. The post-release.yml job exists but skips gracefully
when the secret is absent. Once the token is added and the first
`pod trunk push` succeeds, change expected_version to "tag".
"""
required_secrets = ["COCOAPODS_TRUNK_TOKEN"]
notes = "Published by post-release.yml update-cocoapods job."

