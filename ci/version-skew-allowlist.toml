# Version skew allowlist.
#
# Consumed by `scripts/check-version-consistency.py` and enforced via the
# `version-consistency` job in `.github/workflows/ci.yml`.
#
# Each `[[allowed_skews]]` entry declares that a specific (file, field) is
# intentionally out of sync with the canonical workspace crate version, plus
# the rationale, the condition that retires the entry, and the GitHub issue
# tracking that retirement.
#
# EVERY ENTRY MUST HAVE A NON-EMPTY `tracking_issue` FIELD. The check script
# fails validation if any entry is missing it. The user asked, when this
# allowlist was introduced (#1506), that every skip be filed as its own
# issue so the allowlist cannot silently rot — no skip without a paper
# trail.
#
# Removal discipline: the PR that meets an entry's `expires_at` condition MUST
# remove the entry AND close the tracking issue in the same diff. The check
# script also errors on "stale" entries (entries that no longer match any real
# source) so you can't forget to remove one.
#
# Schema:
#   file           — repo-relative path of the drifting source
#   field          — human-readable label within the file (must match the
#                    `field` emitted by check-version-consistency.py for the
#                    source; see the Source extractors in that script)
#   current_value  — the literal string currently observed at that location
#   reason         — why this skew is tolerated (multi-line OK)
#   expires_at     — the condition that retires the entry (free-form but
#                    human-actionable)
#   tracking_issue — GitHub issue number, as a string or integer

# ----------------------------------------------------------------
# v0.5.0 consumer-pin follow-up (#2518)
# ----------------------------------------------------------------
# Four `^X.Y.0`-style consumer constraints on `@chordsketch/wasm`
# and `@chordsketch/wasm-export` lag the canonical workspace by one
# major-minor during the v0.5.0 release-cut window. The pins MUST
# be at `^0.5.0` for the post-publish install graph to resolve
# correctly, but bumping them in the release-cut PR (#2517) itself
# would surface as ETARGET in every consumer workflow's `npm ci`
# step because `@chordsketch/wasm@0.5.0` does not yet exist on npm.
# The established pattern (v0.4.0 #2416) defers the consumer pin
# bump to a post-publish follow-up PR — tracked under #2518.
#
# The consumer-pin caret loader in
# `scripts/check-version-consistency.py` (added in #2517 to close
# the structural gap that allowed the v0.3.0 / v0.4.0 drift to ship
# unnoticed) detects these four drifts and would fail CI without
# these entries; the loader + these entries together form the
# trip-wire that ensures #2518 cannot be silently forgotten.
[[allowed_skews]]
file = "packages/vscode-extension/package.json"
field = "dependencies[@chordsketch/wasm] (^major.minor)"
current_value = "0.4"
reason = """
Consumer pin on `@chordsketch/wasm` must be `^0.5.0` for the v0.5.0
vsce-publish flow (post-release.yml ships the .vsix with this
constraint, so end-user `code --install-extension` resolves to
@chordsketch/wasm@0.5.x). Bumping in the release-cut PR itself
breaks the vscode-extension `Build & Package Extension` CI job
because `npm ci` cannot resolve `^0.5.0` until the maintainer's
local `npm publish` runs post-merge.
"""
expires_at = "post-publish follow-up PR (after `@chordsketch/wasm@0.5.0` lands on npm per docs/releasing.md Step 7a)"
tracking_issue = "2518"

[[allowed_skews]]
file = "packages/react/package.json"
field = "dependencies[@chordsketch/wasm] (^major.minor)"
current_value = "0.4"
reason = """
Same release-cut-window deferral as the vscode-extension entry
above. The next `@chordsketch/react` publish (a separate maintainer
action from the workspace release) needs `^0.5.0` here so end users
running `npm install @chordsketch/react` get the matching wasm
binary; `^0.4.0` until then keeps the in-window `npm ci` working.
"""
expires_at = "post-publish follow-up PR (after `@chordsketch/wasm@0.5.0` lands on npm)"
tracking_issue = "2518"

[[allowed_skews]]
file = "packages/react/package.json"
field = "peerDependencies[@chordsketch/wasm-export] (^major.minor)"
current_value = "0.4"
reason = """
`@chordsketch/wasm-export` ships in lockstep with `@chordsketch/wasm`
per #2466. The peer constraint must reach `^0.5.0` so a host
installing `@chordsketch/react` alongside `@chordsketch/wasm-export`
resolves a compatible pair; deferred to the post-publish follow-up
for the same reason as the runtime-dep entries above.
"""
expires_at = "post-publish follow-up PR (after `@chordsketch/wasm-export@0.5.0` lands on npm per docs/releasing.md Step 7d)"
tracking_issue = "2518"

[[allowed_skews]]
file = "packages/ui-irealb-editor/package.json"
field = "peerDependencies[@chordsketch/wasm] (^major.minor)"
current_value = "0.4"
reason = """
`@chordsketch/ui-irealb-editor` is a private workspace package
(not published) but its `npm ci` in `.github/workflows/ui-irealb-editor.yml`
strict-checks the peer-dep constraint against what npm can resolve.
Setting `^0.5.0` before `@chordsketch/wasm@0.5.0` publishes breaks
the typecheck/test job with ETARGET. Deferred to the post-publish
follow-up alongside the other consumer pins.
"""
expires_at = "post-publish follow-up PR (after `@chordsketch/wasm@0.5.0` lands on npm)"
tracking_issue = "2518"

