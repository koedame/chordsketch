    <title>ChordSketch</title>

  <body>

      The editor / preview / controls DOM is built by React. `main.tsx`
      mounts a `<App />` root into `#app` and registers the React-side

      layer. Keep this body minimal so the React tree fully owns the
      DOM under `#app`.
    -->
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
