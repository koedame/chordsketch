<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChordSketch</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1a1a1a;
        --accent: #bd1642;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --fg: #f5f5f5;
        }
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 2.5rem;
        color: var(--accent);
      }
      p {
        margin: 0.25rem 0;
        opacity: 0.8;
      }
      code {
        font-family: ui-monospace, Menlo, Consolas, monospace;
        background: rgba(128, 128, 128, 0.15);
        padding: 0.1em 0.4em;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ChordSketch</h1>
      <p>Desktop scaffold (<code>apps/desktop</code>).</p>
      <p>Editor UI lands in follow-up issues.</p>
    </main>
  </body>
</html>
