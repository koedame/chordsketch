<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Floating Sidebar — ChordSketch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;500;700;900&display=swap">
<link rel="stylesheet" href="../../tokens.css">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--font-jp);
  font-size: var(--fs-14, 0.875rem);
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--canvas);
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }

/* ── App shell: a padded canvas so every region reads as a floating panel ── */
.app {
  display: grid;
  grid-template-columns: 272px 1fr;
  gap: var(--sp-4);
  height: 100vh;
  padding: var(--sp-4);                /* the gap to the window edge = "independent area" */
}
@media (max-width: 820px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

/* ── The floating sidebar ── */
.sidebar {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-4);           /* rounded corners, detached look */
  box-shadow: var(--e-2);              /* lifts the panel off the canvas */
  overflow: hidden;
}

.sb-head {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-4) var(--sp-3);
}
.sb-head .mark { width: 26px; height: 26px; border-radius: var(--r-2); display: block; }
.sb-head .brand { font-weight: 700; font-size: var(--fs-16, 1rem); letter-spacing: -0.01em; }
.sb-head .spacer { margin-left: auto; }
.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: var(--r-2);
  border: 0; background: transparent; color: var(--text-tertiary); cursor: pointer;
  transition: background var(--dur-1, .12s) var(--ease-out, ease), color var(--dur-1, .12s) var(--ease-out, ease);
}
.icon-btn:hover { background: var(--ink-100); color: var(--text-primary); }

.sb-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 0 var(--sp-3) var(--sp-3); }

.sb-new {
  display: flex; align-items: center; gap: var(--sp-3);
  margin: 0 var(--sp-1) var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-2);
  background: var(--surface);
  font-weight: 500; color: var(--text-primary); cursor: pointer; width: calc(100% - var(--sp-2));
  transition: background var(--dur-1, .12s) var(--ease-out, ease);
}
.sb-new:hover { background: var(--ink-100); }

.nav { display: flex; flex-direction: column; gap: 1px; }
.nav a {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--r-2);
  color: var(--text-secondary); font-weight: 500;
  transition: background var(--dur-1, .12s) var(--ease-out, ease), color var(--dur-1, .12s) var(--ease-out, ease);
}
.nav a svg { color: var(--text-tertiary); flex: none; }
.nav a:hover { background: var(--ink-100); color: var(--text-primary); }
.nav a[aria-current="page"] { background: var(--ink-100); color: var(--text-primary); }
.nav a[aria-current="page"] svg { color: var(--crimson-500); }

.sb-section { margin-top: var(--sp-5); }
.sb-section .label {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--sp-3) var(--sp-2);
  font-family: var(--font-latin); font-size: var(--fs-12, 0.75rem); font-weight: 600;
  color: var(--text-tertiary);
}
.recent { display: flex; flex-direction: column; gap: 1px; }
.recent a {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--r-2);
  color: var(--text-secondary);
  white-space: nowrap; overflow: hidden;
  transition: background var(--dur-1, .12s) var(--ease-out, ease), color var(--dur-1, .12s) var(--ease-out, ease);
}
.recent a:hover { background: var(--ink-100); color: var(--text-primary); }
.recent a .dot { width: 6px; height: 6px; border-radius: var(--r-full, 999px); background: var(--border-strong); flex: none; }
.recent a.active .dot { background: var(--crimson-500); }
.recent a span { overflow: hidden; text-overflow: ellipsis; }

/* ── Account card pinned to the bottom of the floating panel ── */
.sb-foot { border-top: 1px solid var(--border); padding: var(--sp-3); }
.account {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--r-2);
  cursor: pointer;
  transition: background var(--dur-1, .12s) var(--ease-out, ease);
}
.account:hover { background: var(--ink-100); }
.account .avatar {
  width: 28px; height: 28px; border-radius: var(--r-full, 999px);
  background: var(--ink-1000); color: var(--ink-0);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-latin); font-weight: 600; font-size: var(--fs-12, 0.75rem); flex: none;
}
.account .who { line-height: 1.2; }
.account .who .name { font-weight: 600; color: var(--text-primary); }
.account .who .plan { font-size: var(--fs-12, 0.75rem); color: var(--text-tertiary); }
.account .spacer { margin-left: auto; color: var(--text-tertiary); }

/* ── The main area blends into the canvas — no card, no shadow, no border ── */
.main {
  background: transparent;             /* sits on the canvas, not its own panel */
  overflow: hidden;
  display: flex; flex-direction: column; min-height: 0;
}
.main-bar {
  height: 56px; display: flex; align-items: center; gap: var(--sp-3);
  padding: 0 var(--sp-6);              /* flush, no boxed frame */
}
.main-bar h1 { margin: 0; font-size: var(--fs-16, 1rem); font-weight: 700; letter-spacing: -0.01em; }
.main-body { flex: 1; overflow-y: auto; padding: var(--sp-12) var(--sp-8); }
.welcome { display: flex; align-items: center; gap: var(--sp-3); font-size: var(--fs-24, 1.5rem); font-weight: 700; letter-spacing: -0.02em; }
.welcome .spark { color: var(--crimson-500); }
.hint { color: var(--text-secondary); margin-top: var(--sp-3); }
</style>
</head>
<body>

<div class="app">

  <!-- ───────────────────────── Floating sidebar ───────────────────────── -->
  <aside class="sidebar">
    <div class="sb-head">
      <img class="mark" src="../../../assets/logo.svg" alt="" width="26" height="26">
      <span class="brand">ChordSketch</span>
      <span class="spacer"></span>
      <button class="icon-btn" aria-label="サイドバーを折りたたむ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
      </button>
      <button class="icon-btn" aria-label="検索">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>

    <div class="sb-scroll">
      <button class="sb-new">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        新しい曲
      </button>

      <nav class="nav" aria-label="主ナビゲーション">
        <a href="#" aria-current="page"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18M3 12h18M3 17h18"/></svg>ライブラリ</a>
        <a href="#"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>ビューア</a>
        <a href="#"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>エディタ</a>
        <a href="#"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>セットリスト</a>
      </nav>

      <div class="sb-section">
        <div class="label">
          <span>最近の項目</span>
          <button class="icon-btn" aria-label="並び替え" style="width:22px;height:22px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
          </button>
        </div>
        <div class="recent">
          <a href="#"><span class="dot"></span><span>Country Roads</span></a>
          <a href="#"><span class="dot"></span><span>Wonderwall</span></a>
          <a href="#"><span class="dot"></span><span>Autumn Leaves</span></a>
          <a href="#" class="active"><span class="dot"></span><span>Hotel California</span></a>
          <a href="#"><span class="dot"></span><span>Hallelujah</span></a>
          <a href="#"><span class="dot"></span><span>Stand By Me</span></a>
          <a href="#"><span class="dot"></span><span>Let It Be</span></a>
        </div>
      </div>
    </div>

    <div class="sb-foot">
      <div class="account">
        <span class="avatar">JD</span>
        <span class="who">
          <div class="name">john</div>
          <div class="plan">Max</div>
        </span>
        <span class="spacer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </span>
      </div>
    </div>
  </aside>

  <!-- ───────────────────────── Floating main panel ───────────────────────── -->
  <main class="main">
    <div class="main-bar">
      <h1>ライブラリ</h1>
    </div>
    <div class="main-body">
      <div class="welcome"><span class="spark">✳</span> おかえりなさい、john さん</div>
      <p class="hint">左のサイドバーだけが浮いた独立パネル。メインは枠・影なしで背景（canvas）に馴染ませています。</p>
    </div>
  </main>

</div>

</body>
</html>
